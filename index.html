<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>業務管理システム</title>
<style>
/* ===== デザイントークン（light/dark） ===== */
:root{
  --page:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --ring:rgba(11,11,11,.10);
  --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; --s4:#008300; --s5:#4a3aa7; --s6:#e34948;
  --good:#0ca30c; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b;
  --accent:#2a78d6; --accent-ink:#fff; --wash:rgba(42,120,214,.08);
}
/* 表示モード: data-theme 未指定=OS設定に従う(自動)、light/dark=手動固定 */
:root[data-theme="dark"]{
  --page:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --axis:#383835; --ring:rgba(255,255,255,.10);
  --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s5:#9085e9; --s6:#e66767;
  --accent:#3987e5; --wash:rgba(57,135,229,.14);
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --page:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --axis:#383835; --ring:rgba(255,255,255,.10);
    --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s5:#9085e9; --s6:#e66767;
    --accent:#3987e5; --wash:rgba(57,135,229,.14);
  }
}
*{box-sizing:border-box;margin:0}
body{background:var(--page);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI","Hiragino Sans",sans-serif;font-size:14px;line-height:1.6}
button{font:inherit;cursor:pointer}
input,select{font:inherit;color:var(--ink);background:var(--surface);border:1px solid var(--axis);border-radius:8px;padding:7px 10px}
input:focus,select:focus{outline:2px solid var(--accent);outline-offset:-1px}
a{color:var(--accent)}

/* ===== レイアウト ===== */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}
nav{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--grid);padding:14px 10px;position:sticky;top:0;height:100vh;overflow-y:auto}
nav .brand{font-weight:700;font-size:16px;padding:6px 10px 14px}
nav .brand small{display:block;color:var(--muted);font-weight:400;font-size:11px}
nav button{display:flex;align-items:center;gap:8px;width:100%;text-align:left;border:0;background:none;color:var(--ink2);padding:9px 12px;border-radius:8px;font-size:13.5px}
nav button:hover{background:var(--wash)}
nav button.on{background:var(--wash);color:var(--accent);font-weight:600}
nav .foot{margin-top:14px;border-top:1px solid var(--grid);padding-top:10px;font-size:11.5px;color:var(--muted);padding-left:10px}
main{flex:1;padding:22px 26px;max-width:1240px;min-width:0}
h1{font-size:19px;margin-bottom:4px}
.sub{color:var(--muted);font-size:12.5px;margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:16px;margin-bottom:14px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.grow{flex:1}
.right{margin-left:auto}

/* ===== 部品 ===== */
.btn{border:1px solid var(--axis);background:var(--surface);color:var(--ink);border-radius:8px;padding:7px 14px}
.btn:hover{background:var(--wash)}
.btn.pri{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.btn.pri:hover{opacity:.9}
.btn.sm{padding:4px 10px;font-size:12.5px;border-radius:7px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.tabs button{border:0;background:none;color:var(--ink2);padding:7px 13px;border-radius:20px;font-size:13px}
.tabs button.on{background:var(--accent);color:#fff;font-weight:600}
.tabs button .n{opacity:.75;font-size:11.5px;margin-left:3px}
.tabs button .n.hot{opacity:1;background:var(--warn);color:#3d2c00;font-weight:700;border-radius:10px;padding:1px 7px}
nav button .nb, #mnav button .nb{margin-left:6px;font-size:11px;background:var(--warn);color:#3d2c00;font-weight:700;border-radius:10px;padding:1px 7px;display:inline-block}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;border-bottom:1px solid var(--grid);padding:6px 8px;white-space:nowrap}
td{border-bottom:1px solid var(--grid);padding:7px 8px;vertical-align:top}
tr:last-child td{border-bottom:0}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.tblwrap{overflow-x:auto}
/* マスタ等の縦長テーブル: ヘッダー行を固定し、セルは折り返さず長文は…で省略 */
.tblwrap.sticky{max-height:72vh;overflow:auto;padding-top:0}  /* 上paddingを消してヘッダーを容器の最上端に密着させる */
.tblwrap.sticky th{position:sticky;top:0;background:var(--surface);z-index:2;box-shadow:0 1px 0 var(--grid);padding-top:14px}
.tblwrap.sticky td{white-space:nowrap;max-width:280px;overflow:hidden;text-overflow:ellipsis}
.vline{border-left:1px solid var(--grid)}   /* 掛け率などの列を縦罫線で区切る */
.pill{display:inline-block;border-radius:20px;padding:2px 10px;font-size:11.5px;font-weight:600;white-space:nowrap}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:14px 16px}
.kpi .l{color:var(--muted);font-size:11.5px;font-weight:600}
.kpi .v{font-size:24px;font-weight:700;margin-top:2px}
.kpi .d{font-size:11.5px;color:var(--ink2);margin-top:2px}
.bar-outer{background:var(--grid);border-radius:6px;height:10px;overflow:hidden}
.bar-inner{height:100%;border-radius:6px;background:var(--s1)}
.steps{display:flex;gap:3px;align-items:center;flex-wrap:wrap;font-size:10.5px;color:var(--muted)}
.step{display:flex;align-items:center;gap:3px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--grid);border:1px solid var(--axis)}
.dot.done{background:var(--good);border-color:var(--good)}
.dot.now{background:var(--accent);border-color:var(--accent)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--page);padding:10px 20px;border-radius:10px;font-size:13px;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:90vw}
.toast.err{background:var(--crit);color:#fff}
.search{min-width:220px}
.muted{color:var(--muted)}
.small{font-size:12px}
.mono{font-variant-numeric:tabular-nums}
.ordcard{border:1px solid var(--grid);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.ordcard summary{cursor:pointer;list-style:none;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.ordcard summary::-webkit-details-marker{display:none}
.chart{width:100%}
.gauge{margin-bottom:10px}
.loading{position:fixed;inset:0;background:var(--page);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:50;font-size:14px;color:var(--ink2)}
/* ログイン */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px}
#login .box{background:var(--surface);border:1px solid var(--ring);border-radius:14px;padding:30px;width:100%;max-width:360px}
#login h1{margin-bottom:14px}
/* モバイル */
#mnav{display:none}
@media (max-width:760px){
  nav{display:none}
  main{padding:14px;padding-bottom:74px}
  #mnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--grid);z-index:40;overflow-x:auto}
  #mnav button{flex:1;border:0;background:none;color:var(--ink2);padding:9px 4px;font-size:10.5px;min-width:62px}
  #mnav button.on{color:var(--accent);font-weight:700}
  .kpi .v{font-size:19px}
}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <h1>業務管理システム</h1>
    <p class="muted small" style="margin-bottom:12px">合言葉を入力してください</p>
    <input type="password" id="tokenInput" placeholder="合言葉" style="width:100%;margin-bottom:12px">
    <button class="btn pri" style="width:100%" onclick="doLogin()">ログイン</button>
    <p id="loginMsg" class="small" style="color:var(--crit);margin-top:10px"></p>
  </div>
</div>

<div id="app">
  <div class="shell">
    <nav id="sidenav"></nav>
    <main id="main"></main>
  </div>
  <div id="mnav"></div>
</div>
<div id="loadbox" class="loading" style="display:none"><div>データ読み込み中…</div><div class="small muted" id="loadmsg"></div></div>

<script>
'use strict';
// ===== 設定 =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzuTAZ0ATYLgcf2WUEvQbkMRteyUkv-8OKM7dMPQJcl9t75XErreBIfCJhN1BgqHFkS/exec';
// 合言葉はこのファイル（公開ページ）には置かない。照合と役割判定はGAS側の whoami アクションで行う
const BRAND_FEE = 5000, DEFAULT_QUOTA = 200000, MTG_BRAND = 'MTG', TAX = 0.10;
const FLOW = {
  order:      ['商談中','半金入金待ち','振分/発注','回収中','検品/ロット処理中','最終入金待ち','最終入金完了'],   // 2026-07-14 振分中と未発注を統合
  collection: ['回収待ち','検品待ち','ロット処理待ち','ロット処理済み'],
  shipment:   ['引去確認待ち','引去済','出荷手配中','出荷完了'],
  hanbai:     ['受付','ディーラー発注済','預かり中','お渡し済み'],
  hanbaiEC:   ['受付','ディーラー発注済','EC出品中']   // 区分=EC はEC出品中で終端。売れたら「売れた」ボタンで出庫記帳→残0で「完売」（フロー外の終端）
};
const STATUS_COLOR = {
  '商談中':'var(--s5)','半金入金待ち':'var(--s3)','振分/発注':'var(--s1)',
  '回収中':'var(--s1)','検品/ロット処理中':'var(--s5)',
  '最終入金待ち':'var(--s3)','最終入金完了':'var(--good)',
  '回収待ち':'var(--serious)','検品待ち':'var(--s3)','ロット処理待ち':'var(--s1)','ロット処理済み':'var(--good)','ロット処理なし':'var(--s2)',
  '引去確認待ち':'var(--s3)','引去済':'var(--s1)','出荷手配中':'var(--s5)','出荷完了':'var(--good)',
  '受付':'var(--s3)','ディーラー発注済':'var(--s1)','預かり中':'var(--s5)','お渡し済み':'var(--good)','EC出品中':'var(--s2)','完売':'var(--good)'
};

// ===== 状態 =====
let token = localStorage.getItem('gyomu_biz_token') || '';
// 取引先・サービスの名称はコードに直書きせず、ログイン成功時にサーバー（GAS）から受け取る
let NM = { co:'', via:'', spay:'', boxBrand:'', credit:'' };
let role = '';
let userName = '';   // 合言葉は1人1つ。whoami が返す名前（操作ログ・表示用）
const DB = {};          // シート名 -> {headers, rows}
let view = 'dashboard';
let viewState = {};     // 画面ごとのタブ・検索など
let selMonth = new Date().toLocaleDateString('sv-SE').slice(0,7).replace('-','/');

// ===== API =====
async function apiGet(action, params){
  const q = new URLSearchParams(Object.assign({action, token}, params||{}));
  const res = await fetch(GAS_URL + '?' + q.toString());
  const j = await res.json();
  if(!j.ok) throw new Error(j.error);
  return j.data;
}
async function apiPost(action, payload){
  // Content-Type を text/plain にして CORS プリフライトを回避（GAS は OPTIONS を扱えない）
  const res = await fetch(GAS_URL, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({token, action, payload: payload||{}})});
  const j = await res.json();
  if(!j.ok) throw new Error(j.error);
  return j.data;
}

// ===== ログイン =====
// 合言葉の照合はサーバー（GAS）側。whoami が {role:'admin'|'staff', name:'十河'} を返す
async function whoami(t){
  const q = new URLSearchParams({action:'whoami', token:t});
  const res = await fetch(GAS_URL + '?' + q.toString());
  const j = await res.json();
  return (j.ok && j.data && j.data.role) ? j.data : null;
}
async function doLogin(){
  const t = document.getElementById('tokenInput').value.trim();
  const msg = document.getElementById('loginMsg');
  if(!t){ msg.textContent = '合言葉を入れてください'; return; }
  msg.textContent = '確認中…';
  let r = null;
  try{ r = await whoami(t); }
  catch(e){ msg.textContent = '通信エラー。少し待ってやり直してください'; return; }
  if(!r){ msg.textContent = '合言葉が違います'; return; }
  token = t; role = r.role; userName = r.name || ''; if(r.names) NM = r.names; localStorage.setItem('gyomu_biz_token', t);
  msg.textContent = '';
  boot();
}
function logout(){ localStorage.removeItem('gyomu_biz_token'); location.reload(); }

// ===== 表示モード（自動=OS設定 / ライト / ダーク。端末ごとに記憶） =====
function applyTheme(){
  const t = localStorage.getItem('gyomu_biz_theme') || '';
  if(t) document.documentElement.dataset.theme = t;
  else delete document.documentElement.dataset.theme;
}
function themeLabel(){
  const t = localStorage.getItem('gyomu_biz_theme') || '';
  return t==='light' ? '☀️ 表示: ライト' : t==='dark' ? '🌙 表示: ダーク' : '🌓 表示: 自動（OS設定）';
}
function cycleTheme(){
  const t = localStorage.getItem('gyomu_biz_theme') || '';
  const next = t==='' ? 'light' : t==='light' ? 'dark' : '';
  if(next) localStorage.setItem('gyomu_biz_theme', next); else localStorage.removeItem('gyomu_biz_theme');
  applyTheme(); render();
}
applyTheme();

async function boot(){
  if(token && !role){
    // 保存済みの合言葉から役割・名前を復元（照合はGAS側）。
    // 合言葉が無効なときだけ消す。通信エラー（電波不良・GAS一時不調）では合言葉を保持して再試行画面を出す
    let r = null, netFail = false;
    try{ r = await whoami(token); }catch(e){ netFail = true; }
    if(r){ role = r.role; userName = r.name || ''; if(r.names) NM = r.names; }
    else if(!netFail){ token=''; localStorage.removeItem('gyomu_biz_token'); }
    else{
      document.getElementById('loadbox').style.display='flex';
      document.getElementById('loadbox').innerHTML = '<div>通信できませんでした（ログイン情報は保持しています）</div><button class="btn" onclick="location.reload()">再読み込み</button>';
      return;
    }
  }
  if(!role){ document.getElementById('login').style.display='flex'; return; }
  if(NM.co) document.title = NM.co+' 業務管理システム';   // 社名はログイン後にだけ出す（公開HTMLには載せない）
  document.getElementById('login').style.display='none';
  document.getElementById('loadbox').style.display='flex';
  try{
    await loadAll();
    document.getElementById('app').style.display='block';
    renderNav(); render();
  }catch(e){
    document.getElementById('loadbox').innerHTML = '<div>読み込みに失敗しました: '+esc(e.message)+'</div><button class="btn" onclick="location.reload()">再読み込み</button>';
    return;
  }
  document.getElementById('loadbox').style.display='none';
}

// 起動時に全データを並列ロード → 以後の検索・絞込みはブラウザ内で即時
const SHEETS = ['products','wholesalers','salons','orderLedger','collectionLedger','shipments','hanbaiOrders','stock','stockLog','monthlyGoals','quotaMaster','orders','collection','docLog','alerts','allocDrafts'];
async function loadAll(){
  const msg = document.getElementById('loadmsg');
  const jobs = SHEETS.map(async name => { DB[name] = await apiGet(name); if(msg) msg.textContent = name + ' 読込完了'; });
  await Promise.all(jobs);
}
async function reload(names){
  await Promise.all((names||SHEETS).map(async n => { DB[n] = await apiGet(n); }));
  render();
}

// ===== 共通ヘルパ =====
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function yen(n){ return n==null||isNaN(n) ? '—' : '¥' + Math.round(n).toLocaleString(); }
function num(v){ if(typeof v==='number') return v; const n=parseFloat(String(v||'').replace(/[,¥￥%％\s]/g,'')); return isNaN(n)?0:n; }
function monthOf(d){ return String(d||'').replace(/-/g,'/').slice(0,7); }
function today(){ return new Date().toLocaleDateString('sv-SE').replace(/-/g,'/'); }
// rows() は削除済み（ソフト削除フラグあり）の行を自動で除外する。ゴミ箱表示だけ rowsAll() を使う
function rowsAll(name){ return (DB[name]&&DB[name].rows)||[]; }
function rows(name){ return rowsAll(name).filter(r=>!String(r['削除']||'').trim()); }
function pill(st){ return '<span class="pill" style="background:color-mix(in srgb,'+(STATUS_COLOR[st]||'var(--muted)')+' 15%, transparent);color:'+(STATUS_COLOR[st]||'var(--muted)')+'">'+esc(st)+'</span>'; }
// 検索欄の共通入力ハンドラ。日本語入力（IME）の変換中は再描画しない
// （変換中に描き直すと入力途中の語が「nな」のように壊れるため。確定した瞬間に絞り込む）
// 注意: oncompositionstart はHTML属性ではブラウザが発火しないため、document への委任で拾う
let imeComposing = false;
function searchIn(v, target){
  if(target==='alloc') ALLOC.q = v; else viewState.q = v;
  if(!imeComposing) render();
}
function searchAttrs(target){
  return ' data-starget="'+(target||'')+'" oninput="searchIn(this.value, this.dataset.starget)"';
}
document.addEventListener('compositionstart', e=>{
  if(e.target && e.target.classList && e.target.classList.contains('search')) imeComposing = true;
}, true);
document.addEventListener('compositionend', e=>{
  const t = e.target;
  if(t && t.classList && t.classList.contains('search')){ imeComposing = false; searchIn(t.value, t.dataset.starget); }
}, true);
function toast(msg, err){
  const t = document.createElement('div'); t.className = 'toast'+(err?' err':''); t.textContent = msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), err?6000:3500);
}
// レコード単位の処理中ロック。処理中は「その対象」だけ操作不可で、他の案件・画面切替・検索は自由。
// 同じ対象への二重送信は従来どおりブロック（サーバー側のLockServiceによる直列処理も従来どおり）
const inflight = new Set();   // 例: 'order:O0006' / 'collection:K0012' / ID を持たない操作は操作名
function actKey(action, payload){
  const p = payload || {};
  if(p.entity && p.id) return p.entity + ':' + p.id;
  if(p['受注ID']) return 'order:' + p['受注ID'];
  if(p['注文ID']) return 'hanbai:' + p['注文ID'];
  if(p.url) return 'doc:' + p.url;
  return action;
}
function busy(entity, id){ return inflight.has(entity + ':' + id); }
function busyPill(){ return '<span class="pill" style="background:color-mix(in srgb,var(--muted) 15%, transparent);color:var(--muted)">⏳ 処理中…</span>'; }
async function act(action, payload, okMsg, reloadNames){
  const key = actKey(action, payload);
  if(inflight.has(key)){ toast('この対象は処理中です。完了までお待ちください', true); return; }
  inflight.add(key); render();   // 対象カードだけ「処理中…」表示になる
  try{
    const r = await apiPost(action, payload);
    toast(okMsg || '完了しました');
    await reload(reloadNames);   // 読み直しが終わるまでロックを保持（完了前の古いデータを操作させない）
    return r;
  }catch(e){ toast(e.message, true); }
  finally{ inflight.delete(key); render(); }
}
// 商品情報ルックアップ
function product(pid){ return rows('products').find(p=>String(p['商品ID']).trim()===String(pid).trim()); }
function brandOf(pid){ const p=product(pid); if(!p) return ''; return String(p['ブランド']||p['カテゴリー']||'').trim(); }
function ownCost(pid){ const p=product(pid); return p?num(p[''+NM.co+'仕入価格（税抜）']):0; }
function salonCost(pid){ const p=product(pid); return p?num(p['サロン仕入価格（税抜）']):0; }

// CSVエクスポート（UTF-8 BOM + CRLF。Excelで文字化けしない）
function exportCsv(filename, headers, rowArrays){
  const csv = [headers].concat(rowArrays).map(r=>r.map(c=>{
    const s = String(c==null?'':c); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\r\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = filename + '_' + today().replace(/\//g,'-') + '.csv'; a.click();
}
function exportTable(name, sheetName, filter){
  const d = DB[sheetName]; if(!d) return;
  const rs = filter ? d.rows.filter(filter) : d.rows;
  exportCsv(name, d.headers, rs.map(r=>d.headers.map(h=>r[h])));
}

// ===== 集計（クライアント側・即時） =====
function calcSales(month){
  let sales=0, cost=0; const byW={}, byB={};
  rows('orderLedger').forEach(r=>{
    if(monthOf(r['受注日'])!==month) return;
    const sub=num(r['小計（税抜）']), qty=num(r['個数']), pid=r['商品ID'];
    sales+=sub; cost+=ownCost(pid)*qty;
    const w=String(r['卸先名']||'').trim(); if(w) byW[w]=(byW[w]||0)+sub;
    const b=brandOf(pid); if(b) byB[b]=(byB[b]||0)+sub;
  });
  const goal = rows('monthlyGoals').find(g=>monthOf(g['月'])===month);
  return {sales, cost, profit:sales-cost, byW, byB,
    goal: goal?{sales:num(goal['売上目標（税抜）']),profit:num(goal['利益目標（税抜）']),buy:num(goal['仕入目標（税抜）'])}:null};
}
function calcSalonPay(month){
  const bySalon={};
  const ensure=(sid,name)=>bySalon[sid]||(bySalon[sid]={sid,name,brands:new Set(),mtg:0,charge:0});
  rows('collectionLedger').forEach(r=>{
    if(monthOf(r['発注日'])!==month || String(r['区分']||'卸')!=='卸') return;
    const sid=String(r['サロンID']||'').trim(); if(!sid) return;
    const s=ensure(sid,r['サロン名']); const b=brandOf(r['商品ID']);
    if(b) s.brands.add(b);
    if(b===MTG_BRAND) s.mtg += salonCost(r['商品ID'])*num(r['個数']);
  });
  rows('hanbaiOrders').forEach(r=>{
    if(monthOf(r['注文日'])!==month) return;
    const sid=String(r['サロンID']||'').trim(); if(!sid) return;
    ensure(sid,r['サロン名']).charge += salonCost(r['商品ID'])*num(r['個数']);
  });
  // 月次支払（翌月末） = 協力費 − 店販/EC請求。MTGは都度払いのため月次には含めない（別枠で参照）
  return Object.values(bySalon).map(s=>({sid:s.sid, name:s.name, brands:[...s.brands], mtg:s.mtg, charge:s.charge,
    fee:s.brands.size*BRAND_FEE, net:s.brands.size*BRAND_FEE - s.charge}));
}
function calcQuota(month){
  const used={};
  const add=(sid,name,brand,amt)=>{ if(!sid||!brand) return; const k=sid+'|'+brand;
    used[k]=used[k]||{sid,name,brand,used:0}; used[k].used+=amt; };
  rows('collectionLedger').forEach(r=>{ if(monthOf(r['発注日'])!==month) return;
    add(String(r['サロンID']).trim(), r['サロン名'], brandOf(r['商品ID']), salonCost(r['商品ID'])*num(r['個数'])); });
  rows('hanbaiOrders').forEach(r=>{ if(monthOf(r['注文日'])!==month) return;
    add(String(r['サロンID']).trim(), r['サロン名'], brandOf(r['商品ID']), salonCost(r['商品ID'])*num(r['個数'])); });
  const qm={}; rows('quotaMaster').forEach(q=>qm[String(q['サロンID']).trim()+'|'+String(q['ブランド']).trim()]=num(q['枠金額（円）']));
  return Object.values(used).map(u=>{ const key=u.sid+'|'+u.brand;
    const quota = (key in qm) ? qm[key] : DEFAULT_QUOTA;
    return {sid:u.sid, name:u.name, brand:u.brand, used:u.used, quota, rate:quota>0?u.used/quota:null}; });
}

  const pendDocs = rows('docLog').filter(d=>{
    const kind = String(d['種類']||'');
    const st = (oInfo[String(d['受注ID']||'').trim()]||{}).st;
    if(!st) return false;
    if(kind==='請求書（全額）'||kind===NM.via+'請求書（全額）') return st!=='最終入金完了';   // 全額1枚 = 入金完了までずっと待ち
    return (DOC_PEND_RULES[kind]||[]).includes(st);
  }).sort((a,b)=>String(a['支払期限']||'9999').localeCompare(String(b['支払期限']||'9999')));

  // 月次バーチャート（1本に集約: 下段=仕入・上段=利益・バー全体の高さ=売上。点線=売上目標）
  // 実運用開始の2026/05から対象月まで全部並べる。月数が増えたら横スクロール
  const CHART_START = '2026/05';
  const months=[];
  { let d = new Date(CHART_START.replace('/','-')+'-01T00:00:00');
    const end = new Date(m.replace('/','-')+'-01T00:00:00');
    if(end < d) d = end;   // 開始月より前の月を選んだときはその月だけ
    while(d <= end){ months.push(d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')); d = new Date(d.getFullYear(), d.getMonth()+1, 1); } }
  const mSales = months.map(mm=>calcSales(mm));
  const mGoals = months.map(mm=>{ const g=rows('monthlyGoals').find(r=>monthOf(r['月'])===mm);
    return g?{sales:num(g['売上目標（税抜）']), buy:num(g['仕入目標（税抜）']), profit:num(g['利益目標（税抜）'])}:{sales:0,buy:0,profit:0}; });
  const maxV = Math.max.apply(null, mSales.map(s=>Math.max(s.sales,s.cost)).concat(mGoals.map(g=>g.sales)).concat([1]));
  const bw=30, ig=5, gap=20, gw=bw*2+ig, H=140, W=months.length*(gw+gap);   // gw = 実績（積み上げ）＋目標の2本組
  let chart = '<div style="overflow-x:auto"><svg class="chart" viewBox="0 -16 '+W+' '+(H+50)+'" width="'+Math.round(W*1.15)+'" height="'+Math.round((H+50)*1.15)+'" style="min-width:'+W+'px">';
  months.forEach((mm,i)=>{
    const s = mSales[i], x=i*(gw+gap), on = mm===m;
    const hs=Math.round(Math.max(s.sales,0)/maxV*H), hc=Math.round(Math.max(Math.min(s.cost,s.sales),0)/maxV*H);
    const tip = mm+'\n売上 '+yen(s.sales)+'\n仕入 '+yen(s.cost)+'\n利益 '+yen(s.profit);
    // 下段=仕入（アンバー）
    chart += '<rect x="'+x+'" y="'+(H-hc)+'" width="'+bw+'" height="'+Math.max(hc,1)+'" rx="3" fill="'+(on?'var(--s3)':'color-mix(in srgb,var(--s3) 45%,transparent)')+'"><title>'+tip+'</title></rect>';
    // 上段=利益（グリーン）。2pxの隙間で段を分ける
    if(hs-hc>3) chart += '<rect x="'+x+'" y="'+(H-hs)+'" width="'+bw+'" height="'+(hs-hc-2)+'" rx="3" fill="'+(on?'var(--s2)':'color-mix(in srgb,var(--s2) 45%,transparent)')+'"><title>'+tip+'</title></rect>';
    chart += '<text x="'+(x+bw/2)+'" y="'+(H-hs-5)+'" text-anchor="middle" font-size="10" fill="var(--ink2)">'+(s.sales!==0?Math.round(s.sales/10000)+'万':'')+'</text>';
    if(mGoals[i].sales>0){
      const g = mGoals[i], gh=Math.round(g.sales/maxV*H), gy=H-gh, gx=x+bw+ig;

      const gBuy = g.buy>0 ? g.buy : (g.profit>0 && g.sales>g.profit ? g.sales-g.profit : 0);

        chart += '<rect x="'+gx+'" y="'+(H-ghc)+'" width="'+bw+'" height="'+Math.max(ghc,1)+'" rx="3" fill="color-mix(in srgb,var(--s3) 18%,transparent)"><title>'+gtip+'</title></rect>';
        if(gh-ghc>3) chart += '<rect x="'+gx+'" y="'+gy+'" width="'+bw+'" height="'+(gh-ghc-2)+'" rx="3" fill="color-mix(in srgb,var(--s2) 18%,transparent)"><title>'+gtip+'</title></rect>';
      }
      chart += '<rect x="'+gx+'" y="'+gy+'" width="'+bw+'" height="'+Math.max(gh,1)+'" rx="3" fill="'+(gBuy>0?'none':'color-mix(in srgb,var(--muted) 15%,transparent)')+'" stroke="var(--muted)" stroke-dasharray="4 3"><title>'+gtip+'</title></rect>';

    }
    chart += '<text x="'+(x+gw/2)+'" y="'+(H+15)+'" text-anchor="middle" font-size="10" fill="var(--muted)">'+(mm.slice(5,7)==='01'?mm.slice(2).replace('/','年'):mm.slice(5))+'月</text>';
  });
  chart += '<line x1="0" y1="'+H+'" x2="'+W+'" y2="'+H+'" stroke="var(--axis)"/></svg></div>';
  // 対象月の実数値サマリー（目標に対してどこまで来ているか）

  const vsG = (v,g)=>g>0 ? yen(v)+' ／ 目標 '+yen(g)+'（'+Math.round(v/g*100)+'%）' : yen(v)+'（目標未設定）';

    : '<p class="muted small">この月の受注データがありません</p>';

  // 業務の残件ボード: どの工程で何件止まっているか（クリックでその画面のタブへ飛ぶ）
  const boardChips = [];
  const chipsFor = (label, navKey, entity, list, idCol, extraTerminal, keyOf)=>{
    const flow = FLOW[entity], done = new Set([flow[flow.length-1]].concat(extraTerminal||[]));

    const chips = flow.filter(st=>cnt[st]&&cnt[st].size).map(st=>

  };
  chipsFor('📋 受注','orders','order',rows('orderLedger'),'受注ID');
  chipsFor('📦 回収・検品','collection','collection',rows('collectionLedger'),'回収ID',['ロット処理なし'],ordersOfCollection);   // 案件数で表示
  chipsFor('🚚 出荷','shipments','shipment',rows('shipments'),'出荷ID',null,r=>[String(r['受注ID']||r['出荷ID']||'').trim()]);   // 案件数で表示

  const boardHtml = '<div class="card"><b class="small">🚧 業務の残件（どこで止まっているか）</b><div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">' +
    (boardChips.join('') || '<span class="small" style="color:var(--good)"><b>✅ 進行中の残件はありません</b></span>') + '</div></div>';

  // 資金繰り（今月のお金の出入り・概算）: 目標vs実績を置換（2026-07-15 ユーザー指定。目標は月次グラフの点線で見る）
  // バーの中に取引先ごとの内訳セグメントを表示（2026-07-15 ユーザー指定）。狭いセグメントはホバーで金額を出す
  const pendByW = {};   // 入り内訳: 卸先 → 未入金請求額
  pendDocs.forEach(d=>{ const k=String(d['卸先名']||'').trim()||'（卸先不明）'; pendByW[k]=(pendByW[k]||0)+num(d['金額（税込）']); });
  const cashIn = Object.values(pendByW).reduce((a,v)=>a+v,0);                 // 入ってくる予定 = 未入金の発行済み請求書
  const spLines = calcSalonPay(m);
  const cashOutSalon = spLines.reduce((a,l)=>a+l.net,0);                      // サロン支払（翌月末振込）
  // 仕入支払（概算）: 完了案件（最終入金完了）はお金の動きが済んでいるとみなし、進行中案件の仕入を「これから出るお金」に数える。
  // 月では絞らない＝月を跨いだ案件（7月受注・8月入金の翌月末払い等）も入金が終わるまで残る（入り側の未入金請求書と対になる）
  const buyByW = {};    // 出（仕入）内訳: 卸先 → 進行中案件の仕入額
  rows('orderLedger').forEach(r=>{ const st=String(r['ステータス']||'').trim(); if(st===''||st==='最終入金完了') return;
    const k=String(r['卸先名']||'').trim()||'（卸先不明）'; buyByW[k]=(buyByW[k]||0)+ownCost(r['商品ID'])*num(r['個数']); });
  const cashOutBuy = Object.values(buyByW).reduce((a,v)=>a+v,0);
  const cashOut = cashOutBuy + cashOutSalon;
  const cashNet = cashIn - cashOut;
  const cashMax = Math.max(cashIn, cashOut, Math.abs(cashNet), 1);
  const toSegs = (obj, color, tipPrefix)=>Object.entries(obj).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])
    .map(([label,v],i)=>({label, v, color, alt:i%2===1, tip:tipPrefix+'：'+label}));
  const segsHtml = segs=>segs.map((s,i)=>{ const pct = s.v/cashMax*100;
    return '<div title="'+esc((s.tip||s.label)+' '+yen(s.v))+'" style="flex:0 0 '+pct.toFixed(2)+'%;min-width:0;background:'+s.color+';'+(s.alt?'filter:brightness(1.22);':'')+(i<segs.length-1?'margin-right:2px;':'')+'overflow:hidden;white-space:nowrap;color:#fff;font-size:10.5px;font-weight:700;line-height:20px;padding:0 6px;text-shadow:0 1px 1px rgba(0,0,0,.35)">'+(pct>=8?esc(s.label)+' '+yen(s.v):'')+'</div>';
  }).join('');
  const cashRow = (label, v, note, inner)=>'<div style="margin-top:10px"><div class="row small" style="justify-content:space-between"><span>'+label+(note?' <span class="muted">'+note+'</span>':'')+'</span><b>'+yen(v)+'</b></div>' +
    '<div style="display:flex;height:20px;border-radius:10px;background:var(--wash);overflow:hidden;margin-top:4px">'+inner+'</div></div>';
  const cashHtml =
    cashRow('💰 入ってくる予定', cashIn, '未入金の請求書 '+pendDocs.length+'枚（税込）・卸先ごとの内訳',
      segsHtml(toSegs(pendByW, 'var(--s2)', '未入金請求書'))) +
    cashRow('📤 出ていく予定', cashOut, '<span style="color:var(--s3)">■</span>仕入 '+yen(cashOutBuy)+'（進行中の全案件・税抜）＋<span style="color:var(--s5)">■</span>サロン支払 '+yen(cashOutSalon)+'（翌月末）',
      segsHtml(toSegs(buyByW, 'var(--s3)', '仕入').concat(
        spLines.filter(l=>l.net>0).sort((a,b)=>b.net-a.net).map((l,i)=>({label:l.name, v:l.net, color:'var(--s5)', alt:i%2===1, tip:'サロン支払：'+l.name}))))) +
    cashRow('🧮 差引の手残り（概算）', cashNet, '',
      segsHtml([{label:cashNet>=0?'手残り':'不足', v:Math.abs(cashNet), color:cashNet>=0?'var(--good)':'var(--crit)', tip:'差引の'+(cashNet>=0?'手残り':'不足分')}])) +
    '<p class="muted small" style="margin-top:8px">'+NM.credit+'案件の入金は翌月末・'+NM.via+'経由は卸先入金後すぐ。入金の確定は受注のステータス操作で反映されます（入金されるとこの「入ってくる予定」から消えます）</p>';

  // 入金予定テーブル（請求書ベース: 誰から・いつ・いくら。期限切れは赤）
  const todayStr = today();
  const pendHtml = '<div class="card"><b class="small">💴 入金予定（発行済み請求書ベース）</b><div class="tblwrap" style="margin-top:8px">' +
    '<table><tr><th>支払期限</th><th>卸先（誰から）</th><th>種類</th><th class="num">金額（税込）</th><th>管理番号</th><th>受注ID</th></tr>' +
    (pendDocs.map(d=>{
      const due = String(d['支払期限']||'').trim();
      const overdue = due && due < todayStr;
      return '<tr><td class="small"'+(overdue?' style="color:var(--crit);font-weight:700"':'')+'>'+esc(due||'—')+(overdue?' ⚠':'')+'</td>' +
        '<td>'+esc(d['卸先名'])+'</td><td class="small">'+esc(d['種類'])+'</td>' +
        '<td class="num"><b>'+yen(num(d['金額（税込）']))+'</b></td><td class="mono small">'+esc(d['管理番号'])+'</td><td class="mono small">'+esc(d['受注ID'])+'</td></tr>';
    }).join('') || '<tr><td colspan="6" class="muted">入金待ちの請求書はありません</td></tr>') +
  '</table></div></div>';

  return '<h1>ダッシュボード</h1><div class="sub">対象月: '+monthPicker()+'</div>' +
  alertsHtml() +
  boardHtml +
  '<div class="kpis">' +
    kpi(m+' 売上（税抜）', yen(s.sales)) +
    kpi('利益（概算）', yen(s.profit), s.sales>0 ? '利益率 '+Math.round(s.profit/s.sales*100)+'%' : '') +
    kpi('入金待ちの請求書', pendDocs.length+'枚', pendDocs.length ? '直近期限 '+(String(pendDocs[0]['支払期限']||'').trim()||'—') : '') +
    kpi('余剰在庫（税抜）', yen(surplusValue), surplus.length ? surplus.reduce((a,r)=>a+num(r['残数']),0)+'点 / '+surplus.length+'ロット' : '売れ残りなし') +
    kpi('検品待ち', nInspect+'案件') +
    kpi('出荷 進行中', nShip+'案件') +
    kpi('店販品 預かり中', nAzukari+'店舗') +
    kpi('EC商品 預かり中', nEc+'店舗', ecQty?'残 '+ecQty+'点':'') +
  '</div>' +
  '<div class="row" style="align-items:stretch">' +
    '<div class="card grow" style="min-width:300px"><b class="small">月次実績（2026/05〜・税抜）</b> <span class="muted small" style="margin-left:6px">バー全体=売上（<span style="color:var(--s3)">■</span>仕入＋<span style="color:var(--s2)">■</span>利益）／点線=売上目標（「月次目標」シート）</span><div style="margin-top:8px">'+chart+'</div></div>' +
    '<div class="card grow" style="min-width:280px"><b class="small">'+m+' 案件別売上・利益</b><div style="margin-top:10px">'+wbars+'</div></div>' +
  '</div>' +
  '<div class="card"><b class="small">💸 今月のお金の出入り（資金繰り・概算）</b><div style="margin-top:4px">'+cashHtml+'</div></div>' +
  pendHtml +
  anbetsuHtml(m) + '</div>';
}
// 案件別収支（旧・売り上げ管理シートの形式）。行 = 受注×メーカー。受注を取り込んだ瞬間に自動で出る
function calcAnbetsu(month){
  const map = {};
  rows('orderLedger').forEach(r=>{
    if(monthOf(r['受注日'])!==month) return;
    const oid = String(r['受注ID']||'').trim(); if(!oid) return;
    const brand = brandOf(r['商品ID']) || '（メーカー不明）';
    const key = oid+'|'+brand;
    if(!map[key]) map[key] = {oid, brand, w:r['卸先名'], date:r['受注日'], st:r['ステータス'], form:r['仕入れ形態'], sales:0, list:0, cost:0, via:0};
    const sub = num(r['小計（税抜）']);
    map[key].sales += sub;
    map[key].list  += num(r['定価（税抜）'])*num(r['個数']);
    map[key].cost  += ownCost(r['商品ID'])*num(r['個数']);
    // 経由案件（受注台帳の経由列に印）: 経由先利益=卸値の3%。自社の利益はその分減る（=卸値97%−仕入）
    if(String(r[NM.via+'経由']||'').trim()!=='') map[key].via += Math.round(sub*0.03);
  });
  return Object.values(map).sort((a,b)=>String(b.oid).localeCompare(String(a.oid)));
}
function anbetsuHtml(m){
  const lines = calcAnbetsu(m);
  const pct = v=>v==null||isNaN(v)?'—':Math.round(v*100)+'%';
  // メーカー（ブランド）で左にくくる: メーカー行（小計つき）→ その下に卸先ごとの行（元シートと同じ形）
  const byBrand = {};
  lines.forEach(l=>{ const b=l.brand||'（メーカー不明）'; (byBrand[b]=byBrand[b]||[]).push(l); });
  const groups = Object.entries(byBrand).map(([brand,ls])=>({
    brand, ls: ls.sort((a,b)=>b.sales-a.sales),
    sales: ls.reduce((a,x)=>a+x.sales,0), cost: ls.reduce((a,x)=>a+x.cost,0), via: ls.reduce((a,x)=>a+x.via,0)
  })).sort((a,b)=>b.sales-a.sales);
  const t = {sales:0, cost:0, via:0};
  groups.forEach(g=>{ t.sales+=g.sales; t.cost+=g.cost; t.via+=g.via; });
  const profit = x=>x.sales-x.cost-x.via;   // 自社の利益。経由分は卸値3%を渡すぶん減る

  // ブランドごとの仕入枠消化（サロン×ブランドの枠を合算。ブランド小計行に表示）
  const quotaByBrand = {};
  calcQuota(m).forEach(q=>{ const b=quotaByBrand[q.brand]=quotaByBrand[q.brand]||{used:0,quota:0}; b.used+=q.used; b.quota+=q.quota; });
  const quotaCell = brand=>{
    const q = quotaByBrand[brand]; if(!q || !q.quota) return '';
    const rate = Math.round(q.used/q.quota*100);
    return '<span class="small" style="color:'+(rate>=90?'var(--crit)':rate>=70?'var(--warn)':'var(--muted)')+'">枠消化 '+rate+'%（'+yen(q.used)+'／'+yen(q.quota)+'）</span>';
  };

  // ブランド列はスプシのセル結合の見た目（rowspan）。ブランド小計行は出さず、枠消化だけブランドセル内に表示（2026-07-14 指定）
  const body = groups.map(g=>
    g.ls.map((l,i)=>{
      const qc = quotaCell(g.brand);
      const brandCell = i===0 ? '<td rowspan="'+g.ls.length+'" style="vertical-align:middle;background:var(--wash);border-right:1px solid var(--grid)"><b>'+esc(g.brand)+'</b>'+(qc?'<div style="margin-top:4px">'+qc+'</div>':'')+'</td>' : '';
      return '<tr>'+brandCell+'<td class="small">'+esc(l.w)+'</td>' +
      '<td class="num">'+yen(l.sales)+'</td><td class="num">'+pct(l.list>0?l.cost/l.list:null)+'</td><td class="num">'+pct(l.list>0?l.sales/l.list:null)+'</td>' +
      '<td class="num">'+yen(l.cost)+'</td>' +
      '<td class="num">'+yen(profit(l))+'</td><td class="num">'+pct(l.sales>0?profit(l)/l.sales:null)+'</td>' +
      '<td class="num">'+(l.via?yen(l.via):'')+'</td>' +
      '<td class="small">'+esc(l.form||'')+'</td><td>'+pill(l.st)+'</td><td class="mono small">'+l.oid+'</td></tr>';
    }).join('')
  ).join('');

  return '<div class="card tblwrap"><div class="row"><b class="small">案件別収支（'+m+'）</b>' +
    '<button class="btn sm right" onclick="exportAnbetsu()">CSV出力</button>' +
    '<button class="btn sm" onclick="printAnbetsu()">🖨 PDF出力</button></div>' +
    '<table style="margin-top:8px"><tr><th>メーカー</th><th>卸先</th><th class="num">売上（卸値税抜）</th><th class="num">掛率(A)</th><th class="num">掛率(卸)</th><th class="num">'+NM.co+'仕入</th><th class="num">利益額</th><th class="num">利益率</th><th class="num">'+NM.via+'利益</th><th>仕入形態</th><th>状態</th><th>受注ID</th></tr>' +
    (body || '<tr><td colspan="12" class="muted">この月の受注はまだありません</td></tr>') +
    (groups.length ? '<tr><td colspan="2"><b>合計</b></td><td class="num"><b>'+yen(t.sales)+'</b></td><td></td><td></td><td class="num"><b>'+yen(t.cost)+'</b></td><td class="num"><b>'+yen(profit(t))+'</b></td><td class="num"><b>'+pct(t.sales>0?profit(t)/t.sales:null)+'</b></td><td class="num">'+(t.via?'<b>'+yen(t.via)+'</b>':'')+'</td><td colspan="3"></td></tr>' : '') +
    '</table><p class="muted small" style="margin-top:6px">掛率(A)='+NM.co+'仕入÷定価、掛率(卸)=卸値÷定価。'+NM.via+'利益=卸値の3%（受注台帳「'+NM.via+'経由」列に印がある案件のみ。利益額はその分を引いた後）。受注台帳から自動集計されます</p></div>';
}
function exportAnbetsu(){
  const lines = calcAnbetsu(selMonth);
  exportCsv('案件別収支_'+selMonth.replace('/','-'),
    ['メーカー','卸先','売上(卸値税抜)','掛率(A)','掛率(卸)',''+NM.co+'仕入','利益額','利益率',''+NM.via+'利益','仕入形態','状態','受注ID'],
    lines.map(l=>[l.brand, l.w, l.sales, l.list>0?(l.cost/l.list).toFixed(3):'', l.list>0?(l.sales/l.list).toFixed(3):'',
      l.cost, l.sales-l.cost-l.via, l.sales>0?((l.sales-l.cost-l.via)/l.sales).toFixed(3):'', l.via||'', l.form||'', l.st, l.oid]));
}

      '<td class="num">'+y(l.cost)+'</td>' +

    }).join('')
  ).join('');
  const w = window.open('', '_blank');
  w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>案件別収支 '+esc(m)+'</title>' +
    '<style>body{font-family:"Hiragino Sans",sans-serif;font-size:11px;margin:24px}h1{font-size:16px}' +

function gauge(label, val, target){

  const over = target>0 && val>=target;
  return '<div class="gauge"><div class="row small"><span>'+label+'</span><span class="right mono">'+yen(val)+'（'+(target>0?Math.round(val/target*100):0)+'%）</span></div>' +
    '<div class="bar-outer" style="height:12px"><div class="bar-inner" style="width:'+(r*100)+'%;background:'+(over?'var(--good)':'var(--s1)')+'"></div></div></div>';
}

// ===== 画面: 受注 =====
function vOrders(){
  const tab = viewState.tab || 'すべて';
  const q = viewState.q || '';
  const ledger = rows('orderLedger');
  // 受注ID単位にグループ
  const groups = {};
  ledger.forEach(r=>{ const id=r['受注ID']; if(!id) return;
    if(!groups[id]) groups[id]={id, rows:[], st:r['ステータス'], date:r['受注日'], w:r['卸先名'], pay:r['支払方式'], form:r['仕入れ形態'], in1:r['入金①日'], in2:r['入金②日'], via:String(r[NM.via+'経由']||'').trim()!==''};
    groups[id].rows.push(r); });
  let list = Object.values(groups).sort((a,b)=>String(b.id).localeCompare(String(a.id)));
  const counts = {'すべて':list.length};
  FLOW.order.forEach(st=>counts[st]=list.filter(g=>g.st===st).length);
  if(tab!=='すべて') list = list.filter(g=>g.st===tab);
  if(q) list = list.filter(g=>JSON.stringify(g.rows).includes(q) || String(g.id).includes(q));

  const staging = rows('orders').length;
  const shipsByOrder = {};
  rows('shipments').forEach(sp=>{ if(sp['受注ID']) shipsByOrder[sp['受注ID']]=sp; });

  // 在庫の充足チェック用: 商品IDごとの残数合計（店販ロットは卸出荷に使わないため除外）
  // ※複数案件が同じ在庫を取り合うケースまでは見ない簡易判定（引去時はサーバー側で正確にチェックされる）
  const stockAvail = {};
  rows('stock').forEach(r=>{
    if(String(r['区分']||'').trim()==='店販') return;
    const pid = String(r['商品ID']||'').trim(); if(!pid) return;
    stockAvail[pid] = (stockAvail[pid]||0) + num(r['残数']);
  });
  // 出荷前の案件に「在庫が揃ったか」バッジを出す対象ステータス（発注後〜出荷前）
  const READY_CHECK_ST = ['振分/発注','回収中','検品/ロット処理中','最終入金待ち','最終入金完了'];
  function readyBadge(g, ship){
    if(ship || !READY_CHECK_ST.includes(g.st)) return '';
    let short = 0;
    g.rows.forEach(r=>{
      const want = num(r['個数']);
      const have = stockAvail[String(r['商品ID']||'').trim()]||0;
      if(have < want) short += want - have;
    });
    return short===0
      ? '<span class="pill" style="background:color-mix(in srgb,var(--good) 18%,transparent);color:var(--good);font-weight:700">📦 在庫OK・出荷できます</span>'
      : '<span class="muted small">📦 在庫待ち（あと'+short+'点）</span>';
  }

  return '<h1>受注管理</h1><div class="sub">案件は「商談中」（見積送付）で始まり、請求書①の発行で自動的に「半金入金待ち」へ進みます</div>' +
  '<div class="row" style="margin-bottom:12px">' +
    (role==='admin' ? '<button class="btn pri" onclick="viewState.newOrder=!viewState.newOrder;render()">＋ 案件作成（JAN貼り付け）</button>' : '') +
    (role==='admin' ? '<button class="btn" onclick="commitOrdersUI()">📥 転記実行分を取込（'+staging+'明細）</button>' : '') +
    '<input class="search" placeholder="検索（卸先・商品・ID）" value="'+esc(q)+'"'+searchAttrs()+'>' +
    '<button class="btn right" onclick="exportTable(\'受注台帳\',\'orderLedger\')">CSV出力</button></div>' +
  (role==='admin' && viewState.newOrder ? newOrderForm() : '') +
  tabsHtml('order', tab, counts) +
  '<div class="row" style="margin-bottom:10px">'+bulkBar('order', list.map(g=>g.id))+'</div>' +
  (list.map(g=>{
    const total = g.rows.reduce((a,r)=>a+num(r['小計（税抜）']),0);
    const ship = shipsByOrder[g.id];
    // 出荷作成は回収・在庫が進んだ段階（最終入金待ち以降）のみ（サーバー側でも同条件でガード）
    const canShip = role==='admin' && !ship && ['最終入金待ち','最終入金完了'].includes(g.st);
    // 開閉状態は viewState.open に記憶（帳票発行などの再描画で閉じてしまわないように）
    const isOpen = viewState.open && viewState.open[g.id];
    return '<details class="ordcard" '+(isOpen?'open':'')+' ontoggle="(viewState.open=viewState.open||{})[\''+g.id+'\']=this.open"><summary>' + selBox(g.id) +
      '<b>'+g.id+'</b> '+pill(g.st)+' '+readyBadge(g, ship)+(g.via?' <span class="pill" style="background:color-mix(in srgb,var(--s5) 14%,transparent);color:var(--s5)">🔁 '+NM.via+'経由</span>':'')+' <span>'+esc(g.w)+'</span><span class="muted small">'+esc(g.date)+' / '+esc(g.pay||'')+' / '+esc(g.form||'')+'</span>' +
      '<span class="right mono"><b>'+yen(total)+'</b> <span class="muted small">税抜</span></span></summary>' +
      '<div style="margin-top:10px">'+journeyHtml(g, ship)+'</div>' +
      '<div class="tblwrap" style="margin-top:8px"><table><tr><th>商品</th><th>容量</th><th class="num">個数</th><th class="num">定価</th><th class="num">掛率</th><th class="num">卸値</th><th class="num">小計(税抜)</th></tr>' +
      g.rows.map(r=>'<tr><td>'+esc(r['商品名'])+'</td><td>'+esc(r['容量'])+'</td><td class="num">'+r['個数']+'</td><td class="num">'+yen(num(r['定価（税抜）']))+'</td><td class="num">'+(isNaN(num(r['掛け率']))||String(r['掛け率']).trim()===''?esc(r['掛け率']):pctDisp(num(r['掛け率'])))+'</td><td class="num">'+yen(num(r['卸値（税抜）']))+'</td><td class="num">'+yen(num(r['小計（税抜）']))+'</td></tr>').join('') +
      '</table></div>' +
      '<div class="row" style="margin-top:10px">' + advanceBtn('order', g.id, g.st) +
      (canShip && !busy('order', g.id) ? '<button class="btn sm" onclick="act(\'createShipment\',{受注ID:\''+g.id+'\'},\'出荷を作成しました\',[\'shipments\'])">🚚 出荷を作成</button>' : '') +
      (ship ? '<span class="small muted">出荷: '+ship['出荷ID']+' '+pill(ship['ステータス'])+'</span>' : '') +
      '<button class="btn sm" onclick="viewState.docFor=(viewState.docFor===\''+g.id+'\'?null:\''+g.id+'\');render()">📄 帳票発行</button>' +
      (role==='admin' ? rollbackBtn('order', g.id, g.st) : '') +
      deleteBtn('order', g.id) +
      '</div>' +
      docFormHtml(g.id) +
      docListHtml(g.id) +
      '</details>';
  }).join('') || '<p class="muted">該当する受注がありません</p>') +
  trashSection('order', 'orderLedger', '受注ID', r=>String(r['卸先名']||'')+' '+String(r['受注日']||''));
}
function tabsHtml(entity, cur, counts, extraTabs, activeExtras){
  const flow = FLOW[entity];
  const done = new Set([flow[flow.length-1]].concat(extraTabs||[]));   // 終端ステータス（extraTabs=ロット処理なし等も終端）は目立たせない
  (activeExtras||[]).forEach(t=>done.delete(t));                        // 例外: EC出品中は販売進行中なので数字を目立たせる
  const tabs = ['すべて'].concat(flow).concat(extraTabs||[]);
  return '<div class="tabs">' + tabs.map(t=>{
    const n = counts[t]||0;
    const hot = t!=='すべて' && !done.has(t) && n>0;   // 未完了ステータスに残件あり = まだ終わっていない案件
    return '<button class="'+(t===cur?'on':'')+'" onclick="setVS(\'tab\',\''+t+'\')">'+t+'<span class="n'+(hot?' hot':'')+'">'+n+'</span></button>';
  }).join('') + '</div>';
}
function journeyHtml(g, ship){
  // 一気通貫ビュー: 受注〜入金〜出荷
  const oi = FLOW.order.indexOf(g.st);
  const steps = [
    ['受注', true],
    ['入金①', !!g.in1 || oi>=2],
    ['振分/発注', oi>=3],     // 回収中に入った = 振り分け・発注済み
    ['回収', oi>=4],          // 検品/ロット処理中に入った = 回収済み
    ['検品/ロット処理', oi>=5],   // 最終入金待ちに入った = 検品・ロット処理済み
    ['入金②', g.st==='最終入金完了'],
    ['引去', !!(ship && FLOW.shipment.indexOf(ship['ステータス'])>=1)],
    ['出荷', !!(ship && ship['ステータス']==='出荷完了')]
  ];
  let nowMarked = false;
  return '<div class="steps">' + steps.map(s=>{
    let cls = 'done';
    if(!s[1]){ cls = nowMarked ? '' : 'now'; nowMarked = true; }
    return '<span class="step"><span class="dot '+cls+'"></span>'+s[0]+'</span>';
  }).join('<span style="color:var(--grid)">—</span>') + '</div>';
}
function advanceBtn(entity, id, st, flowOv){
  if(busy(entity, id)) return busyPill();
  const flow = flowOv||FLOW[entity], i = flow.indexOf(st);
  if(i<0 || i>=flow.length-1) return '';
  const next = flow[i+1];
  if(entity==='hanbai' && next==='お渡し済み'){
    return '<button class="btn pri sm" onclick="handoverUI(\''+id+'\')">→ お渡し済みにする</button>';
  }
  // 回収は行動が伝わるラベルにする（回収済み→検品必須→ロット処理する/しないを選ぶ）
  const label = (entity==='collection' && next==='検品待ち') ? '✔ 回収済み（→ 検品待ち）'
    : (entity==='collection' && next==='ロット処理待ち') ? '✔ 検品完了（→ ロット処理待ち）' : '→ '+next;
  return '<button class="btn pri sm" onclick="act(\'advanceStatus\',{entity:\''+entity+'\',id:\''+id+'\'},\''+id+' を「'+next+'」にしました\')">'+label+'</button>';
}
function rollbackBtn(entity, id, st, flowOv){
  if(busy(entity, id)) return '';
  const flow = flowOv||FLOW[entity], i = flow.indexOf(st);
  if(i<=0) return '';
  return '<button class="btn sm right" onclick="if(confirm(\''+id+' を「'+flow[i-1]+'」に巻き戻しますか？\'))act(\'setStatus\',{entity:\''+entity+'\',id:\''+id+'\',to:\''+flow[i-1]+'\'},\'巻き戻しました\')">↩ 巻き戻し</button>';
}
// ===== 一括ステータス変更（チェックボックス選択） =====
function selBox(id){
  const on = viewState.sel && viewState.sel[id];
  return '<input type="checkbox" '+(on?'checked':'')+' onclick="event.stopPropagation();toggleSel(\''+id+'\',this.checked)" style="width:16px;height:16px">';
}
function toggleSel(id, on){ viewState.sel = viewState.sel||{}; viewState.sel[id]=on; render(); }
function selCount(){ return Object.keys(viewState.sel||{}).filter(k=>viewState.sel[k]).length; }
function bulkBar(entity, ids, extra, noAdvance){
  // noAdvance: 終端ステータスのタブなど「次へ進める」が意味を持たない画面では true
  const n = selCount();
  const selAll = '<button class="btn sm" onclick=\'selectAll('+JSON.stringify(ids||[])+')\'>☑ 表示中を全選択（'+(ids?ids.length:0)+'件）</button>';
  if(!n) return selAll + '<span class="muted small">'+(noAdvance?'選択すると、まとめて操作できます':'選択すると、まとめてステータスを進められます')+'</span>';
  return '<b class="small">'+n+'件選択中</b>' +
    (noAdvance ? '' : '<button class="btn pri sm" onclick="bulkAdvance(\''+entity+'\')">→ 選択をまとめて次へ進める</button>') +
    (extra||'') + selAll +
    '<button class="btn sm" onclick="viewState.sel={};render()">選択解除</button>';
}
function selectAll(ids){ viewState.sel = {}; ids.forEach(id=>viewState.sel[id]=true); render(); }
async function bulkAdvance(entity, to){
  const ids = Object.keys(viewState.sel||{}).filter(k=>viewState.sel[k]);
  if(!ids.length){ toast('対象を選択してください', true); return; }
  const keys = ids.map(id=>entity+':'+id);
  if(keys.some(k=>inflight.has(k))){ toast('選択の中に処理中の案件があります。完了までお待ちください', true); return; }
  // 店販品でお渡し済みへ進む注文が混ざる場合に備えて担当者名を1回だけ聞く（空欄OK）
  let who = '';
  if(entity==='hanbai'){
    const w = prompt('「お渡し済み」になる注文がある場合、お渡し担当者の名前（不要なら空欄のままOK）:', '');
    if(w===null) return;
    who = w.trim();
  }
  keys.forEach(k=>inflight.add(k)); render();   // 選択した案件だけ処理中に。他は操作できる
  try{
    let ok=0; const errs=[];
    for(const id of ids){
      try{ await apiPost('advanceStatus', Object.assign({entity, id}, to?{to}:{}, who?{'担当':who}:{})); ok++; }
      catch(e){ errs.push(id+': '+e.message); }
    }
    viewState.sel = {};
    toast(ok+'件を更新しました'+(errs.length?' ／ 失敗 '+errs.length+'件: '+errs[0]:''), errs.length>0);
    await reload();
  }finally{ keys.forEach(k=>inflight.delete(k)); render(); }
}
// 一括削除（チェックボックス選択→ゴミ箱へ。復元可。誤爆防止に件数の入力を求める）
async function bulkDelete(entity){
  const ids = Object.keys(viewState.sel||{}).filter(k=>viewState.sel[k]);
  if(!ids.length){ toast('対象を選択してください', true); return; }
  const keys = ids.map(id=>entity+':'+id);
  if(keys.some(k=>inflight.has(k))){ toast('選択の中に処理中の案件があります。完了までお待ちください', true); return; }
  const typed = prompt('⚠ 選択中の '+ids.length+'件（'+ids.slice(0,8).join('、')+(ids.length>8?' ほか':'')+'）を削除します。\n行は消えず「ゴミ箱」に入り、あとから復元できます。\n\n削除するには件数「'+ids.length+'」をそのまま入力してください:');
  if(typed===null) return;
  if(typed.trim()!==String(ids.length)){ toast('件数が一致しないため削除を中止しました', true); return; }
  keys.forEach(k=>inflight.add(k)); render();
  try{
    let ok=0; const errs=[];
    for(const id of ids){
      try{ await apiPost('deleteRecord', {entity, id}); ok++; }
      catch(e){ errs.push(id+': '+e.message); }
    }
    viewState.sel = {};
    toast(ok+'件をゴミ箱に入れました'+(errs.length?' ／ 削除できず '+errs.length+'件: '+errs[0]:''), errs.length>0);
    await reload();
  }finally{ keys.forEach(k=>inflight.delete(k)); render(); }
}

// ===== 削除（ゴミ箱方式・管理者のみ） =====
function deleteBtn(entity, id){
  if(role!=='admin' || busy(entity, id)) return '';
  return '<button class="btn sm" style="color:var(--crit)" onclick="deleteUI(\''+entity+'\',\''+id+'\')">🗑 削除</button>';
}
async function deleteUI(entity, id){
  const typed = prompt('⚠ '+id+' を削除します。\n行は消えず「ゴミ箱」に入り、あとから復元できます。\n\n削除するには ID「'+id+'」をそのまま入力してください:');
  if(typed===null) return;
  if(typed.trim()!==String(id)){ toast('IDが一致しないため削除を中止しました', true); return; }
  await act('deleteRecord', {entity, id}, id+' を削除しました（ゴミ箱から復元できます）');
}
// ゴミ箱（削除済み一覧＋復元）。sheetName の削除済み行を idCol でまとめて表示
function trashSection(entity, sheetName, idCol, labelFn){
  if(role!=='admin') return '';
  const deleted = {};
  rowsAll(sheetName).forEach(r=>{
    if(!String(r['削除']||'').trim()) return;
    const id = r[idCol]; if(!id) return;
    if(!deleted[id]) deleted[id] = {id, at:r['削除'], label:labelFn(r)};
  });
  const list = Object.values(deleted);
  if(!list.length) return '';
  const open = viewState.trash ? 'open' : '';
  return '<details class="ordcard" '+open+' ontoggle="viewState.trash=this.open"><summary class="muted small">🗑 ゴミ箱（削除済み '+list.length+'件）— クリックで開閉</summary>' +
    '<table style="margin-top:8px"><tr><th>ID</th><th>内容</th><th>削除日時</th><th></th></tr>' +
    list.map(d=>'<tr><td class="mono">'+esc(d.id)+'</td><td class="small">'+esc(d.label)+'</td><td class="small muted">'+esc(d.at)+'</td>' +
      '<td><button class="btn sm" onclick="act(\'restoreRecord\',{entity:\''+entity+'\',id:\''+d.id+'\'},\''+d.id+' を復元しました\')">↩ 復元</button></td></tr>').join('') +
    '</table></details>';

async function issueDocUI(orderId){
  const kind = document.getElementById('docKind').value;
  const issuer = document.getElementById('docIssuer').value;
  const dateStr = document.getElementById('docDate').value;
  const due1 = document.getElementById('docDue').value;
  const due2 = document.getElementById('docDue2').value;
  if(!dateStr){ toast('発行日を入れてください', true); return; }
  // 対象商品（チェックした商品IDだけを渡す。金額もその分だけで計算される）
  const items = Array.from(document.querySelectorAll('.docItem')).filter(c=>c.checked).map(c=>c.value);
  if(!items.length){ toast('対象商品を1つ以上チェックしてください', true); return; }
  const key = 'order:'+orderId;
  if(inflight.has(key)){ toast('この案件は処理中です。完了までお待ちください', true); return; }
  inflight.add(key); render();   // フォームが「発行中…」表示になる。他の画面・案件はそのまま使える
  try{
    if(kind==='invoiceSet'){
      // 請求書①＋② 一括発行（従来の「半金×2まとめて発行」パターン）
      const r = await apiPost('issueInvoiceSet', {'受注ID':orderId, issuer, dateStr, dueStr1:due1, dueStr2:due2, items});
      DB.docLog = await apiGet('docLog');
      viewState.docFor = null;
      toast('請求書①（'+r.docs[0].docNo+'）と②（'+r.docs[1].docNo+'）を発行しました');
      window.open(r.docs[0].url, '_blank');
      window.open(r.docs[1].url, '_blank');   // ポップアップブロック時は発行済み一覧から開けます
    }else{
      const dueStr = (kind==='invoice2'||kind==='viaInvoice2') ? due2 : due1;   // ②は期限②、①/全額/その他は期限①欄を使う
      const r = await apiPost('issueDocument', {'受注ID':orderId, kind, issuer, dateStr, dueStr, items});
      DB.docLog = await apiGet('docLog');
      viewState.docFor = null;
      toast(r.kindLabel+' '+r.docNo+' を発行しました');
      window.open(r.url, '_blank');
    }
    await reload(['orderLedger']);   // 請求書①/全額の発行で受注ステータスが自動前進するため読み直す

}

// ===== 案件作成グリッド（JAN列を貼る → 商品展開 → 数量列を貼る → 商談中で登録） =====
// 掛け率の自動解決: 卸先マスタのブランド列「ミル(40%)」= ブランド名が「ミル」で始まれば適用。
// 卸先の個別掛け率（セル値）優先、無ければヘッダーの標準掛け率。
function rateFor(wid, brand){
  const headers = (DB.wholesalers&&DB.wholesalers.headers)||[];
  const wh = rows('wholesalers').find(w=>String(w['卸先ID']).trim()===wid);
  for(const h of headers){
    const m = h.match(/^(.+?)\(([\d.]*)%\)$/);
    if(!m) continue;
    const abbr = m[1].trim();
    if(!abbr || !String(brand||'').startsWith(abbr)) continue;
    const own = wh ? num(wh[h]) : 0;
    if(own>0) return own;
    if(m[2]!=='') return Number(m[2])/100;
  }
  return '';
}

function noExpand(){
  const wid = document.getElementById('noW').value;
  viewState.noW = wid;
  viewState.noJansTxt = document.getElementById('noJans').value;
  viewState.noQtyTxt = document.getElementById('noQtys').value;
  const lines = viewState.noJansTxt.split(/\r?\n/).map(s=>s.trim()).filter(s=>s!=='');
  if(!lines.length){ toast('JANを貼り付けてください', true); return; }
  // 数量枠はJANと同じ行順で対応づける（空行は数量未入力のまま）
  const qtys = viewState.noQtyTxt.split(/\r?\n/).map(s=>s.trim());
  viewState.noRows = lines.map((raw,i)=>{
    const qty = qtys[i]!==undefined && qtys[i]!=='' ? qtys[i] : '';
    // JANが無い商品は商品ID（P0135 など）でも引き当てられる
    const isPid = /^P\d{3,}$/i.test(raw);
    const jan = isPid ? raw.toUpperCase() : raw.replace(/\D/g,'');
    const p = isPid
      ? rows('products').find(pp=>String(pp['商品ID']||'').trim().toUpperCase()===raw.toUpperCase())
      : (jan ? rows('products').find(pp=>String(pp['JANコード']||'').replace(/\D/g,'')===jan) : null);
    if(!p) return {jan: raw, pid:'', name:'⚠ 未登録（商品マスタにJAN/商品IDが見つかりません）', size:'', list:0, rate:'', qty};
    const brand = String(p['ブランド']||p['カテゴリー']||'').trim();
    return {jan, pid:String(p['商品ID']).trim(), name:p['商品名'], size:p['容量']||'',
      list:num(p['定価（税抜）']), rate: wid ? rateFor(wid, brand) : '', qty};
  });
  render();
}
// 卸先を変えたら掛け率を引き直す（手入力済みの数量は保持）
function noApplyRates(){
  (viewState.noRows||[]).forEach(r=>{
    if(!r.pid) return;
    const p = product(r.pid);
    const brand = p ? String(p['ブランド']||p['カテゴリー']||'').trim() : '';
    r.rate = viewState.noW ? rateFor(viewState.noW, brand) : '';
  });
  render();
}
function noRecalcRow(i){
  const r = viewState.noRows[i];
  const unit = (r.rate!=='' && r.list) ? Math.round(r.list*num(r.rate)) : 0;
  const s = unit * (num(r.qty)||0);
  const u = document.getElementById('noUnit'+i); if(u) u.textContent = yen(unit);
  const c = document.getElementById('noSubC'+i); if(c) c.textContent = yen(s);
  let sub=0;
  viewState.noRows.forEach(rr=>{
    const uu = (rr.rate!=='' && rr.list) ? Math.round(rr.list*num(rr.rate)) : 0;
    sub += uu * (num(rr.qty)||0);
  });
  const ts = document.getElementById('noTotalSub'); if(ts) ts.textContent = yen(sub);
  const ti = document.getElementById('noTotalIncl'); if(ti) ti.textContent = yen(Math.round(sub*1.1));
}
function noQtyInput(i, v){ viewState.noRows[i].qty = v; noRecalcRow(i); }
// 掛け率は％で入力（65 → 0.65）。移行期の小数入力（0.65）もそのまま受ける（1以下は小数とみなす）
function noRateInput(i, v){ const n=num(v); viewState.noRows[i].rate = v==='' ? '' : (n>1 ? String(n/100) : String(n)); noRecalcRow(i); }
// 数量マスに複数行を貼ったら、そこから下の行へ順に流し込む
function noQtyPaste(e, i){
  const text = (e.clipboardData||window.clipboardData).getData('text');
  const vals = text.split(/\r?\n/).map(s=>s.trim()).filter(s=>s!=='');
  if(vals.length<=1) return;   // 1個だけなら通常の貼り付け
  e.preventDefault();
  vals.forEach((v,k)=>{
    const idx = i+k;
    if(!viewState.noRows[idx]) return;
    viewState.noRows[idx].qty = v;
    const inp = document.querySelector('.noQty[data-i="'+idx+'"]'); if(inp) inp.value = v;
    noRecalcRow(idx);
  });
}

  FLOW.collection.concat(['ロット処理なし']).forEach(st=>counts[st]=list.filter(g=>g.st===st).length);
  if(tab!=='すべて') list = list.filter(g=>g.st===tab);
  const staging = rows('collection').length;
  // 一括バーの追加ボタン。終端ステータス（ロット処理済み/なし）のタブでは
  // 「次へ進める」「ロット処理なしで入庫」を出さない（一括削除だけ残す）
  const terminalTab = (tab==='ロット処理済み' || tab==='ロット処理なし');
  const delBulk = role==='admin' ? '<button class="btn sm" style="color:var(--crit)" onclick="bulkDelete(\'collection\')">🗑 選択をまとめて削除</button>' : '';
  // ロット処理なしの一括は「ロット処理待ち」タブでだけ出す（検品前の箱に誤って使わないように）
  const noLotBulk = (tab==='ロット処理待ち' ? '<button class="btn sm" onclick="bulkAdvance(\'collection\',\'ロット処理なし\')">✔ 選択をロット処理なしで入庫</button>' : '') + delBulk;

  return '<h1>サロン回収・検品</h1><div class="sub">検品→「ロット処理済み」または「ロット処理なし」で在庫台帳へ自動入庫されます（1回収 = 1サロン = 1箱）</div>' +
  '<div class="row" style="margin-bottom:12px">' +
    (role==='admin' ? '<button class="btn pri" onclick="if(confirm(\'サロン回収管理（サロン振り分けの結果）を回収台帳へ取り込みますか？\'))act(\'commitCollection\',{},\'回収を取り込みました\',[\'collectionLedger\'])">📥 サロン振り分け分を取込（'+staging+'明細）</button>' : '') +
    '<button class="btn right" onclick="exportTable(\'回収台帳\',\'collectionLedger\')">CSV出力</button></div>' +
  tabsHtml('collection', tab, counts, ['ロット処理なし']) +
  '<div class="row" style="margin-bottom:10px">'+bulkBar('collection', list.map(g=>g.id), noLotBulk, terminalTab)+'</div>' +
  (list.map(g=>{
    const qty = g.rows.reduce((a,r)=>a+num(r['個数']),0);
    const done = g.st==='ロット処理済み' || g.st==='ロット処理なし';
    // ロット処理なしボタン: 検品完了後（ロット処理待ち）のみ。検品は必ず通す（2026-07-14 指定）
    const noLotBtn = (g.st==='ロット処理待ち' && !busy('collection', g.id))
      ? '<button class="btn sm" onclick="act(\'advanceStatus\',{entity:\'collection\',id:\''+g.id+'\',to:\'ロット処理なし\'},\''+g.id+' をロット処理なしで入庫しました\')">✔ ロット処理なしで入庫</button>' : '';
    // 開閉状態を記憶（未指定なら「処理が終わっていないものは開く」の既定）
    const isOpenC = viewState.open && (g.id in viewState.open) ? viewState.open[g.id] : !done;
    return '<details class="ordcard" '+(isOpenC?'open':'')+' ontoggle="(viewState.open=viewState.open||{})[\''+g.id+'\']=this.open"><summary>' + selBox(g.id) +
      '<b>'+g.id+'</b> '+pill(g.st)+' <span>'+esc(g.salon)+'</span><span class="muted small">'+esc(g.date)+' / '+esc(g.kubun||'卸')+'</span>' +
      (String(g.rows[0]['対象受注']||'').trim() ? '<span class="muted small">📋 '+esc(g.rows[0]['対象受注'])+' 分</span>' : '') +
      '<span class="right mono">'+qty+'点</span></summary>' +
      '<div class="tblwrap" style="margin-top:8px"><table><tr><th>商品</th><th>容量</th><th class="num">個数</th><th>在庫ID</th></tr>' +
      g.rows.map(r=>'<tr><td>'+esc(r['商品名'])+'</td><td>'+esc(r['容量'])+'</td><td class="num">'+r['個数']+'</td><td class="mono small">'+esc(r['在庫ID']||'—')+'</td></tr>').join('') +
      '</table></div>' +
      '<div class="row" style="margin-top:10px">' + advanceBtn('collection', g.id, g.st) + noLotBtn +
      (role==='admin' ? rollbackBtn('collection', g.id, g.st) : '') +
      deleteBtn('collection', g.id) + '</div></details>';
  }).join('') || '<p class="muted">該当する回収がありません</p>') +
  trashSection('collection', 'collectionLedger', '回収ID', r=>String(r['サロン名']||'')+' '+String(r['発注日']||''));
}

// ===== 画面: 在庫 =====
// 余剰在庫の判定: 通常の流通在庫（回収入庫・業者仕入）以外の発生区分（回収残・キャンセル・返品など）
function isSurplus(r){
  const h = String(r['発生区分']||'').trim();
  return h!=='回収入庫' && h!=='業者仕入';
}
function stockTable(list, emptyMsg){
  return '<table><tr><th>在庫ID</th><th>商品</th><th>容量</th><th>区分</th><th>発生</th><th>仕入元</th><th class="num">入庫</th><th class="num">出庫</th><th class="num">残数</th><th class="num">仕入単価</th><th class="num">在庫金額</th><th>入庫日</th></tr>' +
    (list.map(r=>'<tr><td class="mono small">'+esc(r['在庫ID'])+'</td><td>'+esc(r['商品名'])+'</td><td>'+esc(r['容量'])+'</td><td>'+esc(String(r['区分']||'').trim()||'卸')+'</td><td class="small">'+esc(r['発生区分'])+'</td><td class="small">'+esc(r['仕入元名'])+'</td>' +
      '<td class="num">'+r['入庫数']+'</td><td class="num">'+r['出庫済']+'</td><td class="num"><b>'+r['残数']+'</b></td><td class="num">'+yen(num(r['仕入単価（税抜）']))+'</td><td class="num">'+yen(num(r['在庫金額（税抜）']))+'</td><td class="small">'+esc(r['発生日'])+'</td></tr>').join('') || '<tr><td colspan="12" class="muted">'+emptyMsg+'</td></tr>') +
  '</table>';
}
function vStock(){
  const q = viewState.q||'', kubun = viewState.kubun||'すべて', showAll = !!viewState.showAll;
  let list = rows('stock').filter(r=>String(r['在庫ID']||'').trim()!=='');
  if(!showAll) list = list.filter(r=>num(r['残数'])>0);
  if(kubun!=='すべて') list = list.filter(r=>{
    const k = String(r['区分']||'').trim() || '卸';   // 既存の余剰在庫（区分空欄）は卸扱い
    return k===kubun;
  });
  if(q) list = list.filter(r=>JSON.stringify(r).includes(q));
  const main = list.filter(r=>!isSurplus(r));        // 通常在庫（回収入庫・業者仕入）
  const surplus = list.filter(isSurplus);            // 余剰在庫（回収残・キャンセル・返品など）
  const mainValue = main.reduce((a,r)=>a+num(r['在庫金額（税抜）']),0);
  const mainQty = main.reduce((a,r)=>a+num(r['残数']),0);
  const surValue = surplus.reduce((a,r)=>a+num(r['在庫金額（税抜）']),0);
  const surQty = surplus.reduce((a,r)=>a+num(r['残数']),0);

  // 入庫前（回収処理中）の明細。ロット処理済み／ロット処理なしになった瞬間に在庫台帳へ自動入庫される
  const pendingIn = rows('collectionLedger').filter(r=>
    ['回収待ち','検品待ち','ロット処理待ち'].includes(String(r['ステータス']||'').trim()) && String(r['回収ID']||'').trim()!=='');
  const pendQty = pendingIn.reduce((a,r)=>a+num(r['個数']),0);
  const pendHtml =
    '<div class="card tblwrap"><b class="small">🚚 入庫待ち（回収処理中: '+pendingIn.length+'明細・'+pendQty+'点）</b>' +
    '<span class="muted small" style="margin-left:8px">検品して「ロット処理済み」または「ロット処理なし」になると自動でこの下の在庫に入ります</span>' +
    (pendingIn.length ?
      '<div style="margin-top:8px"><table><tr><th>回収ID</th><th>ステータス</th><th>サロン</th><th>商品</th><th>容量</th><th class="num">個数</th><th>発注日</th></tr>' +
      pendingIn.map(r=>'<tr><td class="mono small">'+esc(r['回収ID'])+'</td><td>'+pill(r['ステータス'])+'</td><td class="small">'+esc(r['サロン名'])+'</td><td>'+esc(r['商品名'])+'</td><td>'+esc(r['容量'])+'</td><td class="num">'+r['個数']+'</td><td class="small">'+esc(r['発注日'])+'</td></tr>').join('') +
      '</table></div>'
      : '<p class="muted small" style="margin:6px 0 0">現在、入庫待ちの商品はありません（回収が「回収待ち」「検品待ち」「ロット処理待ち」の間だけここに並びます）</p>') +
    '</div>';

  return '<h1>全体在庫</h1><div class="sub">在庫台帳（入庫 − 出庫ログ = 残数。履歴はすべて残ります）。メインは通常在庫、余剰在庫は下の別枠です</div>' +
  '<div class="kpis">'+kpi('通常在庫（税抜）',yen(mainValue), mainQty+'点 / '+main.length+'ロット')+kpi('余剰在庫（税抜）',yen(surValue), surQty+'点 / '+surplus.length+'ロット')+(pendingIn.length?kpi('入庫待ち（回収処理中）',pendQty+'点', pendingIn.length+'明細'):'')+'</div>' +
  pendHtml +
  '<div class="row" style="margin-bottom:12px">' +
    '<select onchange="viewState.kubun=this.value;render()">'+['すべて','卸','EC','店販'].map(o=>'<option '+(o===kubun?'selected':'')+'>'+o+'</option>').join('')+'</select>' +
    '<label class="small"><input type="checkbox" '+(showAll?'checked':'')+' onchange="viewState.showAll=this.checked;render()"> 残数0（履歴）も表示</label>' +
    '<input class="search" placeholder="検索（商品名・サロン・在庫ID）" value="'+esc(q)+'"'+searchAttrs()+'>' +
    '<button class="btn right" onclick="exportTable(\'在庫台帳\',\'stock\')">CSV出力</button></div>' +
  '<div class="card tblwrap"><b class="small">通常在庫（回収入庫・業者仕入）</b><div style="margin-top:8px">'+stockTable(main,'該当する在庫がありません')+'</div></div>' +
  '<div class="card tblwrap"><b class="small">余剰在庫（回収残・キャンセル・返品など）</b><div style="margin-top:8px">'+stockTable(surplus,'余剰在庫はありません')+'</div></div>' +
  '<div class="card"><b class="small">出庫履歴（最新20件）</b><div class="tblwrap" style="margin-top:8px"><table><tr><th>日付</th><th>在庫ID</th><th>商品</th><th>仕入元（サロン）</th><th class="num">出庫数</th><th>出庫先</th><th>出荷ID</th><th>受注ID</th></tr>' +
    rows('stockLog').filter(r=>String(r['在庫ID']||'').trim()!=='').slice(-20).reverse().map(r=>{
      // 在庫ID → 在庫台帳の仕入元名（どこのサロンから来たロットか）
      const lot = rows('stock').find(z=>String(z['在庫ID']).trim()===String(r['在庫ID']).trim());
      return '<tr><td>'+esc(r['日付'])+'</td><td class="mono small">'+esc(r['在庫ID'])+'</td><td>'+esc(r['商品名'])+'</td><td class="small">'+esc(lot?(lot['仕入元名']||'—'):'—')+'</td><td class="num">'+r['出庫数']+'</td><td>'+esc(r['出庫先'])+'</td><td class="mono small">'+esc(r['出荷ID']||'')+'</td><td class="mono small">'+esc(r['受注ID']||'')+'</td></tr>';
    }).join('') +
  '</table></div></div>';
}

function vHanbai(){
  const tab = viewState.tab || 'すべて';
  let list = rows('hanbaiOrders').filter(r=>String(r['注文ID']||'').trim()!=='').sort((a,b)=>String(b['注文ID']).localeCompare(String(a['注文ID'])));
  const counts = {'すべて':list.length};
  FLOW.hanbai.concat(['EC出品中','完売']).forEach(st=>counts[st]=list.filter(r=>r['ステータス']===st).length);
  if(tab!=='すべて') list = list.filter(r=>r['ステータス']===tab);
  const hbFlowOf = r=>String(r['区分']||'').trim()==='EC' ? FLOW.hanbaiEC : FLOW.hanbai;   // 区分でフローが分かれる（空欄=店販）

  // サロン別月次集計（行クリックで注文明細のアコーディオン）
  const agg = {};
  rows('hanbaiOrders').forEach(r=>{
    if(monthOf(r['注文日'])!==selMonth) return;
    const k=r['サロン名']; if(!k) return;
    if(!agg[k]) agg[k]={n:0, amt:0, items:[]};
    agg[k].n+=num(r['個数']); agg[k].amt+=salonCost(r['商品ID'])*num(r['個数']);
    agg[k].items.push(r);
  });

  const salonOpts = rows('salons').filter(s=>String(s['サロンID']||'').trim()).map(s=>'<option value="'+esc(s['サロンID'])+'">'+esc(s['サロン名(ディーラー含む)']||s['サロン名']||s['サロンID'])+'</option>').join('');
  const prodOpts = rows('products').filter(p=>String(p['商品ID']||'').trim()).map(p=>'<option value="'+esc(p['商品ID'])+'">'+esc(p['商品名'])+(p['容量']?' / '+esc(p['容量']):'')+'</option>').join('');

  return '<h1>店販注文/EC</h1><div class="sub">店販=回収時に同梱→仕分け→次回訪問時にお渡し。EC=入庫してEC出品中で完了（売れたら在庫の出庫ログへ記帳）</div>' +
  (role==='admin' ?
  '<div class="card"><b class="small">新規注文の受付</b><div class="row" style="margin-top:8px">' +
    '<select id="hbKubun" style="width:100px"><option value="店販">店販</option><option value="EC">EC</option></select>' +
    '<select id="hbSalon" style="max-width:220px"><option value="">サロンを選択</option>'+salonOpts+'</select>' +
    '<select id="hbProd" style="max-width:300px"><option value="">商品を選択</option>'+prodOpts+'</select>' +
    '<input id="hbQty" type="number" min="1" value="1" style="width:80px">' +
    '<button class="btn pri" onclick="addHanbaiUI()">受付</button></div></div>' : '') +
  '<div class="row" style="margin-bottom:12px"><button class="btn right" onclick="exportTable(\'店販EC注文\',\'hanbaiOrders\')">CSV出力</button></div>' +
  tabsHtml('hanbai', tab, counts, ['EC出品中','完売'], ['EC出品中']) +
  '<div class="row" style="margin-bottom:10px">'+bulkBar('hanbai', list.map(r=>r['注文ID']))+'</div>' +
  '<div class="card tblwrap"><table><tr><th></th><th>注文ID</th><th>区分</th><th>注文日</th><th>サロン</th><th>商品</th><th class="num">個数</th><th>状態</th><th>お渡し</th><th></th></tr>' +
  (list.map(r=>{
    const id=r['注文ID'], st=r['ステータス'], ec=String(r['区分']||'').trim()==='EC';
    // EC出品中は在庫台帳の残数を表示（売れたボタンの目安）
    const lot = ec ? rows('stock').find(z=>String(z['在庫ID']).trim()===String(r['在庫ID']||'').trim()) : null;
    const zan = lot ? num(lot['残数']) : null;
    const sellBtn = (ec && st==='EC出品中') ? '<button class="btn pri sm" onclick="ecSellUI(\''+id+'\')">💴 売れた</button>' : '';
    // 完売はフロー外の終端なので、巻き戻し用フローにだけ 完売 を足す（進めるボタンには出さない）
    const rbFlow = ec ? FLOW.hanbaiEC.concat(['完売']) : FLOW.hanbai;
    return '<tr><td>'+selBox(id)+'</td><td class="mono">'+id+'</td><td>'+(ec?'<span class="pill" style="background:color-mix(in srgb,var(--s2) 15%, transparent);color:var(--s2)">EC</span>':'<span class="muted small">店販</span>')+'</td><td class="small">'+esc(r['注文日'])+'</td><td>'+esc(r['サロン名'])+'</td><td>'+esc(r['商品名'])+'</td><td class="num">'+r['個数']+'</td><td>'+pill(st)+'</td>' +
    '<td class="small">'+(ec ? (st==='EC出品中'&&zan!=null ? '残 '+zan+'点' : '') : esc(r['お渡し日']||'')+' '+esc(r['お渡し担当']||''))+'</td>' +
    '<td><div class="row">'+sellBtn+advanceBtn('hanbai', id, st, hbFlowOf(r))+(role==='admin'?rollbackBtn('hanbai', id, st, rbFlow):'')+deleteBtn('hanbai', id)+'</div></td></tr>';
  }).join('') || '<tr><td colspan="10" class="muted">注文はまだありません</td></tr>') + '</table></div>' +

  '<div class="card"><div class="row"><b class="small">サロン別 月間注文集計</b> '+monthPicker()+'<span class="muted small">サロンをクリックすると注文明細が出ます</span></div>' +
  '<div class="tblwrap" style="margin-top:8px"><table><tr><th>サロン</th><th class="num">注文点数</th><th class="num">金額（サロン仕入・税抜）</th></tr>' +
  (Object.entries(agg).sort((a,b)=>b[1].amt-a[1].amt).map(([k,v],i)=>{
    const open = (viewState.aggOpen||{})[k];
    let html = '<tr style="cursor:pointer" onclick="aggToggle(this.dataset.k)" data-k="'+esc(k)+'"><td>'+(open?'▾':'▸')+' '+esc(k)+'</td><td class="num">'+v.n+'</td><td class="num">'+yen(v.amt)+'</td></tr>';
    if(open){
      html += '<tr><td colspan="3" style="padding:4px 8px 10px 26px;background:var(--wash)"><table><tr><th>注文ID</th><th>区分</th><th>注文日</th><th>商品</th><th class="num">個数</th><th class="num">金額（サロン仕入・税抜）</th><th>状態</th></tr>' +
        v.items.map(r=>'<tr><td class="mono small">'+r['注文ID']+'</td><td>'+(String(r['区分']||'').trim()==='EC'?'<span class="pill" style="background:color-mix(in srgb,var(--s2) 15%, transparent);color:var(--s2)">EC</span>':'<span class="muted small">店販</span>')+'</td><td class="small">'+esc(r['注文日'])+'</td><td>'+esc(r['商品名'])+(r['容量']?' <span class="muted small">'+esc(r['容量'])+'</span>':'')+'</td>' +
          '<td class="num">'+r['個数']+'</td><td class="num">'+yen(salonCost(r['商品ID'])*num(r['個数']))+'</td><td>'+pill(r['ステータス'])+'</td></tr>').join('') +
        '</table></td></tr>';
    }
    return html;
  }).join('') || '<tr><td colspan="3" class="muted">この月の注文はありません</td></tr>') +
  '</table></div></div>';
}
async function addHanbaiUI(){
  const sid = document.getElementById('hbSalon').value;
  const pid = document.getElementById('hbProd').value;
  const qty = num(document.getElementById('hbQty').value);
  if(!sid || !pid || qty<=0){ toast('サロン・商品・個数を入れてください', true); return; }
  const salon = rows('salons').find(s=>String(s['サロンID']).trim()===sid);

// 割り振り: 選んだサロンへ商品ごとに均等配分（2026-07-14 指定。サロン間の差は最大1単位）。
// 商品マスタ「入数（箱）」が入っている商品は箱単位でのみ配分。空欄=1個ずつ。
let ALLOC = { sel:{}, brand:null, conf:{}, salons:{}, result:{}, q:'' };

function unitOf(pid){ const p=product(pid); const u=p?num(p['入数（箱）']):0; return u>0?u:1; }
function salonLabel(s){ return String(s['サロン名(ディーラー含む)']||s['サロン名']||s['サロンID']||''); }

function allocOrderGroups(){
  const groups = {};
  rows('orderLedger').forEach(r=>{
    const id = String(r['受注ID']||'').trim(); if(!id) return;
    if(!groups[id]) groups[id] = {id, st:String(r['ステータス']||'').trim(), w:r['卸先名'], date:r['受注日'], n:0, brands:new Set()};
    groups[id].n++;
    groups[id].brands.add(brandOf(r['商品ID'])||'（不明）');
  });
  return Object.values(groups).sort((a,b)=>String(b.id).localeCompare(String(a.id)));
}
// 選択した受注 × ブランドの必要商品（商品IDで集約）。
// 入数（箱）は商品マスタの値が初期値（自動補完）。画面で毎回手動上書きできる（ALLOC.conf[brand].units）
function allocItems(brand){
  const units = (ALLOC.conf[brand]||{}).units||{};
  const map = {};
  rows('orderLedger').forEach(r=>{
    if(!ALLOC.sel[String(r['受注ID']||'').trim()]) return;
    const pid = String(r['商品ID']||'').trim();
    if((brandOf(pid)||'（メーカー不明）')!==brand) return;
    if(!map[pid]){
      const ov = num(units[pid]);
      map[pid] = {pid, name:r['商品名'], size:r['容量'], need:0, price:salonCost(pid),
                  unit: ov>0 ? Math.round(ov) : unitOf(pid)};
    }
    map[pid].need += num(r['個数']);
  });
  return Object.values(map).filter(i=>i.need>0);
}
function allocUnit(pid, v){
  const c = ALLOC.conf[ALLOC.brand]=ALLOC.conf[ALLOC.brand]||{};
  (c.units=c.units||{})[pid]=v;
  // 入数が変わると箱の切り方が変わるので、計算済みの結果は破棄して再計算してもらう
  if(ALLOC.result[ALLOC.brand]){ delete ALLOC.result[ALLOC.brand]; toast('入数を変更しました。「🧮 割り振りを計算」を押し直してください'); }
  render();
}
// 均等割り振り: 商品ごとに、選んだサロンへ1単位（箱 or 1個）ずつ順繰りに配る。
// 全サロンに行き渡ってから2周目に入るので、サロン間の差は最大1単位。枠金額と上限は守る（守れない分は余り）
function allocRun(items, salonIds, budget, cap){
  const rem={}, have={}, spent={};
  items.forEach(i=>rem[i.pid]=i.need);
  salonIds.forEach(s=>{ have[s]={}; spent[s]=0; });
  items.forEach((i, idx)=>{
    let placed = true;
    while(placed && rem[i.pid]>=i.unit){
      placed = false;
      for(let k=0; k<salonIds.length; k++){
        const s = salonIds[(k+idx) % salonIds.length];   // 開始サロンを商品ごとにずらす（余りの+1が同じサロンに偏らない）
        if(rem[i.pid]<i.unit) break;
        if(cap && (have[s][i.pid]||0) >= cap) continue;
        if(spent[s] + i.price*i.unit > budget) continue;
        have[s][i.pid]=(have[s][i.pid]||0)+1;
        rem[i.pid]-=i.unit; spent[s]+=i.price*i.unit;
        placed = true;
      }
    }
  });
  const m = {};
  salonIds.forEach(s=>{ m[s]={}; items.forEach(i=>{ const u=(have[s][i.pid]||0)*i.unit; if(u>0) m[s][i.pid]=u; }); });
  return m;
}

function allocCalc(){
  const brand = ALLOC.brand;
  const conf = ALLOC.conf[brand]||{};
  const budget = num(conf.budget);
  const cap = num(conf.cap)||0;
  const salonIds = Object.keys(ALLOC.salons).filter(k=>ALLOC.salons[k]);
  if(!budget){ toast('1サロンの枠金額（円）を入れてください', true); return; }
  if(!salonIds.length){ toast('割り振り先のサロンを選んでください', true); return; }
  const items = allocItems(brand);
  if(!items.length){ toast('このブランドの商品がありません', true); return; }
  ALLOC.result[brand] = { salonIds, items, m: allocRun(items, salonIds, budget, cap), budget, cap };
  render();
}
