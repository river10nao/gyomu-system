<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>業務管理システム</title>
<style>
/* ===== デザイントークン（light/dark） ===== */
:root{
  --page:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --ring:rgba(11,11,11,.10);
  --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; --s4:#008300; --s5:#4a3aa7; --s6:#e34948;
  --good:#0ca30c; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b;
  --ec:#d6488f;   /* EC出品中バッジ専用ピンク（緑系ステータスと紛れないための独立色） */
  --accent:#2a78d6; --accent-ink:#fff; --wash:rgba(42,120,214,.08);
}
/* 表示モード: data-theme 未指定=OS設定に従う(自動)、light/dark=手動固定 */
:root[data-theme="dark"]{
  --page:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --axis:#383835; --ring:rgba(255,255,255,.10);
  --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s5:#9085e9; --s6:#e66767;
  --accent:#3987e5; --wash:rgba(57,135,229,.14); --ec:#e0569c;
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --page:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --axis:#383835; --ring:rgba(255,255,255,.10);
    --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s5:#9085e9; --s6:#e66767;
    --accent:#3987e5; --wash:rgba(57,135,229,.14); --ec:#e0569c;
  }
}
*{box-sizing:border-box;margin:0}
/* スマホSafariが横スクロールブロックの文字を勝手に拡大するのを止め、CSS指定サイズに全体を揃える */
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{background:var(--page);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI","Hiragino Sans",sans-serif;font-size:14px;line-height:1.6}
button{font:inherit;cursor:pointer}
input,select{font:inherit;color:var(--ink);background:var(--surface);border:1px solid var(--axis);border-radius:8px;padding:7px 10px}
input:focus,select:focus{outline:2px solid var(--accent);outline-offset:-1px}
a{color:var(--accent)}

/* ===== レイアウト ===== */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}
nav{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--grid);padding:14px 10px;position:sticky;top:0;height:100vh;overflow-y:auto}
nav .brand{font-weight:700;font-size:16px;padding:6px 10px 14px}
nav .brand small{display:block;color:var(--muted);font-weight:400;font-size:11px}
nav button{display:flex;align-items:center;gap:8px;width:100%;text-align:left;border:0;background:none;color:var(--ink2);padding:9px 12px;border-radius:8px;font-size:13.5px}
nav button:hover{background:var(--wash)}
nav button.on{background:var(--wash);color:var(--accent);font-weight:600}
nav .foot{margin-top:14px;border-top:1px solid var(--grid);padding-top:10px;font-size:11.5px;color:var(--muted);padding-left:10px}
main{flex:1;padding:22px 26px;max-width:1240px;min-width:0}
h1{font-size:19px;margin-bottom:4px}
.sub{color:var(--muted);font-size:12.5px;margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:16px;margin-bottom:14px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.grow{flex:1}
.right{margin-left:auto}

/* ===== 部品 ===== */
.btn{border:1px solid var(--axis);background:var(--surface);color:var(--ink);border-radius:8px;padding:7px 14px}
.btn:hover{background:var(--wash)}
.btn.pri{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.btn.pri:hover{opacity:.9}
.btn.sm{padding:4px 10px;font-size:12.5px;border-radius:7px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.tabs button{border:0;background:none;color:var(--ink2);padding:7px 13px;border-radius:20px;font-size:13px}
.tabs button.on{background:var(--accent);color:#fff;font-weight:600}
.tabs button .n{opacity:.75;font-size:11.5px;margin-left:3px}
.tabs button .n.hot{opacity:1;background:var(--warn);color:#3d2c00;font-weight:700;border-radius:10px;padding:1px 7px}
nav button .nb, #mnav button .nb{margin-left:6px;font-size:11px;background:var(--warn);color:#3d2c00;font-weight:700;border-radius:10px;padding:1px 7px;display:inline-block}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;border-bottom:1px solid var(--grid);padding:6px 8px;white-space:nowrap}
td{border-bottom:1px solid var(--grid);padding:7px 8px;vertical-align:top}
tr:last-child td{border-bottom:0}
tr.nb td{border-bottom:0}   /* 下のボタン行とセットで1件に見せる（出荷一覧の2段レイアウト用） */
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.tblwrap{overflow-x:auto}
/* マスタ等の縦長テーブル: ヘッダー行を固定し、セルは折り返さず長文は…で省略 */
.tblwrap.sticky{max-height:72vh;overflow:auto;padding-top:0}  /* 上paddingを消してヘッダーを容器の最上端に密着させる */
.tblwrap.sticky th{position:sticky;top:0;background:var(--surface);z-index:2;box-shadow:0 1px 0 var(--grid);padding-top:14px}
.tblwrap.sticky td{white-space:nowrap;max-width:280px;overflow:hidden;text-overflow:ellipsis}
.vline{border-left:1px solid var(--grid)}   /* 掛け率などの列を縦罫線で区切る */
.pill{display:inline-block;border-radius:20px;padding:2px 10px;font-size:11.5px;font-weight:600;white-space:nowrap}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:14px 16px}
.kpi .l{color:var(--muted);font-size:11.5px;font-weight:600}
.kpi .v{font-size:24px;font-weight:700;margin-top:2px}
.kpi .d{font-size:11.5px;color:var(--ink2);margin-top:2px}
.bar-outer{background:var(--grid);border-radius:6px;height:10px;overflow:hidden}
.bar-inner{height:100%;border-radius:6px;background:var(--s1)}
.steps{display:flex;gap:3px;align-items:center;flex-wrap:wrap;font-size:10.5px;color:var(--muted)}
.step{display:flex;align-items:center;gap:3px}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--grid);border:1px solid var(--axis);vertical-align:-1px}
.dot.done{background:var(--good);border-color:var(--good)}
.dot.now{background:var(--accent);border-color:var(--accent)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--page);padding:10px 20px;border-radius:10px;font-size:13px;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:90vw}
.toast.err{background:var(--crit);color:#fff}
.search{min-width:220px}
.muted{color:var(--muted)}
.small{font-size:12px}
.mono{font-variant-numeric:tabular-nums}
.ordcard{border:1px solid var(--grid);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.ordcard summary{cursor:pointer;list-style:none;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.ordcard summary::-webkit-details-marker{display:none}
.chart{width:100%}
.gauge{margin-bottom:10px}
.loading{position:fixed;inset:0;background:var(--page);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:50;font-size:14px;color:var(--ink2)}
/* ログイン */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px}
#login .box{background:var(--surface);border:1px solid var(--ring);border-radius:14px;padding:30px;width:100%;max-width:360px}
#login h1{margin-bottom:14px}
/* モバイル */
#mnav{display:none}
@media (max-width:760px){
  nav{display:none}
  main{padding:14px;padding-bottom:74px}
  #mnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--grid);z-index:40;overflow-x:auto}
  #mnav button{flex:1;border:0;background:none;color:var(--ink2);padding:9px 4px;font-size:10.5px;min-width:62px}
  #mnav button.on{color:var(--accent);font-weight:700}
  .kpi .v{font-size:19px}
  /* KPIカード: 170px基準だと375px幅で1列に落ちて縦に間延びするため、モバイルはやや狭い基準で2列を確保 */
  .kpis{grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:8px}
  .kpi{padding:11px 12px}
  /* 受注カードの一気通貫ビュー（journey）: ステップ数が多く折り返すと矢印の対応関係が崩れるため、
     モバイルは折り返しをやめて横スクロールに切り替える（内容は変えずスクロールで全部見られるようにする） */
  .journey{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px;margin:-2px -2px 0}
  .journey .step{flex:0 0 auto}
  .journey span[style*="color:var(--grid)"]{flex:0 0 auto}
  /* 資金繰りバーのセグメント内ラベル（卸先名/ブランド ¥金額）は幅が狭くなるほど読めなくなるため、
     モバイルはバーを少し高くしてラベル文字を小さくし、はみ出しはタップ/長押しのtitleで確認する運用にする */
  .cashbar{height:26px}
  .cashbar > div{font-size:9.5px!important;line-height:26px!important}
  /* テーブル全般: フォントを一段階詰めて横スクロール量を減らす */
  table{font-size:12px}
  th{font-size:11px;padding:5px 6px}
  td{padding:6px 6px}
  /* 各セルは折り返さず横書きのまま保つ（列幅に押されて商品名などが縦1文字ずつになるのを防ぐ）。
     はみ出す分はページ全体ではなく、テーブルの入れ物の中で横スクロールさせる */
  th, td{white-space:nowrap}
  /* スクロール用の入れ物(.tblwrap)を持たない素のテーブルは、自身を横スクロール箱にして
     はみ出しをテーブル内で吸収する（ページ全体が横スクロールになるのを避ける） */
  table{display:block; overflow-x:auto; -webkit-overflow-scrolling:touch; max-width:100%}
  /* .tblwrap の中のテーブルは入れ物側(overflow-x:auto)がスクロールを担うので通常のテーブル表示に戻す
     （ヘッダー固定 .tblwrap.sticky や、長文セルの…省略もそのまま維持される） */
  .tblwrap table{display:table; overflow:visible; max-width:none}
  .ordcard summary{gap:6px}
  .ordcard summary .right{flex-basis:100%;text-align:right}
}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <h1>業務管理システム</h1>
    <p class="muted small" style="margin-bottom:12px">合言葉を入力してください</p>
    <input type="password" id="tokenInput" placeholder="合言葉" style="width:100%;margin-bottom:12px">
    <button class="btn pri" style="width:100%" onclick="doLogin()">ログイン</button>
    <p id="loginMsg" class="small" style="color:var(--crit);margin-top:10px"></p>
  </div>
</div>

<div id="app">
  <div class="shell">
    <nav id="sidenav"></nav>
    <main id="main"></main>
  </div>
  <div id="mnav"></div>
</div>
<div id="loadbox" class="loading" style="display:none"><div>データ読み込み中…</div><div class="small muted" id="loadmsg"></div></div>

<script>
'use strict';
// ===== 設定 =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx6bDkmNDTgS4AWuKdJB3l5fNM39wxrK62HmUftkrEtK6QZW20_oTz79zFZfaZuXy72/exec';   // 2026-07-18 専用アカウントへ移行（旧URLはロールバック用に併存）
// 合言葉はこのファイル（公開ページ）には置かない。照合と役割判定はGAS側の whoami アクションで行う
const BRAND_FEE = 5000, DEFAULT_QUOTA = 200000, MTG_BRAND = 'MTG', TAX = 0.10;
// 入金が済んだ状態か（最終入金完了 or その先の納品完了。2026-07-18 納品完了追加に伴う共通判定）
const paidDone = st=>['最終入金完了','納品完了'].includes(String(st||'').trim());
// 旧スプシ転記フローの一括取り込みボタン表示（2026-07-18 ユーザー要望で非表示。復活はここを true にするだけ）
const SHOW_LEGACY_IMPORT = false;
const FLOW = {
  order:      ['商談中','半金入金待ち','振分/発注','回収中','検品/ロット処理中','最終入金待ち','最終入金完了','納品完了'],   // 納品完了=出荷完了が条件の終端（2026-07-18）
  collection: ['回収待ち','検品待ち','ロット処理待ち','ロット処理済み'],
  shipment:   ['引去確認待ち','引去済','出荷手配中','出荷完了'],
  hanbai:     ['受付','ディーラー発注済','預かり中','お渡し済み'],
  hanbaiEC:   ['受付','ディーラー発注済','EC出品中']   // 区分=EC はEC出品中で終端。売れたら「売れた」ボタンで出庫記帳→残0で「完売」（フロー外の終端）
};
const STATUS_COLOR = {
  '商談中':'var(--s5)','半金入金待ち':'var(--s3)','振分/発注':'var(--s1)',
  '回収中':'var(--s1)','検品/ロット処理中':'var(--s5)',
  '最終入金待ち':'var(--s3)','最終入金完了':'var(--s1)','納品完了':'var(--good)',
  '回収待ち':'var(--serious)','検品待ち':'var(--s3)','ロット処理待ち':'var(--s1)','ロット処理済み':'var(--good)','ロット処理なし':'var(--s2)',
  '引去確認待ち':'var(--s3)','引去済':'var(--s1)','出荷手配中':'var(--s5)','出荷完了':'var(--good)',
  '受付':'var(--s3)','ディーラー発注済':'var(--s1)','預かり中':'var(--s5)','お渡し済み':'var(--good)','EC出品中':'var(--ec)','完売':'var(--good)'
};

// ===== 状態 =====
let token = localStorage.getItem('gyomu_biz_token') || '';
// 取引先・サービスの名称はコードに直書きせず、ログイン成功時にサーバー（GAS）から受け取る
let NM = { co:'', via:'', spay:'', boxBrand:'', credit:'' };
let role = '';
let userName = '';   // 合言葉は1人1つ。whoami が返す名前（操作ログ・表示用）
const DB = {};          // シート名 -> {headers, rows}
let view = 'dashboard';
let viewState = {};     // 画面ごとのタブ・検索など
let selMonth = new Date().toLocaleDateString('sv-SE').slice(0,7).replace('-','/');

// ===== API =====
async function apiGet(action, params){
  const q = new URLSearchParams(Object.assign({action, token}, params||{}));
  const res = await fetch(GAS_URL + '?' + q.toString());
  const j = await res.json();
  if(!j.ok) throw new Error(j.error);
  return j.data;
}
async function apiPost(action, payload, refresh){
  // 起動直後の裏読み込み中（スナップショット表示中）は書き込みさせない（古いデータを見たまま操作する事故防止）
  if(!dbFresh) throw new Error('最新データを読み込み中です。数秒待ってからもう一度お試しください');
  // Content-Type を text/plain にして CORS プリフライトを回避（GAS は OPTIONS を扱えない）
  // refresh: 指定したシートの最新データを応答に同梱してもらう（書き込み→読み直しを1往復にする高速化）
  const res = await fetch(GAS_URL, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({token, action, payload: payload||{}, refresh: (refresh&&refresh.length)?refresh:undefined})});
  const j = await res.json();
  if(!j.ok) throw new Error(j.error);
  if(j.sheets){ Object.assign(DB, j.sheets); saveSnap(); }
  return j.data;
}

// ===== ログイン =====
// 合言葉の照合はサーバー（GAS）側。whoami が {role:'admin'|'staff', name:'十河'} を返す
async function whoami(t){
  const q = new URLSearchParams({action:'whoami', token:t});
  const res = await fetch(GAS_URL + '?' + q.toString());
  const j = await res.json();
  return (j.ok && j.data && j.data.role) ? j.data : null;
}
async function doLogin(){
  const t = document.getElementById('tokenInput').value.trim();
  const msg = document.getElementById('loginMsg');
  if(!t){ msg.textContent = '合言葉を入れてください'; return; }
  msg.textContent = '確認中…';
  let r = null;
  try{ r = await whoami(t); }
  catch(e){ msg.textContent = '通信エラー。少し待ってやり直してください'; return; }
  if(!r){ msg.textContent = '合言葉が違います'; return; }
  token = t; role = r.role; userName = r.name || ''; if(r.names) NM = r.names; localStorage.setItem('gyomu_biz_token', t);
  msg.textContent = '';
  boot();
}
function logout(){ localStorage.removeItem('gyomu_biz_token'); localStorage.removeItem('gyomu_biz_snap'); location.reload(); }

// ===== 表示モード（ライト / ダーク / 自動=OS設定。端末ごとに記憶・既定はライト 2026-07-18 ユーザー指定） =====
function themePref(){ return localStorage.getItem('gyomu_biz_theme') || 'light'; }
function applyTheme(){
  const t = themePref();
  if(t==='auto') delete document.documentElement.dataset.theme;
  else document.documentElement.dataset.theme = t;
}
function themeLabel(){
  const t = themePref();
  return t==='light' ? '☀️ 表示: ライト' : t==='dark' ? '🌙 表示: ダーク' : '🌓 表示: 自動（OS設定）';
}
function cycleTheme(){
  const t = themePref();
  const next = t==='light' ? 'dark' : t==='dark' ? 'auto' : 'light';
  localStorage.setItem('gyomu_biz_theme', next);
  applyTheme(); render();
}
applyTheme();

async function boot(){
  if(token && !role){
    // 保存済みの合言葉から役割・名前を復元（照合はGAS側）。
    // 合言葉が無効なときだけ消す。通信エラー（電波不良・GAS一時不調）では合言葉を保持して再試行画面を出す
    let r = null, netFail = false;
    try{ r = await whoami(token); }catch(e){ netFail = true; }
    if(r){ role = r.role; userName = r.name || ''; if(r.names) NM = r.names; }
    else if(!netFail){ token=''; localStorage.removeItem('gyomu_biz_token'); }
    else{
      document.getElementById('loadbox').style.display='flex';
      document.getElementById('loadbox').innerHTML = '<div>通信できませんでした（ログイン情報は保持しています）</div><button class="btn" onclick="location.reload()">再読み込み</button>';
      return;
    }
  }
  if(!role){ document.getElementById('login').style.display='flex'; return; }
  if(NM.co) document.title = NM.co+' 業務管理システム';   // 社名はログイン後にだけ出す（公開HTMLには載せない）
  document.getElementById('login').style.display='none';
  document.getElementById('loadbox').style.display='flex';
  try{
    const snap = loadSnap();
    if(snap){
      // 前回のデータで即表示し、裏で最新化（最新化が終わるまで書き込み操作はガード＝dbFresh）
      Object.assign(DB, snap.db);
      document.getElementById('app').style.display='block';
      renderNav(); render();
      loadAll().then(()=>{ renderNav(); render(); })
        .catch(()=>toast('最新データの取得に失敗しました。「🔄 データ更新」を押してください', true));
    }else{
      await loadAll();
      document.getElementById('app').style.display='block';
      renderNav(); render();
    }
  }catch(e){
    document.getElementById('loadbox').innerHTML = '<div>読み込みに失敗しました: '+esc(e.message)+'</div><button class="btn" onclick="location.reload()">再読み込み</button>';
    return;
  }
  document.getElementById('loadbox').style.display='none';
}

// 起動時に全データを並列ロード → 以後の検索・絞込みはブラウザ内で即時
const SHEETS = ['products','wholesalers','salons','orderLedger','collectionLedger','shipments','hanbaiOrders','stock','stockLog','monthlyGoals','quotaMaster','orders','collection','docLog','alerts','allocDrafts','salonPayLog'];
// alerts はGAS側で6シート読む一番重い項目（単体約4秒）なので、起動・全読み直しの完了を待たせず後から差し込む
const CORE_SHEETS = SHEETS.filter(n => n !== 'alerts');
let dbFresh = false;   // 保存スナップショットで先に画面を出している間は false（書き込み操作をガード）

// 📖 操作マニュアル: Driveの「業務マニュアル」フォルダの最新ファイルをGAS経由で取得してダウンロード
// （リンク共有は使わない=ログインした人だけが取得できる。更新はフォルダにファイルを入れ替えるだけ）
let manualBusy = false;
async function downloadManual(){
  if(manualBusy) return;
  manualBusy = true;
  toast('マニュアルを取得しています…（数秒かかります）');
  try{
    const d = await apiGet('manualFile');
    const bytes = Uint8Array.from(atob(d.base64), c=>c.charCodeAt(0));
    const url = URL.createObjectURL(new Blob([bytes], {type: d.mime||'application/pdf'}));
    const a = document.createElement('a');
    a.href = url; a.download = d.name; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 60000);
    toast('マニュアル（'+d.updated+' 更新）をダウンロードしました');
  }catch(e){ toast(e.message, true); }
  finally{ manualBusy = false; }
}

// ===== 共通ヘルパ =====
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function yen(n){ return n==null||isNaN(n) ? '—' : '¥' + Math.round(n).toLocaleString(); }
function num(v){ if(typeof v==='number') return v; const n=parseFloat(String(v||'').replace(/[,¥￥%％\s]/g,'')); return isNaN(n)?0:n; }
function monthOf(d){
  const s = String(d||'').trim().replace(/-/g,'/');
  const m = s.match(/^(\d{4})\/(\d{1,2})(?:\/(\d{1,2})(?:[ T].*)?)?$/);
  if(!m) return '';
  const y = Number(m[1]), mo = Number(m[2]), day = m[3] ? Number(m[3]) : null;
  if(mo < 1 || mo > 12) return '';
  if(day!==null){
    const dt = new Date(y, mo-1, day);
    if(day < 1 || dt.getFullYear()!==y || dt.getMonth()!==mo-1 || dt.getDate()!==day) return '';
  }
  return y+'/'+String(mo).padStart(2,'0');
}
function today(){ return new Date().toLocaleDateString('sv-SE').replace(/-/g,'/'); }
// rows() は削除済み（ソフト削除フラグあり）の行を自動で除外する。ゴミ箱表示だけ rowsAll() を使う
function rowsAll(name){ return (DB[name]&&DB[name].rows)||[]; }
function rows(name){ return rowsAll(name).filter(r=>!String(r['削除']||'').trim()); }
// ベタ塗り（白文字）で出すステータス。EC出品中は薄緑のお渡し済み/完売と紛れやすいため（2026-07-20 ユーザー指定・ピンク）

// 検索欄の共通入力ハンドラ。日本語入力（IME）の変換中は再描画しない
// （変換中に描き直すと入力途中の語が「nな」のように壊れるため。確定した瞬間に絞り込む）
// 注意: oncompositionstart はHTML属性ではブラウザが発火しないため、document への委任で拾う
let imeComposing = false;
function searchIn(v, target){
  if(target==='alloc') ALLOC.q = v;
  else if(String(target||'').indexOf('allocg')===0) (ALLOC.qg=ALLOC.qg||{})[target.slice(6)] = v;   // 振り分けグループ別のサロン絞り込み
  else viewState.q = v;
  if(!imeComposing) render();
}
function searchAttrs(target){
  return ' data-starget="'+(target||'')+'" oninput="searchIn(this.value, this.dataset.starget)"';
}
document.addEventListener('compositionstart', e=>{
  if(e.target && e.target.classList && e.target.classList.contains('search')) imeComposing = true;
}, true);
document.addEventListener('compositionend', e=>{
  const t = e.target;
  if(t && t.classList && t.classList.contains('search')){ imeComposing = false; searchIn(t.value, t.dataset.starget); }
}, true);
function toast(msg, err){
  const t = document.createElement('div'); t.className = 'toast'+(err?' err':''); t.textContent = msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), err?6000:3500);
}
// レコード単位の処理中ロック。処理中は「その対象」だけ操作不可で、他の案件・画面切替・検索は自由。
// 同じ対象への二重送信は従来どおりブロック（サーバー側のLockServiceによる直列処理も従来どおり）
const inflight = new Set();   // 例: 'order:O0006' / 'collection:K0012' / ID を持たない操作は操作名
function actKey(action, payload){
  const p = payload || {};
  if(p.entity && p.id) return p.entity + ':' + p.id;
  if(p['受注ID']) return 'order:' + p['受注ID'];
  if(p['注文ID']) return 'hanbai:' + p['注文ID'];
  if(p.url) return 'doc:' + p.url;
  return action;
}
function busy(entity, id){ return inflight.has(entity + ':' + id); }
// 操作が影響するシートの推定（entityベース）。now=応答に同梱して即反映（1往復）／later=裏で更新（在庫系は次の画面遷移までに届けば足りる）
const ENTITY_SHEETS = {
  order:      {now:['orderLedger'], later:[]},
  collection: {now:['collectionLedger'], later:['orderLedger','stock','stockLog']},   // 受注の自動前進・入庫の反映は裏読み（回収画面の反映を最優先）
  shipment:   {now:['shipments'], later:['orderLedger','stock','stockLog']},
  hanbai:     {now:['hanbaiOrders'], later:['stock','stockLog']}
};
function sheetsFor(action, payload){
  const ent = payload && payload.entity;
  return (ent && ENTITY_SHEETS[ent]) ? ENTITY_SHEETS[ent] : null;
}
// 裏読み: 指定シートを並列取得して届き次第画面へ反映（操作の完了は待たせない）
function refreshSoon(names){
  if(!names || !names.length) return;
  Promise.all(names.map(async n => { DB[n] = await apiGet(n); }))
    .then(()=>{ saveSnap(); render(); }).catch(()=>{});
}
function busyPill(){ return '<span class="pill" style="background:color-mix(in srgb,var(--muted) 15%, transparent);color:var(--muted)">⏳ 処理中…</span>'; }
async function act(action, payload, okMsg, reloadNames){
  const key = actKey(action, payload);
  if(inflight.has(key)){ toast('この対象は処理中です。完了までお待ちください', true); return; }
  inflight.add(key); render();   // 対象カードだけ「処理中…」表示になる
  try{
    const spec = sheetsFor(action, payload);
    const names = reloadNames || (spec && spec.now);
    if(names){
      // 影響シートが分かる操作は応答に最新シートを同梱してもらい往復1回で完結。在庫系・要対応（重い）は裏で更新
      const r = await apiPost(action, payload, names);
      toast(okMsg || '完了しました');
      if(spec && !reloadNames) refreshSoon(spec.later);
      refreshAlerts();
      return r;
    }
    // 影響範囲を特定できない操作は従来通り全読み直し
    const r = await apiPost(action, payload);
    toast(okMsg || '完了しました');
    await reload();
    return r;
  }catch(e){ toast(e.message, true); }
  finally{ inflight.delete(key); render(); }
}
// 商品情報ルックアップ
function product(pid){ return rows('products').find(p=>String(p['商品ID']).trim()===String(pid).trim()); }
function brandOf(pid){ const p=product(pid); if(!p) return ''; return String(p['ブランド']||p['カテゴリー']||'').trim(); }
function ownCost(pid){ const p=product(pid); return p?num(p[''+NM.co+'仕入価格（税抜）']):0; }
function salonCost(pid){ const p=product(pid); return p?num(p['サロン仕入価格（税抜）']):0; }

// CSVエクスポート（UTF-8 BOM + CRLF。Excelで文字化けしない）
function exportCsv(filename, headers, rowArrays){
  const csv = [headers].concat(rowArrays).map(r=>r.map(c=>{
    const s = String(c==null?'':c); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\r\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = filename + '_' + today().replace(/\//g,'-') + '.csv'; a.click();
}
function exportTable(name, sheetName, filter){
  const d = DB[sheetName]; if(!d) return;
  const rs = filter ? d.rows.filter(filter) : d.rows;
  exportCsv(name, d.headers, rs.map(r=>d.headers.map(h=>r[h])));
}

// ===== ナビ =====
// ナビは関数で組む（サロン支払のラベルにサーバーから受け取る名称を使うため、ログイン後に評価する）
const NAVS = ()=>[
  ['dashboard','📊 ダッシュボード'], ['orders','📋 受注'], ['allocation','🧮 振り分け'],
  ['collection','📦 回収・検品'],
  ['stock','🏷 在庫'], ['shipments','🚚 出荷'], ['hanbai','🛍 店販/EC'],
  ['payments','💰 '+NM.co+'支払い'],
  ['salonpay','💴 '+NM.spay+'支払'], ['quota','📐 仕入枠'], ['masters','⚙️ マスタ管理'],
  ['opslog','📝 操作ログ']
];
const ADMIN_ONLY_NAVS = ['opslog'];   // 2026-07-15 ユーザー指定: 一旦全員フルアクセス・操作ログ閲覧だけ管理者限定
// 左ナビのバッジ: 各画面の「動いている案件」数（終端ステータス以外・削除除く・ID単位）
function navCounts(){
  const uniq = (rws, idCol, pred)=>{ const st_ = new Set(); rws.forEach(r=>{ const id=String(r[idCol]||'').trim(); if(!id) return; const st=String(r['ステータス']||'').trim(); if(st && pred(st)) st_.add(id); }); return st_.size; };
  return {
    orders:     uniq(rows('orderLedger'),      '受注ID', st=>st!=='納品完了'),   // 納品完了までが「動いている案件」（2026-07-18）
    collection: uniq(rows('collectionLedger'), '回収ID', st=>st!=='ロット処理済み' && st!=='ロット処理なし'),
    shipments:  uniq(rows('shipments'),        '出荷ID', st=>st!=='出荷完了'),
    // 店販EC = 動いている注文 ∪ 請求書送付待ち（終端まで進んでいても送付するまでバッジに残す・2026-07-19）
    hanbai:     (()=>{ const s = new Set();
      rows('hanbaiOrders').forEach(r=>{ const id=String(r['注文ID']||'').trim(); const st=String(r['ステータス']||'').trim();
        if(id && st && st!=='お渡し済み' && st!=='完売') s.add(id); });
      invoicePend().forEach(r=>s.add(String(r['注文ID']||'').trim()));
      return s.size; })(),
    // 振り分けは下書き数ではなく「振分が終わっていない案件」数（2026-07-18 ユーザー指定）
    allocation: (()=>{ const cov = allocCoverage();
      return allocOrderGroups().filter(g=>!(g.brands.size>0 && [...g.brands].every(b=>{ const e=(cov[g.id]||{})[b]; return e&&e.done; }))).length; })(),
    // MTG前払いアラート: 未完了×回収がまだ入庫まで進んでいないMTG案件の数。
    // 支払い画面とサロン精算画面で別フラグ（連動しない・2026-07-18 ユーザー指定）
    payments: mtgPendCount('co'), salonpay: mtgPendCount('spay')
  };
}
function mtgPendCount(side){ return mtgPrepayGroups(side).pend.length; }
// MTG前払いの状況を「案件」単位でまとめる（対象受注が同じ回収はまとめて1件。2026-07-18 ユーザー指定「1案件に1ボタン」）
// 受注に紐づかない手動仕入れは回収IDごとに1件。金額=サロン仕入価格×個数（前払い原資）
// side='co'（会社支払い画面）と side='spay'（サロン精算画面）は別フラグで連動しない（2026-07-18 ユーザー指定）:
//   co=「MTG前払い済」列（会社→精算代行への原資支払い） / spay=「MTG振込済」列（精算代行→サロンへの事前振込）
function mtgPrepayGroups(side){
  const colName = side==='spay' ? 'MTG振込済' : 'MTG前払い済';
  const term = st=>st==='ロット処理済み'||st==='ロット処理なし';
  const by = {};
  rows('collectionLedger').forEach(r=>{
    const pid = String(r['商品ID']||'').trim();
    if(brandOf(pid)!=='MTG') return;
    const kid = String(r['回収ID']||'').trim(); if(!kid) return;
    const oids = String(r['対象受注']||'').trim();
    const key = oids || kid;   // 案件キー: 対象受注（同じ受注の回収はまとめる）。無ければ回収ID単体
    const g = by[key]=by[key]||{key, oids, kids:new Set(), salons:new Set(), amt:0, n:0, marked:0, active:0, doneAt:''};
    g.kids.add(kid); if(String(r['サロン名']||'').trim()) g.salons.add(String(r['サロン名']).trim());
    g.amt += salonCost(pid)*num(r['個数']); g.n++;
    const mk = String(r[colName]||'').trim();
    if(mk){ g.marked++; g.doneAt = mk; }
    if(!term(String(r['ステータス']||'').trim())) g.active++;
  });
  const all = Object.values(by);
  return { pend: all.filter(g=>g.marked<g.n && g.active>0), done: all.filter(g=>g.marked>=g.n) };
}
function mtgDone(kidsCsv, off, label, side){
  const what = side==='spay' ? 'サロンへの事前振込' : 'MTG前払い';
  if(!off && !confirm(label+' の'+what+'を完了にしますか？')) return;
  const kids = String(kidsCsv||'').split(',').filter(Boolean);
  act('setMtgPrepaid', {kids, side: side==='spay'?'spay':'co', ...(off?{off:true}:{})},
    off?'完了を取り消しました':what+'を完了にしました', ['collectionLedger']);
}
// 請求書送付チェック（2026-07-19 ユーザー要望）: サロン直接払いの請求元（店販）の注文は、
// 届いたサロン宛請求書PDFをサロンへ転送する運用。発注後〜送付までオレンジで警告し、送付したら📨で消し込む

// サロン精算 月次支払の消し込み（2026-07-19 ユーザー承認: 月次は翌月末に1本振込なので月単位1チェック。
// 記録はスプシ「サロン精算支払記録」= 月・金額・記録日時。押し忘れは期日超過で警告色）
function spayDoneCard(month, total, due, dueStr, hasData){
  if(!hasData) return '';
  const paid = rows('salonPayLog').find(r=>String(r['月']||'').trim()===month);
  if(paid) return '<div class="card" style="border-color:var(--good)"><div class="row">' +
    '<span class="pill" style="background:color-mix(in srgb,var(--good) 15%, transparent);color:var(--good)">✔ '+esc(month)+'分 支払済み</span>' +
    '<span class="small muted">'+yen(num(paid['金額']))+' ／ 記録: '+esc(String(paid['記録日時']||''))+'</span>' +
    '<button class="btn sm right" onclick="spayDoneUI(\''+esc(month)+'\',0,true)">↩ 取消</button></div></div>';
  const overdue = new Date() > due;
  return '<div class="card"'+(overdue?' style="border-color:var(--warn)"':'')+'><div class="row">' +
    (overdue ? '<b style="color:var(--warn)">⚠ 支払期日（'+esc(dueStr)+'）を過ぎています。振込がすんだら消し込んでください</b>'
             : '<span class="small muted">'+esc(NM.spay)+'への振込がすんだら ✔ で消し込みます（払い忘れ・二重払い防止）</span>') +
    '<button class="btn sm right" style="background:var(--warn);color:#3d2c00;border-color:var(--warn);font-weight:700" onclick="spayDoneUI(\''+esc(month)+'\','+num(total)+')">✔ この月は支払済みにする</button></div></div>';
}

  act('setSalonPayDone', {month:month, amount:amount, ...(off?{off:true}:{})},

// ⚠MTG前払いカード。side='co'（💰支払い画面）/'spay'（サロン精算画面）で別フラグ・別ボタン（連動しない）
function mtgAlertCard(side){
  const g = mtgPrepayGroups(side);
  if(!g.pend.length && !g.done.length) return '';
  const nameOf = x=>x.oids ? '📋 '+x.oids : [...x.kids].join(', ');
  const desc = side==='spay'
    ? 'サロン着の代引きに合わせて '+esc(NM.spay)+' がサロンへ事前振込。振込がすんだら ✔ で完了に（この画面専用のチェックです）'
    : esc(NM.spay)+' がサロンへ事前振込する原資を、先に '+esc(NM.spay)+' へ支払います。支払ったら ✔ で完了に（この画面専用のチェックです）';
  const btnLabel = side==='spay' ? '✔ 振込完了' : '✔ 前払い完了';
  return '<div class="card"'+(g.pend.length?' style="border-color:var(--warn)"':'')+'>' +
    (g.pend.length
      ? '<b>⚠ MTG'+(side==='spay'?'サロン振込':'前払い')+'が必要な案件（'+g.pend.length+'件）</b> <span class="small muted">'+desc+'</span>' +
        g.pend.map(x=>'<div class="row small" style="margin-top:6px;border-top:1px solid var(--axis);padding-top:6px"><span class="mono"><b>'+esc(nameOf(x))+'</b></span>' +
          '<span class="muted">サロン '+x.salons.size+'軒（'+[...x.salons].join('・')+'）</span>' +
          '<span class="right"><b>'+yen(x.amt)+'</b> <button class="btn sm" onclick="mtgDone(\''+esc([...x.kids].join(','))+'\', false, \''+esc(nameOf(x))+'\', \''+(side==='spay'?'spay':'co')+'\')">'+btnLabel+'</button></span></div>').join('')

// ===== 画面: 💰支払い（支払先ごとの支払予定と根拠明細。Task#22 Phase②・2026-07-18） =====
// 計上ルール: 仕入=回収台帳の生存行（振り分け・外注仕入）。計上日=対象受注の📦発注日（未入力は振分確定日で仮計上・「仮」表示）
// 単価: 仕入先（サロンマスタのディーラー/外注行）の掛け率列×定価。率が無い商品は商品マスタの仕入価格で仮単価
const PAYIDS = { pure:'S0014', broker:'S0021', maverick:'S0022' };   // 特殊計算する行（口座請求元/仲介2%先/店販請求元）
const BROKER_RATE = 0.02;   // 仲介手数料: 口座請求（対象ブランド分）税抜×2%（マスタの41.9%=39.9%+2%の2%側）
const TRANSFER_FEE_YEN = 3500;   // 精算代行の利益: サロンへの振込1回（1サロン）につき（翌月末払い）
function payRateOf(supRow, brand){
  if(!supRow || !brand) return null;
  for(const k of Object.keys(supRow)){
    const m = String(k).match(/^([^（(]+)[（(][^）)]*[%％][）)]\s*$/);
    if(m && m[1].trim() && brand.indexOf(m[1].trim())===0 && String(supRow[k]).trim()!=='') return num(supRow[k]);
  }
  return null;
}
function payEom(y,m){ return new Date(y, m+1, 0); }   // m月（0始まり）の末日
function payFmt(d){ return d.toLocaleDateString('sv-SE').replace(/-/g,'/'); }
// 締め日テキスト（末締め/10日締/都度）から期間キーと支払予定日を出す
function payPeriod(dateStr, closeTxt, payTxt){
  const d = new Date(String(dateStr||'').replace(/\//g,'-'));
  if(isNaN(d)) return {key:'zz（日付なし）', label:'（計上日なし）', payLabel:String(payTxt||''), pd:null};
  const y=d.getFullYear(), mo=d.getMonth(), day=d.getDate();
  const c = String(closeTxt||'').trim(), p = String(payTxt||'').trim();
  const mm = n=>String(n+1).padStart(2,'0');
  // pd = 実際の支払日（Date）。資金繰り出金バーの支払日ベース集計に使う（2026-07-19）。
  // 支払日テキストから解決できないもの（例: カード引落で引落日未記入）は null → 呼び出し側で仮置き
  const pdOf = (by, bm)=>{   // by/bm = 締め月（bmは0始まり）
    if(p.indexOf('当月末')>=0 || /^末払い/.test(p)) return payEom(by,bm);
    if(p.indexOf('翌月末')>=0) return payEom(by,bm+1);
    const n2 = p.match(/翌々月\s*(\d+)\s*日/); if(n2) return new Date(by, bm+2, +n2[1]);
    const n1 = p.match(/翌月\s*(\d+)\s*日/); if(n1) return new Date(by, bm+1, +n1[1]);
    return null;
  };
  if(c.indexOf('都度')>=0 || p.indexOf('都度')>=0) return {key:payFmt(d), label:payFmt(d)+' 発注分', payLabel:'都度払い', pd:d};
  const cm = c.match(/(\d+)\s*日締/);
  if(cm){
    const cut=+cm[1];
    const ey = day<=cut ? y : (mo===11 ? y+1 : y), em = day<=cut ? mo : (mo+1)%12;   // 締め日を過ぎたら翌月締めに計上
    let payLabel = p;
    if(p.indexOf('当月末')>=0) payLabel = payFmt(payEom(ey,em))+'（当月末）';
    else if(p.indexOf('翌月末')>=0) payLabel = payFmt(payEom(ey,em+1))+'（翌月末）';
    return {key: ey+'/'+mm(em)+'/'+String(cut).padStart(2,'0'), label: ey+'/'+mm(em)+' '+cut+'日締め分', payLabel, pd:pdOf(ey,em)};
  }
  let payLabel = p || '（支払日 確認中）';
  if(p.indexOf('翌月末')>=0) payLabel = payFmt(payEom(y,mo+1))+'（翌月末）';
  else if(p.indexOf('当月末')>=0 || /^末払い/.test(p)) payLabel = payFmt(payEom(y,mo))+'（当月末）';
  return {key: y+'/'+mm(mo), label: y+'/'+mm(mo)+' 末締め分', payLabel, pd:pdOf(y,mo)};
}
// 仕入明細を仕入先ごとに集める（vPayments と資金繰り出金バーで共用。2026-07-19 支払日ベース化で切り出し）
// inMonthFn: 計上日で絞る関数（省略=全期間） ／ allMonths: 見つかった計上月を追記するSet（省略可）
function collectSupplierLines(inMonthFn, allMonths){
  const sal = {}; rows('salons').forEach(s=>{ const sid=String(s['サロンID']||'').trim(); if(sid) sal[sid]=s; });
  const ordDate = {};   // 受注ID → 📦発注日（受注カードで入れた実発注日）
  rows('orderLedger').forEach(r=>{ const id=String(r['受注ID']||'').trim(); if(id && !ordDate[id] && String(r['発注日']||'').trim()) ordDate[id]=String(r['発注日']).trim(); });
  const bySup = {};   // supId（''=未設定） → lines[]
  rows('collectionLedger').filter(r=>String(r['削除']||'').trim()==='').forEach(r=>{
    if(String(r['区分']||'').trim()==='在庫') return;   // 余剰在庫の引き当ては仕入ではない（支払い対象外。2026-07-18）
    const qty = num(r['個数']); if(qty<=0) return;
    const supId = String(r['仕入先ID']||'').trim();
    const pid = String(r['商品ID']||'').trim();
    const brand = brandOf(pid)||'（不明）';
    const oids = String(r['対象受注']||'').split(',').map(x=>x.trim()).filter(Boolean);
    const od = oids.map(o=>ordDate[o]).find(Boolean);
    const date = od || String(r['発注日']||'').trim();   // 発注日未入力の間は振分確定日で仮計上
    if(allMonths) allMonths.add(monthOf(date));
    if(inMonthFn && !inMonthFn(date)) return;
    const rate = payRateOf(sal[supId], brand);
    const list = num((product(pid)||{})['定価（税抜）']);
    let unit, unitNote='';
    if(rate!=null && supId===PAYIDS.pure){
      // 口座請求元経由は全ブランド「マスタ率=請求率+仲介2%」の上乗せ済み値（例 41.9%=39.9%+2% / 48%=46%+2%）。
      // 請求想定はマスタ率−2%の切捨・2%は仲介側へ（2026-07-21 ユーザー確定でブランド限定を撤廃）
      unit = Math.floor(list*(Math.round((rate-BROKER_RATE)*1000)/1000));
    } else if(rate!=null){ unit = Math.round(list*rate); }
    else { unit = ownCost(pid); unitNote='率未設定→仕入価格で仮'; }
    // 受注に紐づかない仕入（手動仕入れ・外注一括の旧データ等）は行自体の発注日が計上日なので「仮」にしない
    (bySup[supId]=bySup[supId]||[]).push({date, prov:oids.length>0 && !od, kid:String(r['回収ID']||'').trim(), oids:oids.join(', '),
      salon:String(r['サロン名']||''), brand, name:String(r['商品名']||''), size:String(r['容量']||''), qty, unit, unitNote,
      amt:unit*qty, isOut:String(r['区分']||'').trim()==='外注'});
  });
  return {bySup, sal};
}

        (open ? '<div class="tblwrap" style="margin-top:6px"><table><tr><th>卸先</th><th>受注</th><th>基準</th><th class="num">対象額</th><th class="num">率</th><th class="num">報酬</th><th>入金日</th><th>支払予定</th></tr>' +
          list.map(x=>'<tr><td class="small">'+esc(x.wname)+'</td><td class="mono small">'+esc(x.oid)+'</td><td class="small">'+esc(x.base)+'</td><td class="num">'+yen(x.b)+'</td><td class="num">'+(x.rate*100).toFixed(0)+'%</td><td class="num"><b>'+yen(x.fee)+'</b></td><td class="small">'+esc(x.pay2)+'</td><td class="small">'+esc(x.due)+'</td></tr>').join('')+'</table></div>' : '') + '</div>';
    });
  } else {
    html += '<div class="card"><b class="small muted">🤝 紹介報酬</b><p class="muted small">卸先マスタの「紹介者」列が入った卸先の最終入金完了案件から自動計算します（今は対象なし。マスタ管理で紹介者・報酬基準・報酬率を記入してください）</p></div>';
  }

  // ---- 店販請求元（請求書ベース・想定額の参考） ----
  const mavLines = rows('hanbaiOrders').filter(r=>String(r['削除']||'').trim()==='' && String(r['請求元ID']||'').trim()===PAYIDS.maverick && inMonth(String(r['注文日']||'')));
  if(mavLines.length){
    const mrow = sal[PAYIDS.maverick]||{};
    const per = {};
    mavLines.forEach(r=>{
      const pr = payPeriod(String(r['注文日']||''), String(mrow['締め日']||'末締め'), String(mrow['支払日']||''));
      const amt = ownCost(String(r['商品ID']||'').trim())*num(r['個数']);
      (per[pr.key]=per[pr.key]||{pr, lines:[], sub:0});
      per[pr.key].lines.push({date:String(r['注文日']||''), salon:String(r['サロン名']||''), name:String(r['商品名']||''), qty:num(r['個数']), amt});
      per[pr.key].sub += amt;
    });
    const open = (viewState.aggOpen||{})['pay_mav'];
    // サロン直接払い＝会社の出金ではないため、支払いカードと同列に見えないよう背景・破線で差別化（2026-07-19 ユーザー要望）
    html += '<div class="card" style="background:var(--wash);border-style:dashed"><div class="row" style="cursor:pointer" onclick="aggToggle(\'pay_mav\')">'+(open?'▾':'▸')+' <b>🏭 '+esc(salonLabel(mrow))+'（店販請求元・サロン直接払い）</b><span class="pill" style="background:color-mix(in srgb,var(--muted) 18%, transparent);color:var(--muted);font-weight:700">'+esc(NM.co)+'の支払い対象外</span><span class="small muted">請求書はサロン宛で発行 → PDFをサロンへ転送 → サロンが直接支払う（2026-07-19確定）。下は転送チェック用の参考額（仕入価格×個数）</span></div>' +
      Object.keys(per).sort().reverse().map(k=>{ const g=per[k];
        return '<div class="row small" style="margin-top:6px;border-top:1px solid var(--axis);padding-top:6px"><b>'+esc(g.pr.label)+'</b><span>支払予定: <b>'+esc(g.pr.payLabel)+'</b></span><span class="right"><b>'+yen(g.sub)+'</b> <span class="muted">想定</span></span></div>' +
          (open ? '<div class="tblwrap" style="margin-top:4px"><table><tr><th>注文日</th><th>サロン</th><th>商品</th><th class="num">個数</th><th class="num">想定額</th></tr>' +
            g.lines.map(l=>'<tr><td class="small">'+esc(l.date)+'</td><td class="small">'+esc(l.salon)+'</td><td class="small">'+esc(l.name)+'</td><td class="num">'+l.qty+'</td><td class="num">'+yen(l.amt)+'</td></tr>').join('')+'</table></div>' : '');
      }).join('') + '</div>';
  }

  // ---- 精算代行（MTG前払い＋振込1サロン3,500円） ----
  (()=>{
    const months = {};   // 'yyyy/MM' → {mtg:{sid:{salon,amt}}, feeSalons:Set}
    const em = m=>months[m]=months[m]||{mtg:{}, feeSalons:new Set()};
    rows('collectionLedger').filter(r=>String(r['削除']||'').trim()==='' && String(r['区分']||'卸').trim()==='卸').forEach(r=>{
      const m = String(r['発注日']||'').substring(0,7); if(!m) return;
      const sid = String(r['サロンID']||'').trim(); if(!sid) return;
      const g = em(m);
      g.feeSalons.add(sid);   // 精算（協力費）の振込対象になり得るサロン
      const pid = String(r['商品ID']||'').trim();
      if(brandOf(pid)==='MTG'){
        g.mtg[sid] = g.mtg[sid]||{salon:String(r['サロン名']||''), amt:0};
        g.mtg[sid].amt += salonCost(pid)*num(r['個数']);
      }
    });
    const keys = payM==='すべて' ? Object.keys(months).sort().reverse().slice(0,3) : Object.keys(months).filter(m=>m===payM);
    if(!keys.length) return;
    html += '<div class="card"><div class="row"><b>💴 '+esc(NM.spay)+'（前払い・振込手数料）</b><span class="small muted">精算の詳細は「'+esc(NM.spay)+'支払」画面</span></div>' +
      keys.map(m=>{ const g=months[m]; const mtgIds=Object.keys(g.mtg); const mtgTotal=mtgIds.reduce((a,s)=>a+g.mtg[s].amt,0);
        return '<div style="margin-top:6px;border-top:1px solid var(--axis);padding-top:6px" class="small"><b>'+esc(m.replace('/','年'))+'月分</b>' +
          '<div class="row" style="margin-top:4px"><span>MTG前払い（発注のたび都度・サロン仕入価格×個数）</span><span class="right">' +
            (mtgIds.length ? '<b>'+yen(mtgTotal)+'</b> <span class="muted">（'+mtgIds.map(s=>esc(g.mtg[s].salon)+' '+yen(g.mtg[s].amt)).join(' ／ ')+'）</span>'
                           : '<b>今回なし</b> <span class="muted">（MTG商品の振り分けが無いため）</span>')+'</span></div>' +
          '<div class="row" style="margin-top:4px"><span>振込手数料（翌月末払い・'+TRANSFER_FEE_YEN.toLocaleString()+'円×振込サロン数）</span><span class="right"><b>'+yen(g.feeSalons.size*TRANSFER_FEE_YEN)+'</b> <span class="muted">目安（最大 '+g.feeSalons.size+'軒。実際に振込したサロン数で確定）</span></span></div></div>'; }).join('') + '</div>';
  })();

  return html;
}

  [1,2].forEach(k=>{ const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+k);

// ===== 集計（クライアント側・即時） =====
function calcSales(month){
  let sales=0, cost=0; const byW={}, byB={};
  rows('orderLedger').forEach(r=>{
    if(monthOf(r['受注日'])!==month) return;
    const sub=num(r['小計（税抜）']), qty=num(r['個数']), pid=r['商品ID'];
    sales+=sub; cost+=ownCost(pid)*qty;
    const w=String(r['卸先名']||'').trim(); if(w) byW[w]=(byW[w]||0)+sub;
    const b=brandOf(pid); if(b) byB[b]=(byB[b]||0)+sub;
  });
  const goal = rows('monthlyGoals').find(g=>monthOf(g['月'])===month);
  return {sales, cost, profit:sales-cost, byW, byB,
    goal: goal?{sales:num(goal['売上目標（税抜）']),profit:num(goal['利益目標（税抜）']),buy:num(goal['仕入目標（税抜）'])}:null};
}
function calcSalonPay(month){
  const bySalon={};
  const ensure=(sid,name)=>bySalon[sid]||(bySalon[sid]={sid,name,brands:new Set(),mtg:0,charge:0});
  rows('collectionLedger').forEach(r=>{
    if(monthOf(r['発注日'])!==month || String(r['区分']||'卸')!=='卸') return;
    const sid=String(r['サロンID']||'').trim(); if(!sid) return;
    const s=ensure(sid,r['サロン名']); const b=brandOf(r['商品ID']);
    if(b) s.brands.add(b);
    if(b===MTG_BRAND) s.mtg += salonCost(r['商品ID'])*num(r['個数']);
  });
  rows('hanbaiOrders').forEach(r=>{
    if(monthOf(r['注文日'])!==month) return;
    // サロン宛請求書の直接払い請求元の分は立替が無いため差引に含めない（2026-07-19 確定）
    if(String(r['請求元ID']||'').trim()===PAYIDS.maverick) return;
    const sid=String(r['サロンID']||'').trim(); if(!sid) return;
    ensure(sid,r['サロン名']).charge += salonCost(r['商品ID'])*num(r['個数']);
  });
  // 月次支払（翌月末） = 協力費 − 店販/EC請求。MTGは都度払いのため月次には含めない（別枠で参照）
  return Object.values(bySalon).map(s=>({sid:s.sid, name:s.name, brands:[...s.brands], mtg:s.mtg, charge:s.charge,
    fee:s.brands.size*BRAND_FEE, net:s.brands.size*BRAND_FEE - s.charge}));
}
function calcQuota(month){
  const used={};
  const add=(sid,name,brand,amt,isHanbai)=>{ if(!sid||!brand) return; const k=sid+'|'+brand;
    used[k]=used[k]||{sid,name,brand,used:0,hanbai:0}; used[k].used+=amt; if(isHanbai) used[k].hanbai+=amt; };
  rows('collectionLedger').forEach(r=>{ if(monthOf(r['発注日'])!==month || String(r['区分']||'').trim()==='在庫') return;   // 在庫充当は仕入ではない（2026-07-18）
    add(String(r['サロンID']).trim(), r['サロン名'], brandOf(r['商品ID']), salonCost(r['商品ID'])*num(r['個数']), false); });
  rows('hanbaiOrders').forEach(r=>{ if(monthOf(r['注文日'])!==month) return;
    add(String(r['サロンID']).trim(), r['サロン名'], brandOf(r['商品ID']), salonCost(r['商品ID'])*num(r['個数']), true); });   // 店販/EC分は「内 店販」表示用に別カウント（2026-07-18 ユーザー要望）
  const qm={}; rows('quotaMaster').forEach(q=>qm[String(q['サロンID']).trim()+'|'+String(q['ブランド']).trim()]=num(q['枠金額（円）']));
  return Object.values(used).map(u=>{ const key=u.sid+'|'+u.brand;
    const quota = (key in qm) ? qm[key] : DEFAULT_QUOTA;
    return {sid:u.sid, name:u.name, brand:u.brand, used:u.used, hanbai:u.hanbai, quota, rate:quota>0?u.used/quota:null}; });
}

    return (DOC_PEND_RULES[kind]||[]).includes(st);
  }).map(d=>{ const rv=creditRecv(d['受注ID']);   // 掛け払い案件は「自社に入る日=着金予定」で並べ・期限切れ判定する
    d._due = rv || String(d['支払期限']||'').trim(); d._recv = !!rv; return d;
  }).sort((a,b)=>String(a._due||'9999').localeCompare(String(b._due||'9999')));

  // 月次バーチャート（1本に集約: 下段=仕入・上段=利益・バー全体の高さ=売上。点線=売上目標）
  // 実運用開始の2026/05から対象月まで全部並べる。月数が増えたら横スクロール
  const CHART_START = '2026/05';
  const months=[];
  { let d = new Date(CHART_START.replace('/','-')+'-01T00:00:00');
    const end = new Date(m.replace('/','-')+'-01T00:00:00');
    if(end < d) d = end;   // 開始月より前の月を選んだときはその月だけ
    while(d <= end){ months.push(d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')); d = new Date(d.getFullYear(), d.getMonth()+1, 1); } }
  const mSales = months.map(mm=>calcSales(mm));
  const mGoals = months.map(mm=>{ const g=rows('monthlyGoals').find(r=>monthOf(r['月'])===mm);
    return g?{sales:num(g['売上目標（税抜）']), buy:num(g['仕入目標（税抜）']), profit:num(g['利益目標（税抜）'])}:{sales:0,buy:0,profit:0}; });
  const maxV = Math.max.apply(null, mSales.map(s=>Math.max(s.sales,s.cost)).concat(mGoals.map(g=>g.sales)).concat([1]));
  const bw=30, ig=5, gap=20, gw=bw*2+ig, H=140, W=months.length*(gw+gap);   // gw = 実績（積み上げ）＋目標の2本組
  let chart = '<div style="overflow-x:auto"><svg class="chart" viewBox="0 -16 '+W+' '+(H+50)+'" width="'+Math.round(W*1.15)+'" height="'+Math.round((H+50)*1.15)+'" style="min-width:'+W+'px">';
  months.forEach((mm,i)=>{

    const hs=Math.round(Math.max(s.sales,0)/maxV*H), hc=Math.round(Math.max(Math.min(s.cost,s.sales),0)/maxV*H);
    const tip = mm+'\n売上 '+yen(s.sales)+'\n仕入 '+yen(s.cost)+'\n利益 '+yen(s.profit);

    chart += '<text x="'+(x+bw/2)+'" y="'+(H-hs-5)+'" text-anchor="middle" font-size="10" fill="var(--ink2)">'+(s.sales!==0?Math.round(s.sales/10000)+'万':'')+'</text>';
    if(mGoals[i].sales>0){

      const gBuy = g.buy>0 ? g.buy : (g.profit>0 && g.sales>g.profit ? g.sales-g.profit : 0);

      if(gBuy>0){

        chart += '<rect x="'+gx+'" y="'+(H-ghc)+'" width="'+bw+'" height="'+Math.max(ghc,1)+'" rx="3" fill="color-mix(in srgb,var(--s3) 18%,transparent)"><title>'+gtip+'</title></rect>';
        if(gh-ghc>3) chart += '<rect x="'+gx+'" y="'+gy+'" width="'+bw+'" height="'+(gh-ghc-2)+'" rx="3" fill="color-mix(in srgb,var(--s2) 18%,transparent)"><title>'+gtip+'</title></rect>';
      }
      chart += '<rect x="'+gx+'" y="'+gy+'" width="'+bw+'" height="'+Math.max(gh,1)+'" rx="3" fill="'+(gBuy>0?'none':'color-mix(in srgb,var(--muted) 15%,transparent)')+'" stroke="var(--muted)" stroke-dasharray="4 3"><title>'+gtip+'</title></rect>';
      chart += '<text x="'+(gx+bw/2)+'" y="'+(gy-5)+'" text-anchor="middle" font-size="10" fill="var(--muted)">'+Math.round(g.sales/10000)+'万</text>';
    }
    chart += '<text x="'+(x+gw/2)+'" y="'+(H+15)+'" text-anchor="middle" font-size="10" fill="var(--muted)">'+(mm.slice(5,7)==='01'?mm.slice(2).replace('/','年'):mm.slice(5))+'月</text>';
  });
  chart += '<line x1="0" y1="'+H+'" x2="'+W+'" y2="'+H+'" stroke="var(--axis)"/></svg></div>';
  // 対象月の実数値サマリー（目標に対してどこまで来ているか）
  const gsel = mGoals[months.indexOf(m)]||{sales:0,buy:0,profit:0};
  const ssel = mSales[months.indexOf(m)]||{sales:0,cost:0,profit:0};
  const vsG = (v,g)=>g>0 ? yen(v)+' ／ 目標 '+yen(g)+'（'+Math.round(v/g*100)+'%）' : yen(v)+'（目標未設定）';
  chart += '<div class="small" style="margin-top:6px;line-height:1.9"><b>'+m.slice(5)+'月</b><br>' +
    '<b>売上</b>（バー全体） '+vsG(ssel.sales, gsel.sales)+'<br>' +
    '<span style="color:var(--s3)">■</span> 仕入 '+vsG(ssel.cost, gsel.buy)+'<br>' +
    '<span style="color:var(--s2)">■</span> 利益 '+vsG(ssel.profit, gsel.profit)+'</div>';

  // 案件別売上・利益（行=受注。卸額/仕入額/利益/利益%＋今のステータス）
  const caseMap = {};
  rows('orderLedger').forEach(r=>{
    if(monthOf(r['受注日'])!==m) return;
    const oid = String(r['受注ID']||'').trim(); if(!oid) return;
    if(!caseMap[oid]) caseMap[oid] = {oid, w:r['卸先名'], st:r['ステータス'], sales:0, cost:0};
    caseMap[oid].sales += num(r['小計（税抜）']);
    caseMap[oid].cost  += ownCost(r['商品ID'])*num(r['個数']);
  });
  const cases = Object.values(caseMap).sort((a,b)=>String(b.oid).localeCompare(String(a.oid)));
  const ct = {sales:0, cost:0}; cases.forEach(c=>{ ct.sales+=c.sales; ct.cost+=c.cost; });
  const pctD = v=>v==null||isNaN(v)?'—':Math.round(v*100)+'%';
  // 状態は「お金」と「商品」の2軸で表示（データは今のステータス＋出荷から導出。裏の仕組みは1本のまま）
  const money2 = (st, pay)=>{
    const i = FLOW.order.indexOf(st);
    if(paidDone(st)) return ['全額入金済み','var(--good)'];
    if(i<=0) return ['未請求','var(--muted)'];
    if(NM.credit && String(pay||'').indexOf(NM.credit)===0) return ['全額請求済み・入金待ち','var(--s3)'];
    if(i===1) return ['半金① 請求中','var(--s3)'];
    if(i>=2 && i<=4) return ['半金① 入金済み','var(--s1)'];
    return ['半金② 請求中','var(--s3)'];
  };
  const goods2 = (st, ship)=>{
    if(ship) return [ship['ステータス'], STATUS_COLOR[ship['ステータス']]||'var(--s1)'];
    const i = FLOW.order.indexOf(st);
    if(i<=1) return ['準備前','var(--muted)'];
    if(i>=2 && i<=4) return [st, STATUS_COLOR[st]||'var(--s1)'];
    return ['出荷待ち','var(--serious)'];
  };
  const pill2 = (icon, mc)=>'<span class="pill" style="background:color-mix(in srgb,'+mc[1]+' 14%,transparent);color:'+mc[1]+'">'+icon+' '+esc(mc[0])+'</span>';
  // 支払方式は色なしのプレーン表示・経由案件は（経由先名）を併記（2026-07-15 ユーザー指定: デコらずシンプルに）
  const payPill = (pay, via)=>{ const p=String(pay||'').trim();
    const t = (p||'—') + (via ? '（'+NM.via+'）' : '');
    return '<span class="small'+(p?'':' muted')+'">'+esc(t)+'</span>'; };
  const wbars = cases.length ?
    '<div class="tblwrap"><table><tr><th>受注ID</th><th>卸先</th><th>支払方式</th><th>お金</th><th>商品</th><th class="num">卸額(税抜)</th><th class="num">仕入れ額</th><th class="num">利益</th><th class="num">利益%</th></tr>' +
    cases.map(c=>{ const info=oInfo[c.oid]||{st:c.st};
      return '<tr><td class="mono">'+c.oid+'</td><td style="white-space:nowrap">'+esc(c.w)+'</td>' +
      '<td style="white-space:nowrap">'+payPill(info.pay, info.via)+'</td>' +
      '<td>'+pill2('💰', money2(info.st, info.pay))+'</td><td>'+pill2('📦', goods2(info.st, shipOf[c.oid]))+'</td>' +
      '<td class="num">'+yen(c.sales)+'</td><td class="num">'+yen(c.cost)+'</td><td class="num"><b>'+yen(c.sales-c.cost)+'</b></td>' +
      '<td class="num">'+pctD(c.sales>0?(c.sales-c.cost)/c.sales:null)+'</td></tr>'; }).join('') +
    '<tr><td colspan="5"><b>合計</b></td><td class="num"><b>'+yen(ct.sales)+'</b></td><td class="num"><b>'+yen(ct.cost)+'</b></td><td class="num"><b>'+yen(ct.sales-ct.cost)+'</b></td><td class="num"><b>'+pctD(ct.sales>0?(ct.sales-ct.cost)/ct.sales:null)+'</b></td></tr>' +
    '</table></div>'
    : '<p class="muted small">この月の受注データがありません</p>';

  // 業務の残件ボード: どの工程で何件止まっているか（クリックでその画面のタブへ飛ぶ）
  const boardChips = [];
  const chipsFor = (label, navKey, entity, list, idCol, extraTerminal, keyOf)=>{
    const flow = FLOW[entity], done = new Set([flow[flow.length-1]].concat(extraTerminal||[]));
    const cnt = {};   // ステータス → 案件/IDのSet（keyOf指定時は案件単位で数える）
    list.forEach(r=>{ const id=String(r[idCol]||'').trim(); if(!id) return;
      const st=r['ステータス']; if(done.has(st) || !flow.includes(st)) return;
      (cnt[st] = cnt[st] || new Set());
      (keyOf ? keyOf(r) : [id]).forEach(k=>{ if(k) cnt[st].add(k); }); });
    const chips = flow.filter(st=>cnt[st]&&cnt[st].size).map(st=>
      '<button class="btn sm" onclick="go(\''+navKey+'\');viewState.tab=\''+st+'\';render()">'+esc(st)+' <span class="n hot">'+cnt[st].size+'</span></button>');
    if(chips.length) boardChips.push('<div class="row" style="gap:6px"><b class="small" style="min-width:88px">'+label+'</b>'+chips.join('')+'</div>');
  };
  chipsFor('📋 受注','orders','order',rows('orderLedger'),'受注ID');
  // 振り分け = 未完了の案件数（振分/発注ステータスで数量が満ちていないもの。下書き数の表示は廃止=2026-07-16 ユーザー指定）
  { const nPend = allocPending().length;
    if(nPend) boardChips.push('<div class="row" style="gap:6px"><b class="small" style="min-width:88px">🧮 振り分け</b>' +
      '<button class="btn sm" onclick="go(\'allocation\');render()">振り分け未完了 <span class="n hot">'+nPend+'</span></button></div>'); }
  // 回収・検品は「何サロン・外注何社」で表示（2026-07-18 ユーザー指定。1回収=1サロン=1箱なので実働の箱数感覚に合わせる）
  { const flowC = FLOW.collection, doneC = new Set(['ロット処理済み','ロット処理なし']);
    const per = {};   // ステータス → {sal:サロン名Set, out:外注先Set}
    rows('collectionLedger').forEach(r=>{ const id=String(r['回収ID']||'').trim(); if(!id) return;
      const st=r['ステータス']; if(doneC.has(st) || !flowC.includes(st)) return;
      const p = per[st] = per[st] || {sal:new Set(), out:new Set()};
      const name = String(r['サロン名']||'').trim() || id;
      (String(r['区分']||'').trim()==='外注' ? p.out : p.sal).add(name); });
    const chips = flowC.filter(st=>per[st]).map(st=>{ const p=per[st];
      const t = [p.sal.size?p.sal.size+'サロン':'', p.out.size?'外注'+p.out.size+'社':''].filter(Boolean).join('・');
      return '<button class="btn sm" onclick="go(\'collection\');viewState.tab=\''+st+'\';render()">'+esc(st)+' <span class="n hot">'+t+'</span></button>'; });
    if(chips.length) boardChips.push('<div class="row" style="gap:6px"><b class="small" style="min-width:88px">📦 回収・検品</b>'+chips.join('')+'</div>');
  }
  chipsFor('🚚 出荷','shipments','shipment',rows('shipments'),'出荷ID',null,r=>[String(r['受注ID']||r['出荷ID']||'').trim()]);   // 案件数で表示
  chipsFor('🛍 店販/EC','hanbai','hanbai',rows('hanbaiOrders'),'注文ID',['EC出品中','完売']);
  const boardHtml = '<div class="card"><b class="small">🚧 業務の残件（どこで止まっているか）</b><div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">' +
    (boardChips.join('') || '<span class="small" style="color:var(--good)"><b>✅ 進行中の残件はありません</b></span>') + '</div></div>';

  // 資金繰り（今月のお金の出入り・概算）: 目標vs実績を置換（2026-07-15 ユーザー指定。目標は月次グラフの点線で見る）
  // 入金/出金とも「確定分=ベタ塗り・予定分=斜線」で色分けし、予定の入金は請求書の発行日を出す（2026-07-15 ユーザー指定）
  // 出金は支払日ベース（2026-07-19 Phase③実装済み）: 仕入先の締め・支払ルールから「対象月に実際に出るお金」を計算
  const FO_ = FLOW.order;
  const docMD = d=>String(d['発行日']||'').trim().replace(/^\d{4}\//,'');   // 発行日 → M/D 表示
  // 入金済みの判定（入金予定 DOC_PEND_RULES の裏返し）: ①は半金入金待ちを過ぎたら、②・全額は最終入金完了で入金済み
  const docSettled = d=>{ const kind=String(d['種類']||''); if(kind.indexOf('請求書')<0) return false;
    const st=(oInfo[String(d['受注ID']||'').trim()]||{}).st; if(!st || !FO_.includes(st)) return false;
    return kind.indexOf('①')>=0 ? FO_.indexOf(st) > FO_.indexOf('半金入金待ち') : paidDone(st); };
  const settledDocs = rows('docLog').filter(d=>monthOf(d['発行日'])===m && docSettled(d));
  const cashInDone = settledDocs.reduce((a,d)=>a+num(d['金額（税込）']),0);      // 確定分 = 今月発行の請求書で入金済み
  const cashInPend = pendDocs.reduce((a,d)=>a+num(d['金額（税込）']),0);      // 予定分 = 未入金の発行済み請求書（月を跨いだ分も入金まで残る）
  const cashIn = cashInDone + cashInPend;
  // 出金 = 支払日ベース（2026-07-19 Phase③実装・ユーザー承認）: 対象月に「実際に口座から出るお金」を支払先×支払日で積む。
  // 範囲 = 仕入先支払い＋仲介2%＋紹介報酬＋精算代行（前月分の月次精算・振込手数料目安・当月MTG前払い都度）。
  // サロン直接払いの店販請求元（PAYIDS.maverick）は会社の出金ではないため対象外
  const todayD = new Date();
  const outDone = [], outPend = [];   // 確定=支払日が過ぎた/消し込み・前払い済み ／ 予定=これから支払う
  const pushOut = (label, v, pd, color, paidFlag, tipNote)=>{ if(v<=0 || !pd) return;
    if(monthOf(payFmt(pd))!==m) return;   // 支払日が対象月のものだけ積む
    const it = {label:label+' '+(pd.getMonth()+1)+'/'+pd.getDate(), v, color,
      tip:label+'（支払日 '+payFmt(pd)+'）'+(tipNote||'')};
    ((paidFlag!=null ? paidFlag : pd<=todayD) ? outDone : outPend).push(it); };
  const csl = collectSupplierLines();
  // 1) 仕入先支払い（締め期間→支払日）。支払日が未確定の仕入先（カード引落日未記入等）と仕入先未記録は「翌月末」仮置き
  Object.keys(csl.bySup).forEach(supId=>{
    if(supId===PAYIDS.maverick) return;   // サロン直接払い（会社の出金なし）
    const s = csl.sal[supId]||{}; const isPure = supId===PAYIDS.pure;
    const per = {};
    csl.bySup[supId].forEach(l=>{ const pr=payPeriod(l.date, String(s['締め日']||''), String(s['支払日']||'')); (per[pr.key]=per[pr.key]||{pr, sub:0, d0:l.date}).sub+=l.amt; });
    Object.values(per).forEach(g=>{
      const total = g.sub + (isPure ? Math.floor(g.sub*0.1) : Math.round(g.sub*0.1));   // 税込（口座請求元は伝票単位切捨の近似）
      let pd = g.pr.pd, assumed = '';
      if(!pd){ const d0=new Date(String(g.d0||'').replace(/\//g,'-'));
        if(!isNaN(d0)){ pd = payEom(d0.getFullYear(), d0.getMonth()+1); assumed='支払日未確定→翌月末と仮定'; } }
      pushOut((salonLabel(s)||'仕入先未記録')+(assumed?'（仮）':''), total, pd, 'var(--s3)', null, assumed);
    });
  });
  // 2) 仲介手数料2%（口座請求元経由の全ブランド。締め支払は口座請求元と同サイクル。2026-07-21 ブランド限定を撤廃）
  (()=>{ const pureRow=csl.sal[PAYIDS.pure]||{}, brokerRow=csl.sal[PAYIDS.broker]||{};
    const per={};
    (csl.bySup[PAYIDS.pure]||[]).forEach(l=>{
      const pr=payPeriod(l.date, String(pureRow['締め日']||''), String(pureRow['支払日']||'')); (per[pr.key]=per[pr.key]||{pr,sub:0}).sub+=l.amt; });
    Object.values(per).forEach(g=>pushOut((salonLabel(brokerRow)||'仲介')+' 2%', Math.round(g.sub*BROKER_RATE), g.pr.pd, 'var(--s4)'));
  })();
  // 3) 紹介報酬（最終入金完了案件。入金②が15日まで→当月末・16日以降→翌10日）
  rows('wholesalers').filter(w=>String(w['紹介者']||'').trim()).forEach(w=>{
    const wid=String(w['卸先ID']||'').trim(), rid=String(w['紹介者']||'').trim();
    const base=String(w['報酬基準']||'利益').trim(); const rv=num(w['報酬率']); const rate=rv>1?rv/100:rv;
    const byOrder={};
    rows('orderLedger').filter(r=>String(r['卸先ID']||'').trim()===wid).forEach(r=>{
      const oid=String(r['受注ID']||'').trim(); if(!oid) return;
      (byOrder[oid]=byOrder[oid]||{st:String(r['ステータス']||'').trim(), pay2:String(r['入金②日']||'').trim(), sales:0, cost:0});
      byOrder[oid].sales+=num(r['小計（税抜）']); byOrder[oid].cost+=num(r['個数'])*ownCost(String(r['商品ID']||'').trim()); });
    Object.values(byOrder).filter(o=>paidDone(o.st)).forEach(o=>{
      const d=new Date(o.pay2.replace(/\//g,'-')); if(isNaN(d)) return;
      const pd = d.getDate()<=15 ? payEom(d.getFullYear(), d.getMonth()) : new Date(d.getFullYear(), d.getMonth()+1, 10);
      pushOut((salonLabel(csl.sal[rid]||{})||'紹介')+'報酬', Math.round((base==='売上'?o.sales:(o.sales-o.cost))*rate), pd, 'var(--s4)');
    });
  });
  // 4) 精算代行: 前月分の月次精算（当月末払い・消し込み済みなら確定扱い）＋振込手数料目安＋当月のMTG前払い（都度）
  (()=>{ const [cy,cm0]=m.split('/').map(Number);
    const prevM = cm0===1 ? (cy-1)+'/12' : cy+'/'+String(cm0-1).padStart(2,'0');
    const spPrev = calcSalonPay(prevM);
    const spNet = spPrev.reduce((a,l)=>a+Math.max(l.net,0),0);
    const log = rows('salonPayLog').find(r=>String(r['月']||'').trim()===prevM);
    pushOut(NM.spay+'精算('+prevM+'分)', log?(num(log['金額'])||spNet):spNet, payEom(cy,cm0-1), 'var(--s5)', log?true:null, log?'消し込み済み':'');
    const feeSalons = spPrev.filter(l=>l.net>0||l.mtg>0).length;
    pushOut(NM.spay+'手数料 目安', feeSalons*3500, payEom(cy,cm0-1), 'var(--s5)', log?true:null, feeSalons+'軒×3,500円（実際に振込したサロン数で確定）');
    let mtgDone2=0, mtgPend2=0;   // MTG前払い（都度）: 当月発生分をMTG前払い済フラグで確定/予定に分ける
    rows('collectionLedger').forEach(r=>{ if(String(r['削除']||'').trim()!=='') return;
      if(String(r['区分']||'卸').trim()!=='卸') return;
      if(monthOf(r['発注日'])!==m) return;
      const pid=String(r['商品ID']||'').trim(); if(brandOf(pid)!==MTG_BRAND) return;
      const amt=salonCost(pid)*num(r['個数']);
      if(String(r['MTG前払い済']||'').trim()!=='') mtgDone2+=amt; else mtgPend2+=amt; });
    if(mtgDone2>0) outDone.push({label:'MTG前払い済', v:mtgDone2, color:'var(--s5)', tip:'MTG前払い（都度・支払済み）'});
    if(mtgPend2>0) outPend.push({label:'MTG前払い', v:mtgPend2, color:'var(--s5)', tip:'MTG前払い（都度・未払い）'});
  })();
  outDone.sort((a,b)=>b.v-a.v); outPend.sort((a,b)=>b.v-a.v);
  const cashOutDone = outDone.reduce((a,x)=>a+x.v,0);
  const cashOutPend = outPend.reduce((a,x)=>a+x.v,0);
  const cashOut = cashOutDone + cashOutPend;
  const cashNet = cashIn - cashOut;
  const cashMax = Math.max(cashIn, cashOut, Math.abs(cashNet), 1);
  const toSegs = (obj, color, tipPrefix, striped)=>Object.entries(obj).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])
    .map(([label,v],i)=>({label, v, color, alt:i%2===1, striped, tip:tipPrefix+'：'+label}));
  // 請求書1枚 = 1セグメント（予定分はラベルに発行日「M/D請求」を出し、ホバーで支払期限も見せる）
  const oBrands = {};   // 受注ID → ブランドの集合（入金セグメントの「卸先名/ブランド」表記用）
  rows('orderLedger').forEach(r=>{ const id=String(r['受注ID']||'').trim(); if(!id) return;
    const b=brandOf(r['商品ID']); if(b) (oBrands[id]=oBrands[id]||new Set()).add(b); });
  const brandsLbl = oid=>[...(oBrands[String(oid||'').trim()]||[])].join('・');   // 全ブランド列挙（2026-07-15 ユーザー指定。まとめない）
  const docSegs = (docs, color, striped, tipPrefix)=>docs.filter(d=>num(d['金額（税込）'])>0)
    .sort((a,b)=>num(b['金額（税込）'])-num(a['金額（税込）']))
    .map((d,i)=>{ const bl=brandsLbl(d['受注ID']);
      const w=(String(d['卸先名']||'').trim()||'（卸先不明）')+(bl?'/'+bl:''); const md=docMD(d);
      return {label:w+(striped&&md?' '+md+'請求':''), v:num(d['金額（税込）']), color, alt:i%2===1, striped,
        tip:tipPrefix+'：'+w+(md?'（'+md+'請求'+(striped?'・'+(d._recv?'着金':'期限')+(d._due||String(d['支払期限']||'').trim()||'—'):'')+'）':'')}; });
  const segBg = s=>s.striped
    ? 'background:repeating-linear-gradient(45deg,'+s.color+' 0 5px,color-mix(in srgb,'+s.color+' 55%,transparent) 5px 10px);'
    : 'background:'+s.color+';';
  const segsHtml = segs=>segs.map((s,i)=>{ const pct = s.v/cashMax*100;
    return '<div title="'+esc((s.tip||s.label)+' '+yen(s.v))+'" style="flex:0 0 '+pct.toFixed(2)+'%;min-width:0;'+segBg(s)+(s.alt?'filter:brightness(1.22);':'')+(i<segs.length-1?'margin-right:2px;':'')+'overflow:hidden;white-space:nowrap;color:#fff;font-size:10.5px;font-weight:700;line-height:20px;padding:0 6px;text-shadow:0 1px 1px rgba(0,0,0,.35)">'+(pct>=8?esc(s.label)+' '+yen(s.v):'')+'</div>';
  }).join('');
  const cashRow = (label, v, note, inner)=>'<div style="margin-top:10px"><div class="row small" style="justify-content:space-between"><span>'+label+(note?' <span class="muted">'+note+'</span>':'')+'</span><b>'+yen(v)+'</b></div>' +
    '<div class="cashbar" style="display:flex;height:20px;border-radius:10px;background:var(--wash);overflow:hidden;margin-top:4px">'+inner+'</div></div>';

// 案件別収支（旧・売り上げ管理シートの形式）。行 = 受注×メーカー。受注を取り込んだ瞬間に自動で出る
function calcAnbetsu(month){
  const map = {};
  rows('orderLedger').forEach(r=>{
    if(monthOf(r['受注日'])!==month) return;
    const oid = String(r['受注ID']||'').trim(); if(!oid) return;
    const brand = brandOf(r['商品ID']) || '（メーカー不明）';
    const key = oid+'|'+brand;
    if(!map[key]) map[key] = {oid, brand, w:r['卸先名'], date:r['受注日'], st:r['ステータス'], form:r['仕入れ形態'], sales:0, list:0, cost:0, via:0};
    const sub = num(r['小計（税抜）']);
    map[key].sales += sub;
    map[key].list  += num(r['定価（税抜）'])*num(r['個数']);
    map[key].cost  += ownCost(r['商品ID'])*num(r['個数']);
    // 経由案件（受注台帳の経由列に印）: 経由先利益=卸値の3%。自社の利益はその分減る（=卸値97%−仕入）
    if(String(r[NM.via+'経由']||'').trim()!=='') map[key].via += Math.round(sub*0.03);
  });
  return Object.values(map).sort((a,b)=>String(b.oid).localeCompare(String(a.oid)));
}
function anbetsuHtml(m){
  const lines = calcAnbetsu(m);
  const pct = v=>v==null||isNaN(v)?'—':Math.round(v*100)+'%';
  // メーカー（ブランド）で左にくくる: メーカー行（小計つき）→ その下に卸先ごとの行（元シートと同じ形）
  const byBrand = {};
  lines.forEach(l=>{ const b=l.brand||'（メーカー不明）'; (byBrand[b]=byBrand[b]||[]).push(l); });
  const groups = Object.entries(byBrand).map(([brand,ls])=>({
    brand, ls: ls.sort((a,b)=>b.sales-a.sales),
    sales: ls.reduce((a,x)=>a+x.sales,0), cost: ls.reduce((a,x)=>a+x.cost,0), via: ls.reduce((a,x)=>a+x.via,0)
  })).sort((a,b)=>b.sales-a.sales);
  const t = {sales:0, cost:0, via:0};
  groups.forEach(g=>{ t.sales+=g.sales; t.cost+=g.cost; t.via+=g.via; });
  const profit = x=>x.sales-x.cost-x.via;   // 自社の利益。経由分は卸値3%を渡すぶん減る

  // ブランドごとの仕入枠消化（サロン×ブランドの枠を合算。ブランド小計行に表示）
  const quotaByBrand = {};
  calcQuota(m).forEach(q=>{ const b=quotaByBrand[q.brand]=quotaByBrand[q.brand]||{used:0,quota:0}; b.used+=q.used; b.quota+=q.quota; });
  const quotaCell = brand=>{
    const q = quotaByBrand[brand]; if(!q || !q.quota) return '';
    const rate = Math.round(q.used/q.quota*100);
    return '<span class="small" style="color:'+(rate>=90?'var(--crit)':rate>=70?'var(--warn)':'var(--muted)')+'">枠消化 '+rate+'%（'+yen(q.used)+'／'+yen(q.quota)+'）</span>';
  };

  // ブランド列はスプシのセル結合の見た目（rowspan）。ブランド小計行は出さず、枠消化だけブランドセル内に表示（2026-07-14 指定）
  const body = groups.map(g=>
    g.ls.map((l,i)=>{
      const qc = quotaCell(g.brand);
      const brandCell = i===0 ? '<td rowspan="'+g.ls.length+'" style="vertical-align:middle;background:var(--wash);border-right:1px solid var(--grid)"><b>'+esc(g.brand)+'</b>'+(qc?'<div style="margin-top:4px">'+qc+'</div>':'')+'</td>' : '';
      return '<tr>'+brandCell+'<td class="small">'+esc(l.w)+'</td>' +
      '<td class="num">'+yen(l.sales)+'</td><td class="num">'+pct(l.list>0?l.cost/l.list:null)+'</td><td class="num">'+pct(l.list>0?l.sales/l.list:null)+'</td>' +
      '<td class="num">'+yen(l.cost)+'</td>' +
      '<td class="num">'+yen(profit(l))+'</td><td class="num">'+pct(l.sales>0?profit(l)/l.sales:null)+'</td>' +
      '<td class="num">'+(l.via?yen(l.via):'')+'</td>' +
      '<td class="small">'+esc(l.form||'')+'</td><td>'+pill(l.st)+'</td><td class="mono small">'+l.oid+'</td></tr>';
    }).join('')
  ).join('');

  return '<div class="card tblwrap"><div class="row"><b class="small">案件別収支（'+m+'）</b>' +
    '<button class="btn sm right" onclick="exportAnbetsu()">CSV出力</button>' +
    '<button class="btn sm" onclick="printAnbetsu()">🖨 PDF出力</button></div>' +
    '<table style="margin-top:8px"><tr><th>メーカー</th><th>卸先</th><th class="num">売上（卸値税抜）</th><th class="num">掛率(A)</th><th class="num">掛率(卸)</th><th class="num">'+NM.co+'仕入</th><th class="num">利益額</th><th class="num">利益率</th><th class="num">'+NM.via+'利益</th><th>仕入形態</th><th>状態</th><th>受注ID</th></tr>' +
    (body || '<tr><td colspan="12" class="muted">この月の受注はまだありません</td></tr>') +
    (groups.length ? '<tr><td colspan="2"><b>合計</b></td><td class="num"><b>'+yen(t.sales)+'</b></td><td></td><td></td><td class="num"><b>'+yen(t.cost)+'</b></td><td class="num"><b>'+yen(profit(t))+'</b></td><td class="num"><b>'+pct(t.sales>0?profit(t)/t.sales:null)+'</b></td><td class="num">'+(t.via?'<b>'+yen(t.via)+'</b>':'')+'</td><td colspan="3"></td></tr>' : '') +
    '</table><p class="muted small" style="margin-top:6px">掛率(A)='+NM.co+'仕入÷定価、掛率(卸)=卸値÷定価。'+NM.via+'利益=卸値の3%（受注台帳「'+NM.via+'経由」列に印がある案件のみ。利益額はその分を引いた後）。受注台帳から自動集計されます</p></div>';
}

function kpi(l,v,d){ return '<div class="kpi"><div class="l">'+l+'</div><div class="v">'+v+'</div>'+(d?'<div class="d">'+d+'</div>':'')+'</div>'; }
// ⚠ 要対応ウィジェット: 止まっている案件（アラート設定シートのしきい値超え）と入金期限切れ
// ===== 振り分けの入れ込み済み判定（2026-07-15 ユーザー指定: 済みはグレーアウト・未完了は案件単位でアラート） =====
// 済み判定は「数量ベース」: 確定グループ（対象受注×ブランド）ごとに、受注の必要数 vs 回収台帳の割当数を突合する。
// 一部の回収を削除して数量が足りなくなったら「済み」が外れ、⚠️数量不足として検知する（2026-07-15 K0036削除事故の教訓）
function allocCoverage(){
  const needBy = {};   // 受注ID → { ブランド: 必要数 }
  rows('orderLedger').forEach(r=>{ const id=String(r['受注ID']||'').trim(); const b=brandOf(r['商品ID']); if(!id||!b) return;
    (needBy[id]=needBy[id]||{})[b]=(needBy[id][b]||0)+num(r['個数']); });
  // 確定グループ: 同時に確定した受注の組（対象受注列）×ブランド×取込日時。ゴミ箱行も読む（削除の検知用）。
  // 取込日時をキーに入れないと、同じ受注×ブランドを別の日に確定し直したグループ同士が合算されて数量が満ちて見える（2026-07-15の教訓）
  const groups = {};
  rowsAll('collectionLedger').forEach(r=>{
    const b=brandOf(r['商品ID']); if(!b) return;
    const t=String(r['対象受注']||'').split(',').map(x=>x.trim()).filter(x=>x && !x.startsWith('回収:'));
    if(!t.length) return;
    const key=t.join(',')+'|'+b+'|'+String(r['取込日時']||'').trim();
    const g=groups[key]=groups[key]||{orders:t, brand:b, got:0, kids:new Set(), delKids:new Set()};
    const kid=String(r['回収ID']||'').trim();
    if(String(r['削除']||'').trim()!==''){ if(kid) g.delKids.add(kid); }
    else { g.got+=num(r['個数']); if(kid) g.kids.add(kid); }
  });
  const per = {};   // 受注ID → { ブランド: {done, partial, broken, kids, delKids, brokenKids, brokenDel} }
  Object.values(groups).forEach(g=>{
    const need = g.orders.reduce((a,oid)=>a+((needBy[oid]||{})[g.brand]||0),0);
    const done = g.got>0 && g.got>=need;
    const partial = g.got>0 && g.got<need;
    // broken = 一部だけ削除されて数が合わないグループ（他のグループで数量が満ちていても事故として扱う。2026-07-15 K0035の教訓）
    const broken = partial && g.delKids.size>0;
    g.orders.forEach(oid=>{
      const e=(per[oid]=per[oid]||{})[g.brand]=per[oid][g.brand]||{done:false, partial:false, broken:false, kids:new Set(), delKids:new Set(), brokenKids:new Set(), brokenDel:new Set()};
      if(done) e.done=true;
      if(partial) e.partial=true;
      if(broken){ e.broken=true; g.kids.forEach(k=>e.brokenKids.add(k)); g.delKids.forEach(k=>e.brokenDel.add(k)); }
      g.kids.forEach(k=>e.kids.add(k)); g.delKids.forEach(k=>e.delKids.add(k));
    });
  });
  return per;
}
// 回収IDの表示用: 連番なら K0032〜K0036、飛びがあれば列挙
function kFmt(set){ const a=[...set].sort(); if(!a.length) return '';
  const nums=a.map(k=>parseInt(String(k).replace(/\D/g,''),10));
  const consec=a.length>1 && nums.every((n,i)=>i===0||n===nums[i-1]+1);
  return consec ? a[0]+'〜'+a[a.length-1] : a.join('・'); }
// 振り分け未完了の案件（ステータス=振分/発注 で、まだ数量が満ちていないブランドが残っているもの）
function allocPending(){
  const cov = allocCoverage();
  const g = {};
  rows('orderLedger').forEach(r=>{ if(String(r['ステータス']||'').trim()!=='振分/発注') return;
    const id=String(r['受注ID']||'').trim(); if(!id) return;
    (g[id]=g[id]||{id, w:r['卸先名'], brands:new Set()});
    const b=brandOf(r['商品ID']); if(b) g[id].brands.add(b);
  });
  return Object.values(g)
    .map(o=>({id:o.id, w:o.w, rest:[...o.brands].filter(b=>!((cov[o.id]||{})[b]||{}).done)}))
    .filter(o=>o.rest.length);
}
// 振り分けの一部が回収・検品側で削除されて数が合わなくなっている案件（ステータス不問・事故検知）。
// 全部削除=振り分けのやり直しは正常動作なのでアラートにしない（見た目が未振分に戻る）
function allocBroken(){
  const cov = allocCoverage();
  const info = {};
  rows('orderLedger').forEach(r=>{ const id=String(r['受注ID']||'').trim(); if(id && !info[id]) info[id]={w:r['卸先名']}; });
  const out = [];
  Object.entries(cov).forEach(([oid, brands])=>{ if(!info[oid]) return;
    Object.entries(brands).forEach(([b, e])=>{
      if(e.broken) out.push({id:oid, w:info[oid].w, brand:b, kids:kFmt(e.brokenKids), del:kFmt(e.brokenDel)});
    });
  });
  return out;
}
// 「🔁 振り分けをやり直す」: 壊れたグループの残りの回収をまとめて削除して、まっさらから振り分け直せる状態にする
async function allocRedo(brand){
  const cov = allocCoverage();
  const kids = new Set();
  Object.keys(ALLOC.sel).filter(k=>ALLOC.sel[k]).forEach(oid=>{ const e=(cov[oid]||{})[brand]; if(e && e.broken) e.brokenKids.forEach(k=>kids.add(k)); });
  const list=[...kids].sort();
  if(!list.length){ toast('削除対象の回収がありません', true); return; }
  if(!confirm(brand+' の前回の振り分け（'+list.join('・')+'）を削除して、最初から振り分け直します。\n削除した内容はゴミ箱と「前回の振り分け」表示に残ります。よろしいですか？')) return;
  for(const k of list){
    try{ await apiPost('deleteRecord', {entity:'collection', id:k}); }
    catch(e){ toast(k+' の削除に失敗: '+e.message, true); }
  }
  await reload(['collectionLedger']);
  toast('前回の振り分けを削除しました。振り分け直してください'); render();
}

function gauge(label, val, target){
  const r = target>0 ? Math.min(val/target,1) : 0;
  const over = target>0 && val>=target;
  return '<div class="gauge"><div class="row small"><span>'+label+'</span><span class="right mono">'+yen(val)+'（'+(target>0?Math.round(val/target*100):0)+'%）</span></div>' +
    '<div class="bar-outer" style="height:12px"><div class="bar-inner" style="width:'+(r*100)+'%;background:'+(over?'var(--good)':'var(--s1)')+'"></div></div></div>';
}

function tabsHtml(entity, cur, counts, extraTabs, activeExtras, extraBadges){

let _covMemo = {a:null, b:null, val:null};   // allocCoverageのメモ化（journeyは受注カードごとに呼ばれるため。台帳の参照が変わったら再計算）
function allocCoverageMemo(){
  if(_covMemo.a!==DB.collectionLedger || _covMemo.b!==DB.orderLedger){
    _covMemo = {a:DB.collectionLedger, b:DB.orderLedger, val:allocCoverage()};
  }
  return _covMemo.val;
}
function journeyHtml(g, ship){
  // 一気通貫ビュー: 支払方式（半金×2/掛け払い）× 経由の有無 でフローを出し分ける（2026-07-15 ユーザー指定）。
  // 裏のステータスは1本のまま。掛け払いは「全額請求→入金を待たずに進行→納品→翌月末入金」で入金が最後に来る。
  // 経由案件は請求＝マネフォ申請→承認→押印請求書送付→入金。さらに振分/発注と同時進行で
  // 経由先→自社のお金処理（発注書→請求書→マネフォ申請→入金。モノは動かない）が走るため専用ステップを出す
  const oi = FLOW.order.indexOf(g.st);
  const isCredit = NM.credit && String(g.pay||'').indexOf(NM.credit)===0;
  const shipPicked = !!(ship && FLOW.shipment.indexOf(ship['ステータス'])>=1);
  const shipDone = !!(ship && ship['ステータス']==='出荷完了');
  const docs = rows('docLog').filter(d=>String(d['受注ID']||'').trim()===String(g.id||'').trim()).map(d=>String(d['種類']||''));
  const inv2Done = docs.some(k=>k.indexOf('請求書②')>=0) || paidDone(g.st);   // 請求②発行済み（完了案件は発行済み扱い）
  const viaMoneyDone = docs.some(k=>k.indexOf('発注書（'+NM.via)===0);   // 経由先→自社の帳票処理は発注書の発行が起点
  const mf = g.via ? '/マネフォ' : '';   // 経由案件の請求はマネフォ申請→承認→押印請求書→入金
  // 振分=回収台帳の数量充足で自動判定／発注=発注サイトでの手動注文が別作業のため分離（済み=ステータスを回収中へ進めた時。2026-07-16 ユーザー指定）
  const cov = allocCoverageMemo();
  const obrands = new Set(); (g.rows||[]).forEach(r=>{ const b=brandOf(r['商品ID']); if(b) obrands.add(b); });
  const allocDone = obrands.size>0 && [...obrands].every(b=>(((cov[String(g.id||'').trim()]||{})[b])||{}).done);
  const steps = isCredit ? [
    ['受注', true],
    ['全額請求（'+NM.credit+(g.via?'・'+NM.via:'')+'）', oi>=1],   // 発行と同時にステータス前進。入金は待たない
    ['振分', oi>=3 || allocDone],
    ['発注', oi>=3 || !!String(g.ord||'').trim()],   // 発注日の記録 = 発注済み
    ['回収', oi>=4],
    ['検品/ロット処理', oi>=5],
    ['引去', shipPicked],
    ['出荷（納品）', shipDone],
    [NM.credit+'入金（翌月末）', paidDone(g.st)]
  ] : [
    ['受注', true],
    ['半金①請求'+mf+(g.via?'（'+NM.via+'）':''), oi>=1],
    ['半金①入金', !!g.in1 || oi>=2],
    ['振分', oi>=3 || allocDone],
    ['発注', oi>=3 || !!String(g.ord||'').trim()]      // 回収中に入った or 発注日の記録 = 発注済み
  ].concat(g.via ? [[NM.via+'→'+NM.co+'処理', viaMoneyDone]] : []).concat([
    ['回収', oi>=4],          // 検品/ロット処理中に入った = 回収済み
    ['検品/ロット処理', oi>=5],   // 最終入金待ちに入った = 検品・ロット処理済み
    ['半金②請求'+mf+(g.via?'（'+NM.via+'）':''), inv2Done],
    ['半金②入金', paidDone(g.st)],
    ['引去', shipPicked],
    ['出荷', shipDone]
  ]);
  const flowName = (isCredit ? NM.credit : '半金×2') + (g.via ? '・'+NM.via+'経由' : '・直');
  let nowMarked = false;
  return '<div class="steps journey"><span class="small muted" style="margin-right:6px">'+esc(flowName)+'：</span>' + steps.map(s=>{
    let cls = 'done';
    if(!s[1]){ cls = nowMarked ? '' : 'now'; nowMarked = true; }
    return '<span class="step"><span class="dot '+cls+'"></span>'+s[0]+'</span>';
  }).join('<span style="color:var(--grid)">—</span>') + '</div>';
}

async function bulkAdvance(entity, to){
  const ids = Object.keys(viewState.sel||{}).filter(k=>viewState.sel[k]);
  if(!ids.length){ toast('対象を選択してください', true); return; }
  const keys = ids.map(id=>entity+':'+id);
  if(keys.some(k=>inflight.has(k))){ toast('選択の中に処理中の案件があります。完了までお待ちください', true); return; }
  // 店販品でお渡し済みへ進む注文が混ざる場合に備えて担当者名を1回だけ聞く（空欄OK）
  let who = '';
  if(entity==='hanbai'){
    const w = prompt('「お渡し済み」になる注文がある場合、お渡し担当者の名前（不要なら空欄のままOK）:', '');
    if(w===null) return;
    who = w.trim();
  }
  keys.forEach(k=>inflight.add(k)); render();   // 選択した案件だけ処理中に。他は操作できる
  try{
    let ok=0; const errs=[];
    for(const id of ids){
      try{ await apiPost('advanceStatus', Object.assign({entity, id}, to?{to}:{}, who?{'担当':who}:{})); ok++; }
      catch(e){ errs.push(id+': '+e.message); }
    }
    viewState.sel = {};
    toast(ok+'件を更新しました'+(errs.length?' ／ 失敗 '+errs.length+'件: '+errs[0]:''), errs.length>0);
    await reload();
  }finally{ keys.forEach(k=>inflight.delete(k)); render(); }
}

  const ids = Object.keys(viewState.sel||{}).filter(k=>viewState.sel[k]);
  if(!ids.length){ toast('対象を選択してください', true); return; }
  const keys = ids.map(id=>entity+':'+id);
  if(keys.some(k=>inflight.has(k))){ toast('選択の中に処理中の案件があります。完了までお待ちください', true); return; }
  const typed = prompt('⚠ 選択中の '+ids.length+'件（'+ids.slice(0,8).join('、')+(ids.length>8?' ほか':'')+'）を削除します。\n行は消えず「ゴミ箱」に入り、あとから復元できます。\n\n削除するには件数「'+ids.length+'」をそのまま入力してください:');
  if(typed===null) return;
  if(typed.trim()!==String(ids.length)){ toast('件数が一致しないため削除を中止しました', true); return; }
  keys.forEach(k=>inflight.add(k)); render();
  try{
    let ok=0; const errs=[];
    for(const id of ids){
      try{ await apiPost('deleteRecord', {entity, id}); ok++; }

  }finally{ keys.forEach(k=>inflight.delete(k)); render(); }
}

async function issueDocUI(orderId){
  const kind = document.getElementById('docKind').value;
  const issuer = document.getElementById('docIssuer').value;
  const dateStr = document.getElementById('docDate').value;
  const due1 = document.getElementById('docDue').value;
  const due2 = document.getElementById('docDue2').value;
  if(!dateStr){ toast('発行日を入れてください', true); return; }
  // 対象商品（チェックした商品IDだけを渡す。金額もその分だけで計算される）
  const items = Array.from(document.querySelectorAll('.docItem')).filter(c=>c.checked).map(c=>c.value);
  if(!items.length){ toast('対象商品を1つ以上チェックしてください', true); return; }
  const key = 'order:'+orderId;
  if(inflight.has(key)){ toast('この案件は処理中です。完了までお待ちください', true); return; }
  inflight.add(key); render();   // フォームが「発行中…」表示になる。他の画面・案件はそのまま使える
  try{
    // docLog=発行済み一覧の更新・orderLedger=請求書①/全額の発行で受注ステータスが自動前進するため（応答に同梱・往復1回）
    if(kind==='invoiceSet'){
      // 請求書①＋② 一括発行（従来の「半金×2まとめて発行」パターン）
      const r = await apiPost('issueInvoiceSet', {'受注ID':orderId, issuer, dateStr, dueStr1:due1, dueStr2:due2, items}, ['docLog','orderLedger']);
      viewState.docFor = null;
      toast('請求書①（'+r.docs[0].docNo+'）と②（'+r.docs[1].docNo+'）を発行しました');
      window.open(r.docs[0].url, '_blank');
      window.open(r.docs[1].url, '_blank');   // ポップアップブロック時は発行済み一覧から開けます
    }else{
      const dueStr = (kind==='invoice2'||kind==='viaInvoice2') ? due2 : due1;   // ②は期限②、①/全額/その他は期限①欄を使う
      const r = await apiPost('issueDocument', {'受注ID':orderId, kind, issuer, dateStr, dueStr, items}, ['docLog','orderLedger']);
      viewState.docFor = null;
      toast(r.kindLabel+' '+r.docNo+' を発行しました');
      window.open(r.url, '_blank');
    }
    refreshAlerts();   // 請求書①/全額の発行はステータス自動前進を伴うので要対応も裏で更新
  }catch(e){
    toast(e.message, true);
  }finally{ inflight.delete(key); render(); }
}

// ===== 案件作成グリッド（JAN列を貼る → 商品展開 → 数量列を貼る → 商談中で登録） =====
// 掛け率の自動解決: 卸先マスタのブランド列「ミル(40%)」= ブランド名が「ミル」で始まれば適用。
// 卸先の個別掛け率（セル値）優先、無ければヘッダーの標準掛け率。
function rateFor(wid, brand){
  const headers = (DB.wholesalers&&DB.wholesalers.headers)||[];
  const wh = rows('wholesalers').find(w=>String(w['卸先ID']).trim()===wid);
  for(const h of headers){
    const m = h.match(/^(.+?)\(([\d.]*)%\)$/);
    if(!m) continue;
    const abbr = m[1].trim();
    if(!abbr || !String(brand||'').startsWith(abbr)) continue;
    const own = wh ? num(wh[h]) : 0;
    if(own>0) return own;
    if(m[2]!=='') return Number(m[2])/100;
  }
  return '';
}

function noExpand(){
  const wid = document.getElementById('noW').value;
  viewState.noW = wid;
  viewState.noJansTxt = document.getElementById('noJans').value;
  viewState.noQtyTxt = document.getElementById('noQtys').value;
  const lines = viewState.noJansTxt.split(/\r?\n/).map(s=>s.trim()).filter(s=>s!=='');
  if(!lines.length){ toast('JANを貼り付けてください', true); return; }
  // 数量枠はJANと同じ行順で対応づける（空行は数量未入力のまま）
  const qtys = viewState.noQtyTxt.split(/\r?\n/).map(s=>s.trim());
  viewState.noRows = lines.map((raw,i)=>{
    const qty = qtys[i]!==undefined && qtys[i]!=='' ? qtys[i] : '';
    // JANが無い商品は商品ID（P0135 など）でも引き当てられる
    const isPid = /^P\d{3,}$/i.test(raw);
    const jan = isPid ? raw.toUpperCase() : raw.replace(/\D/g,'');
    const p = isPid
      ? rows('products').find(pp=>String(pp['商品ID']||'').trim().toUpperCase()===raw.toUpperCase())
      : (jan ? rows('products').find(pp=>String(pp['JANコード']||'').replace(/\D/g,'')===jan) : null);
    if(!p) return {jan: raw, pid:'', name:'⚠ 未登録（商品マスタにJAN/商品IDが見つかりません）', size:'', list:0, rate:'', qty};
    const brand = String(p['ブランド']||p['カテゴリー']||'').trim();
    return {jan, pid:String(p['商品ID']).trim(), name:p['商品名'], size:p['容量']||'',
      list:num(p['定価（税抜）']), rate: wid ? rateFor(wid, brand) : '', qty};
  });
  render();
}
// 卸先を変えたら掛け率を引き直す（手入力済みの数量は保持）
function noApplyRates(){
  (viewState.noRows||[]).forEach(r=>{
    if(!r.pid) return;
    const p = product(r.pid);
    const brand = p ? String(p['ブランド']||p['カテゴリー']||'').trim() : '';
    r.rate = viewState.noW ? rateFor(viewState.noW, brand) : '';
  });
  render();
}
function noRecalcRow(i){
  const r = viewState.noRows[i];
  const unit = (r.rate!=='' && r.list) ? Math.round(r.list*num(r.rate)) : 0;
  const s = unit * (num(r.qty)||0);
  const u = document.getElementById('noUnit'+i); if(u) u.textContent = yen(unit);
  const c = document.getElementById('noSubC'+i); if(c) c.textContent = yen(s);
  let sub=0;
  viewState.noRows.forEach(rr=>{
    const uu = (rr.rate!=='' && rr.list) ? Math.round(rr.list*num(rr.rate)) : 0;
    sub += uu * (num(rr.qty)||0);
  });
  const ts = document.getElementById('noTotalSub'); if(ts) ts.textContent = yen(sub);
  const ti = document.getElementById('noTotalIncl'); if(ti) ti.textContent = yen(Math.round(sub*1.1));
}
function noQtyInput(i, v){ viewState.noRows[i].qty = v; noRecalcRow(i); }
function noFormToggle(name, on){
  const f = viewState.noForms = (viewState.noForms||['自社サロン']).filter(x=>x!==name);
  if(on) f.push(name);
  render();
}
// 掛け率は％で入力（65 → 0.65）。移行期の小数入力（0.65）もそのまま受ける（1以下は小数とみなす）
function noRateInput(i, v){ const n=num(v); viewState.noRows[i].rate = v==='' ? '' : (n>1 ? String(n/100) : String(n)); noRecalcRow(i); }
// 数量マスに複数行を貼ったら、そこから下の行へ順に流し込む
function noQtyPaste(e, i){
  const text = (e.clipboardData||window.clipboardData).getData('text');
  const vals = text.split(/\r?\n/).map(s=>s.trim()).filter(s=>s!=='');
  if(vals.length<=1) return;   // 1個だけなら通常の貼り付け
  e.preventDefault();
  vals.forEach((v,k)=>{
    const idx = i+k;
    if(!viewState.noRows[idx]) return;
    viewState.noRows[idx].qty = v;
    const inp = document.querySelector('.noQty[data-i="'+idx+'"]'); if(inp) inp.value = v;
    noRecalcRow(idx);
  });
}

  if(!lines.length){ toast('受注 '+oid+' が見つかりません', true); return; }
