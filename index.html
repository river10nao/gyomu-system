  viewState.newOrder = true; viewState.editOid = oid; viewState.tab = viewState.tab||'すべて';
  viewState.noW = String(h['卸先ID']||'').trim();
  viewState.noDate = String(h['受注日']||'').trim().replace(/\//g,'-');
  viewState.noPay = String(h['支払方式']||'半金×2').trim();
  viewState.noForms = String(h['仕入れ形態']||'自社サロン').split('＋').map(s=>s.trim()).filter(Boolean);
  viewState.noVia = String(h[NM.via+'経由']||'').trim()!=='';
  viewState.noRows = lines.map(r=>{
    const pid = String(r['商品ID']||'').trim();
    const p = product(pid)||{};
    return {jan: String(p['JANコード']||'').trim()||pid, pid, name: String(r['商品名']||''), size: String(r['容量']||''),
      list: num(r['定価（税抜）']), rate: String(num(r['掛け率'])||''), qty: String(num(r['個数'])||'')};
  });
  // JAN/数量枠にも既存明細を入れておく（商品を追加したいときは枠に足して「③展開」を押し直す）
  viewState.noJansTxt = viewState.noRows.map(r=>r.jan).join('\n');
  viewState.noQtyTxt = viewState.noRows.map(r=>r.qty).join('\n');
  window.scrollTo(0,0); render();
}

function mbExpand(){
  viewState.mbJansTxt = document.getElementById('mbJans').value;
  viewState.mbQtyTxt = document.getElementById('mbQtys').value;
  const lines = viewState.mbJansTxt.split(/\r?\n/).map(s=>s.trim()).filter(s=>s!=='');
  if(!lines.length){ toast('JANを貼り付けてください', true); return; }
  const qtys = viewState.mbQtyTxt.split(/\r?\n/).map(s=>s.trim());
  viewState.mbRows = lines.map((raw,i)=>{
    const qty = qtys[i]!==undefined && qtys[i]!=='' ? qtys[i] : '';
    const isPid = /^P\d{3,}$/i.test(raw);
    const jan = isPid ? raw.toUpperCase() : raw.replace(/\D/g,'');
    const p = isPid
      ? rows('products').find(pp=>String(pp['商品ID']||'').trim().toUpperCase()===raw.toUpperCase())
      : (jan ? rows('products').find(pp=>String(pp['JANコード']||'').replace(/\D/g,'')===jan) : null);
    if(!p) return {jan: raw, pid:'', name:'⚠ 未登録（商品マスタにJAN/商品IDが見つかりません）', size:'', qty};
    return {jan, pid:String(p['商品ID']).trim(), name:p['商品名'], size:p['容量']||'', qty};
  });
  render();
}
async function mbSubmit(){
  const sid = viewState.mbSid||'';
  if(!sid){ toast('回収先（サロン/外注先）を選んでください', true); return; }
  const sRow = rows('salons').find(s=>String(s['サロンID']).trim()===sid);
  const isOut = !!(sRow && String(sRow['種別']||'').trim()==='外注');
  if(!isOut && !(viewState.mbSup||'')){ toast('仕入先（ディーラー）を選んでください（支払い集計に使います）', true); return; }
  const items = (viewState.mbRows||[]).filter(r=>r.pid && num(r.qty)>0).map(r=>({pid:r.pid, name:r.name, size:r.size, qty:num(r.qty)}));
  if(!items.length){ toast('数量が1以上の商品がありません', true); return; }
  // 対象受注（任意）: 入力があれば実在チェック（サーバー側にも同じチェックあり）
  const orderIds = String(viewState.mbOids||'').split(/[,、\s]+/).map(s=>s.trim()).filter(Boolean);
  const known = new Set(rows('orderLedger').map(r=>String(r['受注ID']||'').trim()));
  const badOids = orderIds.filter(o=>!known.has(o));
  if(badOids.length){ toast('受注が見つかりません（打ち間違い？）: '+badOids.join(', '), true); return; }
  // 必要数超過ガード（サーバー側にも同じチェックあり）: 受注の数が合わなくなる登録はエラー（2026-07-18 ユーザー要望）
  if(orderIds.length){
    const needBy = {};
    rows('orderLedger').forEach(r=>{ if(orderIds.includes(String(r['受注ID']||'').trim())){ const pid=String(r['商品ID']||'').trim(); needBy[pid]=(needBy[pid]||0)+num(r['個数']); } });
    const haveBy = {};
    rows('collectionLedger').forEach(r=>{ if(!String(r['対象受注']||'').split(',').some(x=>orderIds.includes(x.trim()))) return;
      const pid=String(r['商品ID']||'').trim(); haveBy[pid]=(haveBy[pid]||0)+num(r['個数']); });
    const over = items.map(it=>{
      const need=needBy[it.pid]||0, have=haveBy[it.pid]||0;
      if(need===0) return it.name+'（対象受注にこの商品はありません）';
      return have+it.qty>need ? it.name+'（必要 '+need+'・登録済み '+have+'・今回 '+it.qty+'）' : '';
    }).filter(Boolean);
    if(over.length){ toast('受注の必要数を超えるため登録できません: '+over.join('／'), true); return; }
  }
  const total = items.reduce((a,x)=>a+x.qty,0);
  const date = viewState.mbDate || new Date().toLocaleDateString('sv-SE');

  const res = await act('commitManualPurchase', {salonId:sid, supplierId:isOut?'':(viewState.mbSup||''), date, orderIds, items}, '手動仕入れを登録しました', ['collectionLedger']);
  if(res){ viewState.mbRows=[]; viewState.mbJansTxt=''; viewState.mbQtyTxt=''; viewState.mbOids=''; toast('回収ID: '+res.collectionId+' を作成しました'); render(); }
}

// 余剰在庫の判定: 通常の流通在庫（回収入庫・業者仕入）以外の発生区分（回収残・キャンセル・返品など）
function isSurplus(r){
  const h = String(r['発生区分']||'').trim();
  return h!=='回収入庫' && h!=='業者仕入';
}
function stockTable(list, emptyMsg){
  // 商品単位でまとめて商品セルを縦結合（rowspan）。「全体で何個・内どのサロンから何個」が一目で読める形（2026-07-20 ユーザー要望）
  const groups = {}, order = [];
  list.forEach((r,rowIndex)=>{
    const pid = String(r['商品ID']||'').trim();
    const name = String(r['商品名']||'').trim();
    const size = String(r['容量']||'').trim();
    // 商品を特定できない空行は互いに結合しない（空欄同士が巨大な1商品に見えるのを防ぐ）。
    const k = pid || (name || size ? name+'/'+size : '__empty_row_'+rowIndex);
    if(!groups[k]){ groups[k]=[]; order.push(k); }
    groups[k].push(r);
  });
  const body = order.map(k=>{
    const rs = groups[k];
    const totQty = rs.reduce((a,r)=>a+num(r['残数']),0);
    const totYen = rs.reduce((a,r)=>a+num(r['在庫金額（税抜）']),0);
    const prodCell = '<td rowspan="'+rs.length+'" style="vertical-align:top;background:var(--wash)"><b>'+esc(rs[0]['商品名'])+'</b> <span class="small muted">'+esc(rs[0]['容量'])+'</span>' +
      '<div style="margin-top:2px">計 <b>'+totQty+'</b>点 <span class="small muted">／ '+yen(totYen)+'</span></div></td>';
    return rs.map((r,i)=>'<tr>'+(i===0?prodCell:'')+'<td class="small">'+esc(r['仕入元名'])+'</td><td class="num"><b>'+r['残数']+'</b></td>' +
      '<td class="mono small">'+esc(r['在庫ID'])+'</td><td>'+esc(String(r['区分']||'').trim()||'卸')+'</td><td class="small">'+esc(r['発生区分'])+'</td>' +
      '<td class="num">'+r['入庫数']+'</td><td class="num">'+r['出庫済']+'</td><td class="num">'+yen(num(r['仕入単価（税抜）']))+'</td><td class="num">'+yen(num(r['在庫金額（税抜）']))+'</td><td class="small">'+esc(r['発生日'])+'</td></tr>').join('');
  }).join('');
  return '<table><tr><th>商品（計）</th><th>仕入元</th><th class="num">残数</th><th>在庫ID</th><th>区分</th><th>発生</th><th class="num">入庫</th><th class="num">出庫</th><th class="num">仕入単価</th><th class="num">在庫金額</th><th>入庫日</th></tr>' +
    (body || '<tr><td colspan="11" class="muted">'+emptyMsg+'</td></tr>') +
  '</table>';
}
function vStock(){
  const q = viewState.q||'', kubun = viewState.kubun||'すべて', showAll = !!viewState.showAll;
  let list = rows('stock').filter(r=>String(r['在庫ID']||'').trim()!=='');
  if(!showAll) list = list.filter(r=>num(r['残数'])>0);
  if(kubun!=='すべて') list = list.filter(r=>{
    const k = String(r['区分']||'').trim() || '卸';   // 既存の余剰在庫（区分空欄）は卸扱い
    return k===kubun;
  });
  if(q) list = list.filter(r=>JSON.stringify(r).includes(q));
  const main = list.filter(r=>!isSurplus(r));        // 通常在庫（回収入庫・業者仕入）
  const surplus = list.filter(isSurplus);            // 余剰在庫（回収残・キャンセル・返品など）
  const mainValue = main.reduce((a,r)=>a+num(r['在庫金額（税抜）']),0);
  const mainQty = main.reduce((a,r)=>a+num(r['残数']),0);
  const surValue = surplus.reduce((a,r)=>a+num(r['在庫金額（税抜）']),0);
  const surQty = surplus.reduce((a,r)=>a+num(r['残数']),0);

  // 入庫前（回収処理中）の明細。ロット処理済み／ロット処理なしになった瞬間に在庫台帳へ自動入庫される
  const pendingIn = rows('collectionLedger').filter(r=>
    ['回収待ち','検品待ち','ロット処理待ち'].includes(String(r['ステータス']||'').trim()) && String(r['回収ID']||'').trim()!=='');
  const pendQty = pendingIn.reduce((a,r)=>a+num(r['個数']),0);
  const pendHtml =
    '<div class="card tblwrap"><b class="small">🚚 入庫待ち（回収処理中: '+pendingIn.length+'明細・'+pendQty+'点）</b>' +
    '<span class="muted small" style="margin-left:8px">検品して「ロット処理済み」または「ロット処理なし」になると自動でこの下の在庫に入ります</span>' +
    (pendingIn.length ?
      '<div style="margin-top:8px"><table><tr><th>回収ID</th><th>ステータス</th><th>サロン</th><th>商品</th><th>容量</th><th class="num">個数</th><th>発注日</th></tr>' +
      pendingIn.map(r=>'<tr><td class="mono small">'+esc(r['回収ID'])+'</td><td>'+pill(r['ステータス'])+'</td><td class="small">'+esc(r['サロン名'])+'</td><td>'+esc(r['商品名'])+'</td><td>'+esc(r['容量'])+'</td><td class="num">'+r['個数']+'</td><td class="small">'+esc(r['発注日'])+'</td></tr>').join('') +
      '</table></div>'
      : '<p class="muted small" style="margin:6px 0 0">現在、入庫待ちの商品はありません（回収が「回収待ち」「検品待ち」「ロット処理待ち」の間だけここに並びます）</p>') +
    '</div>';

  return '<h1>全体在庫</h1><div class="sub">在庫台帳（入庫 − 出庫ログ = 残数。履歴はすべて残ります）。メインは通常在庫、余剰在庫は下の別枠です</div>' +
  '<div class="kpis">'+kpi('通常在庫（税抜）',yen(mainValue), mainQty+'点 / '+main.length+'ロット')+kpi('余剰在庫（税抜）',yen(surValue), surQty+'点 / '+surplus.length+'ロット')+(pendingIn.length?kpi('入庫待ち（回収処理中）',pendQty+'点', pendingIn.length+'明細'):'')+'</div>' +
  pendHtml +
  '<div class="row" style="margin-bottom:12px">' +
    '<select onchange="viewState.kubun=this.value;render()">'+['すべて','卸','EC','店販'].map(o=>'<option '+(o===kubun?'selected':'')+'>'+o+'</option>').join('')+'</select>' +
    '<label class="small"><input type="checkbox" '+(showAll?'checked':'')+' onchange="viewState.showAll=this.checked;render()"> 残数0（履歴）も表示</label>' +
    '<input class="search" placeholder="検索（商品名・サロン・在庫ID）" value="'+esc(q)+'"'+searchAttrs()+'>' +
    '<button class="btn right" onclick="exportTable(\'在庫台帳\',\'stock\')">CSV出力</button></div>' +
  '<div class="card tblwrap"><b class="small">通常在庫（回収入庫・業者仕入）</b><div style="margin-top:8px">'+stockTable(main,'該当する在庫がありません')+'</div></div>' +
  '<div class="card tblwrap"><b class="small">余剰在庫（回収残・キャンセル・返品など）</b><div style="margin-top:8px">'+stockTable(surplus,'余剰在庫はありません')+'</div></div>' +
  '<div class="card"><b class="small">出庫履歴（最新20件）</b><div class="tblwrap" style="margin-top:8px"><table><tr><th>日付</th><th>在庫ID</th><th>商品</th><th>仕入元（サロン）</th><th class="num">出庫数</th><th>出庫先</th><th>出荷ID</th><th>受注ID</th></tr>' +
    rows('stockLog').filter(r=>String(r['在庫ID']||'').trim()!=='').slice(-20).reverse().map(r=>{
      // 在庫ID → 在庫台帳の仕入元名（どこのサロンから来たロットか）
      const lot = rows('stock').find(z=>String(z['在庫ID']).trim()===String(r['在庫ID']).trim());
      return '<tr><td>'+esc(r['日付'])+'</td><td class="mono small">'+esc(r['在庫ID'])+'</td><td>'+esc(r['商品名'])+'</td><td class="small">'+esc(lot?(lot['仕入元名']||'—'):'—')+'</td><td class="num">'+r['出庫数']+'</td><td>'+esc(r['出庫先'])+'</td><td class="mono small">'+esc(r['出荷ID']||'')+'</td><td class="mono small">'+esc(r['受注ID']||'')+'</td></tr>';
    }).join('') +
  '</table></div></div>';
}

async function addHanbaiUI(){
  const sid = document.getElementById('hbSalon').value;
  const pid = document.getElementById('hbProd').value;
  const qty = num(document.getElementById('hbQty').value);
  if(!sid || !pid || qty<=0){ toast('サロン・商品・個数を入れてください', true); return; }
  const salon = rows('salons').find(s=>String(s['サロンID']).trim()===sid);
  const p = product(pid);
  const kubun = document.getElementById('hbKubun').value;
  await act('addHanbaiOrder', {
    '区分':kubun,
    'サロンID':sid, 'サロン名':salon?(salon['サロン名(ディーラー含む)']||salon['サロン名']||''):'',
    '商品ID':pid, 'JAN':p?(p['JANコード']||''):'', '商品名':p?p['商品名']:'', '容量':p?(p['容量']||''):'',
    '個数':qty, '請求元ID':document.getElementById('hbBiller').value
  }, (kubun==='EC'?'EC注文':'店販品注文')+'を受け付けました', ['hanbaiOrders']);

// ECの「売れた」: 数量を聞いて出庫ログへ記帳（GAS側で残数検証・残0なら自動で完売）
async function ecSellUI(id){
  const o = rows('hanbaiOrders').find(r=>String(r['注文ID']).trim()===id);
  const lot = o ? rows('stock').find(z=>String(z['在庫ID']).trim()===String(o['在庫ID']||'').trim()) : null;
  const zan = lot ? num(lot['残数']) : null;
  const q = prompt('売れた数量を入れてください'+(zan!=null?'（残 '+zan+' 点）':''), '1');
  if(q===null) return;
  const qty = num(q);
  if(qty<=0){ toast('数量は1以上で入力してください', true); return; }
  if(zan!=null && qty>zan){ toast('残数（'+zan+'点）を超えています', true); return; }
  await act('hanbaiEcSell', {id:id, qty:qty}, id+' の売れた分（'+qty+'点）を出庫ログに記帳しました', ['hanbaiOrders','stock','stockLog']);
}

// サロン1行 = 積み上げバー1本。バーの中をブランドごとに色分けし、分母はそのサロンの枠合計
function vQuota(){
  const lines = calcQuota(selMonth);
  const bySalon = {};
  lines.forEach(l=>{
    if(!bySalon[l.sid]) bySalon[l.sid] = {sid:l.sid, name:l.name, brands:[]};
    bySalon[l.sid].brands.push(l);
  });
  // 使っていないサロンも空バーで全件出す（2026-07-18 ユーザー要望）。ストップ中・ディーラー・外注は除外
  rows('salons').filter(s=>String(s['サロンID']||'').trim() && ['サロン',''].includes(String(s['種別']||'').trim()) && String(s['ストップ']||'').trim()==='')
    .forEach(s=>{ const sid=String(s['サロンID']).trim(); if(!bySalon[sid]) bySalon[sid]={sid, name:salonLabel(s), brands:[]}; });
  // ストップ中のサロンは存在しない扱い: 使用実績があってもバーに出さない（2026-07-18 ユーザー指定）
  rows('salons').filter(s=>String(s['ストップ']||'').trim()!=='')
    .forEach(s=>{ delete bySalon[String(s['サロンID']||'').trim()]; });
  // ブランド→色の割当は全サロン共通・固定順（同じブランドはどのサロンでも同じ色）
  const allBrands = [...new Set(lines.map(l=>l.brand))].sort();
  const colorOf = b => 'var(--s'+((allBrands.indexOf(b)%6)+1)+')';
  const salons = Object.values(bySalon).map(s=>{
    s.totalUsed = s.brands.reduce((a,b)=>a+b.used,0);
    s.totalQuota = s.brands.reduce((a,b)=>a+b.quota,0);
    return s;
  }).sort((a,b)=>b.totalUsed-a.totalUsed);

  const legend = allBrands.map(b=>'<span class="step"><span class="dot" style="background:'+colorOf(b)+';border-color:'+colorOf(b)+'"></span>'+esc(b)+'</span>').join(' ');

  // ブランド別の仕入れ可能額（上限枠・安全枠の2本と現状比較。2026-07-18 ユーザー要望）
  // 枠は【ディーラー1社あたり】サロン数×1サロン枠（2026-07-18 確定仕様: 2社使えるブランドは倍まで仕入れ可）
  // 現状 = 対象月のサロン向け仕入（回収=発注日ベース・外注除く＋店販/EC）のサロン仕入価格。ディーラー別の内訳つき
  const qMax = num(viewState.qMax)||200000, qSafe = num(viewState.qSafe)||150000;
  const salonN = rows('salons').filter(s=>String(s['サロンID']||'').trim() && ['サロン',''].includes(String(s['種別']||'').trim()) && String(s['ストップ']||'').trim()==='').length;
  const usedByBrand = {}, usedBySup = {};
  const addUse = (b, sup, v)=>{ usedByBrand[b]=(usedByBrand[b]||0)+v; (usedBySup[b]=usedBySup[b]||{})[sup]=num((usedBySup[b]||{})[sup])+v; };
  rows('collectionLedger').forEach(r=>{ if(monthOf(r['発注日'])!==selMonth || ['外注','在庫'].includes(String(r['区分']||'卸').trim())) return;   // 在庫充当は仕入ではない（2026-07-18）
    const b=brandOf(r['商品ID']); if(!b) return;
    addUse(b, String(r['仕入先名']||r['仕入先ID']||'').trim()||'（仕入先未記録）', salonCost(r['商品ID'])*num(r['個数'])); });
  rows('hanbaiOrders').forEach(r=>{ if(monthOf(r['注文日'])!==selMonth) return;
    const b=brandOf(r['商品ID']); if(!b) return;
    addUse(b, String(r['請求元名']||'').trim()||'店販/EC（請求元なし）', salonCost(r['商品ID'])*num(r['個数'])); });
  const perDealerCap = salonN*qMax;   // ディーラー1社の枠 = サロン数×1サロン上限
  const leftCell = v=>'<td class="num"'+(v<0?' style="color:var(--crit);font-weight:700"':'')+'>'+(v<0?'超過 '+yen(-v):yen(v))+'</td>';
  const brandCapCard = '<div class="card tblwrap"><div class="row"><b class="small">📊 ブランド別 仕入れ可能額（'+selMonth+'・稼働サロン '+salonN+'軒・枠はディーラー1社あたり）</b>' +
    '<label class="small">1サロン上限 <input type="number" value="'+qMax+'" onchange="setVS(\'qMax\',this.value)" style="width:100px;text-align:right"></label>' +
    '<label class="small">1サロン安全枠 <input type="number" value="'+qSafe+'" onchange="setVS(\'qSafe\',this.value)" style="width:100px;text-align:right"></label></div>' +
    '<table style="margin-top:8px"><tr><th>ブランド</th><th class="num">今月仕入済み</th><th>ディーラー別内訳（各社の枠 '+yen(perDealerCap)+'）</th><th class="num">上限枠</th><th class="num">上限まであと</th><th class="num">安全枠</th><th class="num">安全枠まであと</th></tr>' +
    // 取引あるなしに関わらず全ブランドを出す（2026-07-21 ユーザー要望）: 商品マスタの全ブランドを土台に、
    // 仕入済みブランドを金額降順で先頭・残りを名前順で¥0行として並べる
    ((()=>{ const masterBrands = [...new Set(rows('products').map(p=>String(p['ブランド']||p['カテゴリー']||'').trim()).filter(Boolean))];
      return [...new Set([...Object.keys(usedByBrand).sort((a,b)=>usedByBrand[b]-usedByBrand[a]), ...masterBrands.sort((a,b)=>a.localeCompare(b,'ja'))])]; })()
    .map(b=>{
      const u = usedByBrand[b]||0;
      const dotColor = allBrands.indexOf(b)>=0 ? colorOf(b) : 'var(--grid)';
      const dc = Math.max(1, allocBrandDealers(b).length);   // 扱いディーラー数（率列から判定・0社=未設定は1社扱い）
      const capMax = salonN*qMax*dc, capSafe = salonN*qSafe*dc;
      const breakdown = Object.entries(usedBySup[b]||{}).sort((x,y)=>y[1]-x[1])
        .map(([n,v])=>'<div class="small"'+(v>perDealerCap?' style="color:var(--crit);font-weight:700"':'')+'>'+esc(n)+' '+yen(v)+(v>perDealerCap?'（1社枠超過）':'')+'</div>').join('');
      return '<tr><td><span class="dot" style="background:'+dotColor+';border-color:'+dotColor+'"></span> '+esc(b)+'<div class="muted small">扱い '+dc+'社</div></td><td class="num">'+(u>0?'<b>'+yen(u)+'</b>':'<span class="muted">'+yen(0)+'</span>')+'</td>' +
        '<td>'+(breakdown||'<span class="muted small">この月の仕入なし</span>')+'</td>' +
        '<td class="num">'+yen(capMax)+'<div class="muted small">'+salonN+'軒×'+yen(qMax)+'×'+dc+'社</div></td>'+leftCell(capMax-u)+
        '<td class="num">'+yen(capSafe)+'<div class="muted small">'+salonN+'軒×'+yen(qSafe)+'×'+dc+'社</div></td>'+leftCell(capSafe-u)+'</tr>';
    }).join('') || '<tr><td colspan="7" class="muted">商品マスタにブランドがありません</td></tr>') +
    '</table><p class="muted small" style="margin-top:6px">枠は【ディーラー1社あたり サロン数×1サロン枠】。2社から仕入れられるブランドは上限・安全枠が2倍になります。内訳の各社が1社枠（'+yen(perDealerCap)+'）を超えると赤字。1サロンの枠を変えると即再計算されます。</p></div>';

  return '<h1>サロン仕入枠</h1><div class="sub">サロンごとに1本のバー。色 = ブランド、バー全体 = そのサロンの枠合計。枠は「枠マスタ」シートで個別設定（未設定は'+yen(DEFAULT_QUOTA)+'/ブランド）</div>' +
  '<div class="row" style="margin-bottom:12px">対象月: '+monthPicker()+'<span class="right steps">'+legend+'</span></div>' +
  brandCapCard +
  '<div class="card">' +
  (salons.map(s=>{
    // 積み上げセグメント（幅 = 使用額 ÷ サロンの枠合計。100%でクリップ）
    let acc = 0;
    const segs = s.brands.map(b=>{
      const w = s.totalQuota>0 ? Math.min(b.used/s.totalQuota*100, 100-acc) : 0;
      acc += w;
      return '<div title="'+esc(b.brand)+' '+yen(b.used).replace('¥','¥ ')+' / 枠 '+yen(b.quota)+'" style="width:'+w+'%;background:'+colorOf(b.brand)+'"></div>';
    }).join('');
    // ブランド内訳チップ（70%黄・90%赤で警告色）。店販/EC分は「内 店販」で明示（2026-07-18 ユーザー要望）
    const chips = s.brands.map(b=>{
      const warnC = b.rate>=0.9 ? 'var(--crit)' : b.rate>=0.7 ? 'var(--warn)' : 'var(--ink2)';
      return '<span class="step small" style="color:'+warnC+'"><span class="dot" style="background:'+colorOf(b.brand)+';border-color:'+colorOf(b.brand)+'"></span>' +
        esc(b.brand)+' '+yen(b.used)+(num(b.hanbai)>0?'<span class="muted">（内 店販/EC '+yen(b.hanbai)+'）</span>':'')+' / '+yen(b.quota)+'（残 '+yen(b.quota-b.used)+'）</span>';
    }).join('<span style="color:var(--grid)">｜</span>');
    const totalHanbai = s.brands.reduce((a,b)=>a+num(b.hanbai),0);
    return '<div class="gauge" style="margin-bottom:16px"><div class="row small"><span><b>'+esc(s.name)+'</b></span>' +
      '<span class="right mono">'+(s.brands.length ? yen(s.totalUsed)+(totalHanbai>0?'<span class="muted">（内 店販/EC '+yen(totalHanbai)+'）</span>':'')+' / '+yen(s.totalQuota)+'（残 '+yen(s.totalQuota-s.totalUsed)+'）' : '<span class="muted">今月の仕入なし</span>')+'</span></div>' +
      '<div class="bar-outer" style="height:16px;display:flex;gap:2px">'+segs+'</div>' +
      (s.brands.length ? '<div class="steps" style="margin-top:4px">'+chips+'</div>' : '')+'</div>';
  }).join('') || '<p class="muted">この月の使用データがありません</p>') + '</div>' +
  '<p class="muted small">※ 使用額は 回収（発注日ベース）＋店販品注文 の サロン仕入価格（税抜）×個数。ブランド内訳が70%超で黄・90%超で赤。</p>';
}

// ===== 画面: サロン振り分け（admin） =====
// ☑️した受注の商品をブランドごとにサロンへ割り振り、確定すると回収台帳へ「回収待ち」で登録される。
// 割り振り: 選んだサロンへ商品ごとに均等配分（2026-07-14 指定。サロン間の差は最大1単位）。
// 商品マスタ「入数（箱）」が入っている商品は箱単位でのみ配分。空欄=1個ずつ。
let ALLOC = { sel:{}, brand:null, conf:{}, salons:{}, result:{}, q:'', addOut:false, lastCommit:null };

function unitOf(pid){ const p=product(pid); const u=p?num(p['入数（箱）']):0; return u>0?u:1; }
function salonLabel(s){ return String(s['サロン名(ディーラー含む)']||s['サロン名']||s['サロンID']||''); }

function allocOrderGroups(){
  const groups = {};

// 均等割り振り: 選んだサロンへ1単位（箱 or 1個）ずつ順繰りに配る。枠金額と上限は守る（守れない分は余り）

// spread=false: 従来方式＝商品順に配りきってから次の商品へ（先頭の商品がサロンに固まりやすい）
function allocRun(items, salonIds, budget, cap, spread){
  const rem={}, have={}, spent={};
  items.forEach(i=>rem[i.pid]=i.need);
  salonIds.forEach(s=>{ have[s]={}; spent[s]=0; });
  const placeOne = (i, cur)=>{   // 商品iを1単位、cur[i.pid]の位置からround-robinでどこかのサロンへ。置けたらtrue
    for(let k=0; k<salonIds.length; k++){
      const s = salonIds[(cur[i.pid]+k) % salonIds.length];
      if(cap && (have[s][i.pid]||0) >= cap) continue;
      if(spent[s] + i.price*i.unit > budget) continue;
      have[s][i.pid]=(have[s][i.pid]||0)+1;
      rem[i.pid]-=i.unit; spent[s]+=i.price*i.unit;
      cur[i.pid] = (cur[i.pid]+k+1) % salonIds.length;
      return true;
    }
    return false;
  };
  const cur = {};
  items.forEach((i,idx)=>cur[i.pid]=salonIds.length?idx%salonIds.length:0);   // 開始サロンを商品ごとにずらす（余りの+1が偏らない）
  if(spread){
    let prog = true;
    while(prog){
      prog = false;
      items.forEach(i=>{ if(rem[i.pid]>=i.unit && placeOne(i, cur)) prog = true; });
    }
  } else {
    items.forEach(i=>{ while(rem[i.pid]>=i.unit && placeOne(i, cur)); });
  }
  const m = {};
  salonIds.forEach(s=>{ m[s]={}; items.forEach(i=>{ const u=(have[s][i.pid]||0)*i.unit; if(u>0) m[s][i.pid]=u; }); });
  return m;
}

  const stockUse = conf.stockUse||{};
  const lotOf = {}; allocStockLots(itemsRaw).forEach(z=>lotOf[String(z['在庫ID']).trim()]=z);
  const stockByPid = {};

    const q = num(stockUse[zid]); if(q<=0) continue;

  const rem = {}; items.forEach(i=>rem[i.pid]=i.need);
  routs.filter(o=>num(o.budget)>0).forEach(o=>{

    const ocap = num(o.cap)||0;   // 同一商品の上限（箱/個数の単位。商品の偏り防止・2026-07-18 ユーザー要望）

        conf.outs.map((o,gi)=>'<tr>' +
          '<td><select onchange="allocCOutSet('+gi+',\'sid\',this.value)"><option value="">選んでください</option>' +
          dealers.map(s=>{ const sid=String(s['サロンID']).trim(); return '<option value="'+sid+'" '+(o.sid===sid?'selected':'')+'>'+esc(salonLabel(s))+'</option>'; }).join('') + '</select></td>' +
          '<td><input type="number" value="'+esc(o.budget||'')+'" onchange="allocCOutSet('+gi+',\'budget\',this.value)" placeholder="空欄=余り全部" style="width:140px"></td>' +
          '<td><input type="number" value="'+esc(o.cap||'')+'" onchange="allocCOutSet('+gi+',\'cap\',this.value)" placeholder="空欄=無制限" style="width:120px"></td>' +
          '<td><button class="btn sm" onclick="allocCOutDel('+gi+')">🗑</button></td></tr>').join('') +
        '</table>' +
        '<div style="margin-top:6px"><button class="btn sm" onclick="allocCOutAdd()">＋外注先を追加</button></div>' +
        '</div>'; })() +
    '<div class="row" style="margin-top:10px;align-items:flex-end">' +
    '<label class="small">1サロンの枠金額（円）<br><input type="number" value="'+esc(conf.budget||'')+'" onchange="allocConf(\'budget\',this.value)" placeholder="例: 200000"></label>' +
    '<label class="small">1サロン同一商品の上限（箱/個数）<br><input type="number" value="'+esc(conf.cap||'')+'" onchange="allocConf(\'cap\',this.value)" placeholder="'+NM.boxBrand+'は 1・空欄=無制限"></label>' +
    // 商品をばらけさせる: 全商品を1単位ずつ混ぜて配る（サロン・外注とも商品が偏らない。2026-07-18 ユーザー要望）
    '<label class="small" style="padding-bottom:6px"><input type="checkbox" '+(conf.spread!==false?'checked':'')+' onclick="allocConf(\'spread\',this.checked)" style="width:15px;height:15px;vertical-align:-2px"> <b>商品をばらけさせる</b> <span class="muted">OFF=商品順に詰める（前の商品から固まる）</span></label>' +
    '</div>' +
    // 割り振りグループ: ディーラーを選び、その下でそのディーラー分のサロンを選ぶ。＋で別ディーラーのグループを追加（2026-07-18 ユーザー要望のUI）
    allocGroups().map((g,gi)=>{
      const selCnt = Object.keys(g.sel||{}).filter(k=>g.sel[k]).length;
      const gq = (ALLOC.qg||{})[gi]||'';
      const list = salonPool.filter(s=>!gq || (salonLabel(s)+s['サロンID']).includes(gq));
      const multi = allocGroups().length>1;
      return '<div style="margin-top:10px;padding:10px 12px;background:var(--wash);border-radius:10px">' +
        '<div class="row" style="align-items:center"><b class="small">割り振り先サロン'+(multi?'（グループ'+(gi+1)+'）':'')+'（'+selCnt+'軒選択中・毎回選ぶ）</b>' +
        '<label class="small">🏭 仕入先ディーラー <select onchange="allocGroupSup('+gi+',this.value)">' +
        '<option value="">（自動判定'+(brandCands.length?': '+esc(brandCands.map(sid=>{const d=dealerRows.find(x=>String(x['サロンID']).trim()===sid);return d?salonLabel(d):sid;})[Math.min(gi,brandCands.length-1)]):'')+'）</option>' +
        dealerRows.map(s=>{ const sid=String(s['サロンID']).trim(); return '<option value="'+sid+'" '+(g.sup===sid?'selected':'')+'>'+esc(salonLabel(s))+'</option>'; }).join('') + '</select></label>' +
        '<input class="search" placeholder="サロン名で絞る" value="'+esc(gq)+'"'+searchAttrs('allocg'+gi)+' style="max-width:200px">' +
        (gi>0?'<button class="btn sm" style="margin-left:auto" onclick="allocGroupDel('+gi+')">🗑 このグループを削除</button>':'') +
        '</div>' +
        '<div style="margin-top:6px;max-height:170px;overflow:auto;display:flex;flex-wrap:wrap;gap:4px">' +
        list.map(s=>{ const sid=String(s['サロンID']).trim(); const on=(g.sel||{})[sid];
          return '<label class="pill" style="cursor:pointer;background:'+(on?'color-mix(in srgb,var(--s1) 20%, transparent)':'var(--wash)')+'"><input type="checkbox" '+(on?'checked':'')+' onclick="allocToggleSalon('+gi+',\''+sid+'\',this.checked)" style="width:14px;height:14px;vertical-align:-2px"> '+esc(salonLabel(s))+esc(linkTag(s))+'</label>'; }).join('') +
        '</div></div>';
    }).join('') +
    '<div style="margin-top:8px"><button class="btn sm" onclick="allocGroupAdd()">＋ 別のディーラーから仕入れるグループを追加</button>' +
    '<span class="muted small" style="margin-left:8px">同じサロンを複数グループで選ぶと、そのサロンは枠が2本（2社仕入れ）になります</span></div>' +
    '<div class="row" style="margin-top:10px"><button class="btn pri" onclick="allocCalc()">🧮 割り振りを計算</button>' +
    '<span class="muted small">計算後も表の数字は自由に手直しできます（ディーラー確認後の増減はここで直してから確定）</span></div></div>';

  // ③ 結果マトリクス
  const r = ALLOC.result[brand];
  if(r){
    const names = {}; rows('salons').forEach(s=>names[String(s['サロンID']).trim()]=salonLabel(s));
    const assignedOf = pid=>r.salonIds.reduce((a,s)=>a+num((r.m[s]||{})[pid]),0);
    const spentOf = sid=>r.items.reduce((a,i)=>a+num((r.m[sid]||{})[i.pid])*i.price,0);
    // 🤝外注仕入枠: ②で指定した枠に沿って計算済み。ここでは結果の確認＋🔁での手直しだけ（2026-07-18 枠指定を計算前へ移設）
    const outs = allocOutsOf(r);
    const outQty = pid=>outs.reduce((a,o)=>a+num((o.q||{})[pid]),0);
    const outTotal = r.items.reduce((a,i)=>a+outQty(i.pid),0);
    const shortTotal = r.items.reduce((a,i)=>a+Math.max(0, i.need-assignedOf(i.pid)-outQty(i.pid)),0);
    const dealers = rows('salons').filter(s=>String(s['種別']||'').trim()==='外注' && String(s['ストップ']||'').trim()==='' && String(s['サロンID']||'').trim());   // 外注先=種別「外注」（2026-07-17 3値化）
    html += '<div class="card tblwrap"><div class="row"><b class="small">③ '+esc(brand)+' 割り振り結果（対象受注: '+selIds.join(', ')+'）</b>' +
      '<button class="btn sm" onclick="allocPrint()">🖨 印刷用を開く（PDF保存）</button>' +
      '<button class="btn sm" onclick="allocSaveDraft()">💾 確認待ちで保存</button>' +
      // 余りが残っている間は確定に進めない（2026-07-18 ユーザー要望。押すと理由をトースト表示）
      (shortTotal>0
        ? '<button class="btn sm right" style="opacity:.55" onclick="toast(\'余りが '+shortTotal+'点 残っています。全て割り振ってから確定してください\', true)">✅ 確定して回収データを作成</button>'
        : '<button class="btn pri sm right" onclick="allocCommit()">✅ 確定して回収データを作成</button>')+'</div>' +
      // 外注枠のサマリー（枠の指定は②で。ここは結果確認＋🔁での手直し。表形式で整列・自社サロンのみモードでは出さない）
      (allocMode!=='own' && outs.length ? '<div style="margin-top:8px;padding:10px 12px;background:var(--wash);border-radius:10px">' +
      '<div class="row"><b class="small">🤝 外注仕入枠の結果</b>' +
      '<span class="small">余り <b'+(shortTotal>0?' style="color:var(--crit)"':'')+'>'+shortTotal+'点</b>'+(outTotal>0?' ／ 外注計 <b>'+outTotal+'点</b>':'')+'</span>' +
      '<span class="muted small">枠の変更は②で直して🧮押し直し。表の外注列は直接手直しOK</span></div>' +
      '<table style="margin-top:6px;width:auto"><tr><th>外注先</th><th class="num">枠</th><th class="num">上限</th><th class="num">計</th><th class="num">金額</th><th></th></tr>' +
      outs.map((o,gi)=>{
        const cnt = r.items.reduce((a,i)=>a+num((o.q||{})[i.pid]),0);
        const money = r.items.reduce((a,i)=>a+num((o.q||{})[i.pid])*allocOutUnit(o.sid,i.pid),0);
        const names2 = rows('salons').find(s=>String(s['サロンID']).trim()===o.sid);
        return '<tr><td class="small"><b>'+esc(names2?salonLabel(names2):(o.sid||'外注先未選択'))+'</b></td>' +
        '<td class="num small">'+(num(o.budget)?yen(num(o.budget)):'—（余り全部）')+'</td>' +
        '<td class="num small">'+(num(o.cap)?num(o.cap):'—')+'</td>' +
        '<td class="num"><b>'+cnt+'点</b></td>' +
        '<td class="num"><b>'+yen(money)+'</b>'+(num(o.budget)&&money>num(o.budget)?' <span class="small" style="color:var(--crit)">⚠枠超過</span>':'')+'</td>' +
        '<td><button class="btn sm" onclick="allocOutFill('+gi+')">🔁 余りをここへ（枠まで）</button></td></tr>'; }).join('') +
      '</table></div>' : '') +
      ((r.stock||[]).length ? '<div class="row small" style="margin-top:8px;padding:8px 12px;background:var(--wash);border-radius:10px"><b>📦 在庫充当:</b> ' +
        r.stock.map(x=>esc(x.name)+'×'+x.qty+'（'+esc(x.zid)+'）').join('　') +
        '<span class="muted">確定時に在庫から確保→区分=在庫の回収（ロット処理待ち）になります</span></div>' : '') +
      // 列の色分け（2026-07-18 ユーザー要望）: 「（2枠目）」表記の代わりに、仕入先ディーラー別＋外注先別に列の背景色で判別する
      (()=>{ const supColor = {}; let ci = 0;
        const colorFor = sup=>{ if(!sup) return ''; if(!(sup in supColor)) supColor[sup] = 'var(--s'+((ci++ % 6)+1)+')'; return supColor[sup]; };
        const colBg = sup=>{ const c = colorFor(sup); return c ? 'background:color-mix(in srgb,'+c+' 15%, transparent);' : ''; };
        const salonSup = s=>allocSupOf(r, s);
        r.salonIds.forEach(s=>colorFor(salonSup(s)));   // 凡例の並び=列の並びに合わせて先に登録
        if(allocMode!=='own') outs.forEach(o=>colorFor(o.sid));
        const legend = Object.keys(supColor).map(sid=>'<span class="step"><span class="dot" style="background:'+supColor[sid]+';border-color:'+supColor[sid]+'"></span>'+esc(names[sid]||sid)+'</span>').join(' ');
        return (legend ? '<div class="row" style="margin-top:8px"><span class="muted small">列の色 = 仕入先:</span><span class="steps small">'+legend+'</span></div>' : '') +
        '<table style="margin-top:6px"><tr><th>商品</th><th class="num">必要数</th>' +
        r.salonIds.map(s=>'<th class="num small" style="'+colBg(salonSup(s))+'">'+esc(names[slotBase(s)]||slotBase(s))+'</th>').join('') +
        (allocMode!=='own' ? outs.map(o=>'<th class="num small" style="'+colBg(o.sid)+'">🤝'+esc(names[o.sid]||'外注')+'</th>').join('') : '')+'<th class="num">割当計</th><th class="num">余り</th></tr>' +
        r.items.map(i=>{
          const asg = assignedOf(i.pid), oq = outQty(i.pid), left = i.need-asg-oq;
          return '<tr><td class="small">'+esc(i.name)+(i.unit>1?' <span class="muted">［'+i.unit+'個/箱］</span>':'')+'</td><td class="num">'+i.need+'</td>' +
            r.salonIds.map(s=>{ const v=num((r.m[s]||{})[i.pid]); const bad = i.unit>1 && v%i.unit!==0;
              return '<td class="num" style="'+colBg(salonSup(s))+'"><input type="number" value="'+(v||'')+'" min="0" onchange="allocCell(\''+i.pid+'\',\''+s+'\',this.value)" style="width:64px;text-align:right'+(bad?';border-color:var(--crit)':'')+'"'+(bad?' title="箱の入数（'+i.unit+'）の倍数ではありません"':'')+'></td>'; }).join('') +
            (allocMode!=='own' ? outs.map((o,gi)=>{ const ov=num((o.q||{})[i.pid]); return '<td class="num" style="'+colBg(o.sid)+'"><input type="number" value="'+(ov||'')+'" min="0" onchange="allocOutCell(\''+i.pid+'\','+gi+',this.value)" style="width:64px;text-align:right"></td>'; }).join('') : '') +
            '<td class="num">'+(asg+oq)+'</td><td class="num"'+(left!==0?' style="color:var(--crit);font-weight:700"':'')+'>'+left+'</td></tr>';
        }).join('') +
        '<tr style="background:var(--wash)"><td><b>合計金額 / 枠 '+yen(r.budget)+'</b></td><td></td>' +
        r.salonIds.map(s=>{ const sp=spentOf(s); const over=sp>r.budget;
          return '<td class="num small"'+(over?' style="color:var(--crit)"':'')+'><b>'+yen(sp)+'</b>'+(over?'<br>⚠枠超過':'')+'</td>'; }).join('');
      })() +
      (allocMode!=='own' ? outs.map(o=>{ const money=r.items.reduce((a,i)=>a+num((o.q||{})[i.pid])*allocOutUnit(o.sid,i.pid),0);
        return '<td class="num small"><b>'+yen(money)+'</b>'+(num(o.budget)&&money>num(o.budget)?'<br>⚠枠超過':'')+'</td>'; }).join('') : '') +
      '<td colspan="2"></td></tr></table>' +
      // 余りの一覧（目立たせる・2026-07-18 ユーザー要望）。余りが0になるまで✅確定はできない
      (shortTotal>0 ? '<div style="margin-top:8px;padding:10px 12px;border:1.5px solid var(--crit);border-radius:10px;background:color-mix(in srgb,var(--crit) 6%,transparent)">' +
        '<b class="small" style="color:var(--crit)">⚠ 余りが '+shortTotal+'点 あります — 全て割り振るまで確定できません</b>' +
        '<div class="small" style="margin-top:4px;color:var(--crit)">' +
        r.items.map(i=>{ const left=i.need-assignedOf(i.pid)-outQty(i.pid); return left>0 ? esc(i.name)+' '+esc(i.size||'')+' × <b>'+left+'</b>' : ''; }).filter(Boolean).join('　／　') +
        '</div><div class="muted small" style="margin-top:4px">サロンを増やす・枠金額/上限をゆるめる・外注枠に入れる、のいずれかで割り切ってください（表のマスは直接手直しできます）</div></div>' : '') +
      '<p class="muted small" style="margin-top:6px">サロン列の金額=サロン仕入価格（税抜）×個数、外注列の金額=外注先の掛け率×定価×個数。</p></div>';
  }
  return html;
}
function allocPrint(){
  // サロンごとの商品リスト形式（各サロンが何を何個か一目で分かる。検品時のチェック欄つき）
  const brand = ALLOC.brand, r = ALLOC.result[brand];
  if(!r){ toast('先に割り振りを計算してください', true); return; }
  const selIds = Object.keys(ALLOC.sel).filter(k=>ALLOC.sel[k]);
  const names = {}; rows('salons').forEach(s=>names[String(s['サロンID']).trim()]=salonLabel(s));
  const sections = r.salonIds.map(sid=>{
    const lines = r.items.map(i=>({i, qty:num((r.m[sid]||{})[i.pid])})).filter(x=>x.qty>0);
    if(!lines.length) return '';
    const totalQty = lines.reduce((a,x)=>a+x.qty,0);
    const totalYen = lines.reduce((a,x)=>a+x.qty*x.i.price,0);
    const supSid = allocSupOf(r, sid);   // サロン別に仕入先を分けている場合は各セクションに明記
    return '<div class="salon"><h2>'+esc(slotName(names, sid))+' <span class="sub">計 '+totalQty+'点 ／ ¥'+Math.round(totalYen).toLocaleString()+'（サロン価格・税抜）'+(r.supSplit&&supSid?' ／ 仕入先: '+esc(names[supSid]||supSid):'')+'</span></h2>' +
      '<table><tr><th>商品</th><th class="num">個数</th><th class="num">金額</th><th class="chk">回収✓</th><th class="chk">検品✓</th><th class="chk">ロット✓</th></tr>' +
      lines.map(x=>'<tr><td>'+esc(x.i.name)+' '+esc(x.i.size||'')+(x.i.unit>1?'（'+x.i.unit+'個/箱）':'')+'</td><td class="num">'+x.qty+'</td><td class="num">¥'+Math.round(x.qty*x.i.price).toLocaleString()+'</td><td class="chk">□</td><td class="chk">□</td><td class="chk">□</td></tr>').join('') +
      '</table></div>';
  }).join('');
  // 🤝外注仕入枠の分は外注先ごとに独立セクションで出す（外注先への共有・検品チェックにも使える。複数外注先対応 2026-07-18）
  const routs = r.outs || (r.out ? [r.out] : []);
  const outSection = routs.map(o=>{
    const ls = r.items.map(i=>({i, qty:num((o.q||{})[i.pid])})).filter(x=>x.qty>0);
    if(!ls.length) return '';
    const oname = o.sid ? (names[o.sid]||o.sid) : '（外注先未選択）';
    const omoney = ls.reduce((a,x)=>a+x.qty*allocOutUnit(o.sid,x.i.pid),0);
    return '<div class="salon"><h2>🤝 外注仕入: '+esc(oname)+' <span class="sub">計 '+ls.reduce((a,x)=>a+x.qty,0)+'点 ／ ¥'+Math.round(omoney).toLocaleString()+'（外注先掛け率・税抜）</span></h2>' +
    '<table><tr><th>商品</th><th class="num">個数</th><th class="num">金額</th><th class="chk">回収✓</th><th class="chk">検品✓</th><th class="chk">ロット✓</th></tr>' +
    ls.map(x=>'<tr><td>'+esc(x.i.name)+' '+esc(x.i.size||'')+'</td><td class="num">'+x.qty+'</td><td class="num">¥'+Math.round(x.qty*allocOutUnit(o.sid,x.i.pid)).toLocaleString()+'</td><td class="chk">□</td><td class="chk">□</td><td class="chk">□</td></tr>').join('') +
    '</table></div>'; }).join('');
  // 📦余剰在庫からの充当分（回収・検品はスキップしてロット処理から始まるため、チェック欄はロットのみ 2026-07-18）
  const stocks = r.stock || [];
  const stockSection = stocks.length ? '<div class="salon"><h2>📦 余剰在庫から充当 <span class="sub">計 '+stocks.reduce((a,x)=>a+x.qty,0)+'点（仕入れなし・手元在庫から出荷）</span></h2>' +
    '<table><tr><th>商品</th><th>引当元ロット</th><th class="num">個数</th><th class="chk">ロット✓</th></tr>' +
    stocks.map(x=>'<tr><td>'+esc(x.name)+' '+esc(x.size||'')+'</td><td>'+esc(x.zid)+'</td><td class="num">'+x.qty+'</td><td class="chk">□</td></tr>').join('') +
    '</table></div>' : '';
  const outQtyOf = pid=>routs.reduce((a,o)=>a+num((o.q||{})[pid]),0);
  const leftovers = r.items.map(i=>({i, left:i.need - r.salonIds.reduce((a,s)=>a+num((r.m[s]||{})[i.pid]),0) - outQtyOf(i.pid)})).filter(x=>x.left>0);
  const w = window.open('', '_blank');
  w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>'+esc(brand)+' サロン振り分け</title>' +
    '<style>body{font-family:"Hiragino Sans",sans-serif;font-size:12px;margin:24px}h1{font-size:16px}h2{font-size:14px;margin:18px 0 6px;border-left:4px solid #333;padding-left:8px}h2 .sub{font-size:11px;font-weight:normal;color:#555}' +
    'table{border-collapse:collapse;width:100%}th,td{border:1px solid #999;padding:5px 8px;text-align:left}td.num,th.num{text-align:right;white-space:nowrap}td.chk,th.chk{text-align:center;width:40px;padding:5px 3px}th.chk{font-size:10px}th{background:#f2f2f2;white-space:nowrap}' +
    '.salon{page-break-inside:avoid;margin-bottom:10px}@page{size:A4 portrait;margin:12mm}@media print{button{display:none}}</style></head><body>' +
    '<button onclick="print()" style="padding:6px 14px">🖨 印刷 / PDF保存</button>' +
    '<h1>'+esc(brand)+' サロン振り分け表（'+today()+'）</h1>' +
    '<p>対象受注: '+selIds.join(', ')+' ／ 1サロン枠: ¥'+Math.round(r.budget).toLocaleString()+(r.cap?' ／ 同一商品上限: '+r.cap:'')+(r.supSplit?' ／ 仕入先: サロンごと（各欄に記載）':r.supplier?' ／ 仕入先: '+esc(names[r.supplier]||r.supplier):'')+'</p>' +
    sections + outSection + stockSection +
    (leftovers.length ? '<div class="salon"><h2>配りきれなかった分（余り）</h2><table><tr><th>商品</th><th class="num">余り個数</th></tr>' +
      leftovers.map(x=>'<tr><td>'+esc(x.i.name)+' '+esc(x.i.size||'')+'</td><td class="num">'+x.left+'</td></tr>').join('') + '</table></div>' : '') +
    '</body></html>');
  w.document.close();
}
// ✅確定後の再印刷: 回収台帳の確定行から振り分け表を再構成する（ALLOC.result が無くても出せる。2026-07-20 ユーザー要望）
// 金額=サロン仕入価格（税抜）×個数。外注枠・在庫充当分は回収台帳の行として同じ形式で並ぶ
function allocPrintDone(brand, kidsCsv){
  const kidSet = new Set(String(kidsCsv).split(',').map(s=>s.trim()).filter(Boolean));
  const lines = rows('collectionLedger').filter(r=>kidSet.has(String(r['回収ID']||'').trim()));
  if(!lines.length){ toast('回収台帳に該当の回収が見つかりません', true); return; }
  const byKid = {};

  const orderIds = [...new Set(lines.flatMap(r=>String(r['対象受注']||'').split(',').map(x=>x.trim()).filter(Boolean)))];
  const sections = Object.keys(byKid).sort().map(kid=>{
    const rs = byKid[kid];
    const totalQty = rs.reduce((a,r)=>a+num(r['個数']),0);

      '<table><tr><th>商品</th><th class="num">個数</th><th class="num">金額</th><th class="chk">回収✓</th><th class="chk">検品✓</th><th class="chk">ロット✓</th></tr>' +
      rs.map(r=>'<tr><td>'+esc(r['商品名'])+' '+esc(r['容量']||'')+'</td><td class="num">'+num(r['個数'])+'</td><td class="num">¥'+Math.round(num(r['個数'])*salonCost(r['商品ID'])).toLocaleString()+'</td><td class="chk">□</td><td class="chk">□</td><td class="chk">□</td></tr>').join('') +
      '</table></div>';
  }).join('');
  const w = window.open('', '_blank');
  w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>'+esc(brand)+' サロン振り分け</title>' +
    '<style>body{font-family:"Hiragino Sans",sans-serif;font-size:12px;margin:24px}h1{font-size:16px}h2{font-size:14px;margin:18px 0 6px;border-left:4px solid #333;padding-left:8px}h2 .sub{font-size:11px;font-weight:normal;color:#555}' +
    'table{border-collapse:collapse;width:100%}th,td{border:1px solid #999;padding:5px 8px;text-align:left}td.num,th.num{text-align:right;white-space:nowrap}td.chk,th.chk{text-align:center;width:40px;padding:5px 3px}th.chk{font-size:10px}th{background:#f2f2f2;white-space:nowrap}' +
    '.salon{page-break-inside:avoid;margin-bottom:10px}@page{size:A4 portrait;margin:12mm}@media print{button{display:none}}</style></head><body>' +
    '<button onclick="print()" style="padding:6px 14px">🖨 印刷 / PDF保存</button>' +
    '<h1>'+esc(brand)+' サロン振り分け表（'+today()+'）</h1>' +
    '<p>対象受注: '+orderIds.join(', ')+' ／ 回収ID: '+esc(kFmt(kidSet))+'（確定済み・回収台帳から作成）</p>' +
    sections +
    '</body></html>');
  w.document.close();
}
// ⚡ 外注のみ受注の一括登録（振り分けスキップ・回収番号1つ。2026-07-18）
async function allocOutBulk(){
  const selIds = Object.keys(ALLOC.sel).filter(k=>ALLOC.sel[k]);
  const sel = document.getElementById('outBulkSid');
  const sid = sel ? sel.value : '';
  if(!sid){ toast('外注先を選んでください', true); return; }
  const brands = [...new Set(rows('orderLedger').filter(r=>ALLOC.sel[String(r['受注ID']||'').trim()]).map(r=>brandOf(r['商品ID'])||'（メーカー不明）'))];
  const items = brands.flatMap(b=>allocItems(b)).map(i=>({pid:i.pid, name:i.name, size:i.size, qty:i.need})).filter(x=>x.qty>0);
  if(!items.length){ toast('数量がありません', true); return; }
  const name = salonLabel(rows('salons').find(s=>String(s['サロンID']).trim()===sid)||{}) || sid;
  const total = items.reduce((a,x)=>a+x.qty,0);
  if(!confirm('外注のみの一括登録をします。\n対象受注: '+selIds.join(', ')+'\n外注先: '+name+'\n合計 '+total+'点 を回収番号1つで「回収待ち」に登録します。\n\n⚠ 登録後は、この画面での修正はできません（直す場合は回収・検品側で削除してやり直しになります）。よろしいですか？')) return;
  const res = await act('commitOutsourceBulk', {orderIds:selIds, salonId:sid, items}, '外注仕入を登録しました', ['collectionLedger','orderLedger']);
  if(res){
    const warning=allocFormUpdateWarning(res);
    ALLOC.lastCommit={brand:'外注仕入',ids:[res.collectionId],printable:false,warning};
    if(warning) toast(warning,true);
    toast('回収ID: '+res.collectionId+' を作成しました'); render();
  }
}
function allocFormUpdateWarning(res){
  const parts=[];
  if(res&&res.formUpdateError) parts.push('受注台帳の仕入れ形態を更新できませんでした: '+res.formUpdateError);
  const skipped=(res&&res.formUpdateSkippedOrderIds)||[];
  if(skipped.length) parts.push('仕入れ形態が数式のため更新をスキップ: '+skipped.join(', '));
  return parts.join(' / ');
}
async function allocCommit(){
  const brand = ALLOC.brand, r = ALLOC.result[brand];
  if(!r){ toast('先に割り振りを計算してください', true); return; }
  const selIds = Object.keys(ALLOC.sel).filter(k=>ALLOC.sel[k]);
  // スロット（2枠目）は台帳上は同じサロン: salonIdは#2を外して送り、仕入先だけ行ごとに分ける
  const lines = r.salonIds.map(slot=>({ slot, salonId:slotBase(slot),
    salonName:(rows('salons').find(s=>String(s['サロンID']).trim()===slotBase(slot))||{})['サロン名(ディーラー含む)']||'',
    items: r.items.map(i=>({pid:i.pid, name:i.name, size:i.size, qty:num((r.m[slot]||{})[i.pid])})).filter(x=>x.qty>0)
  })).filter(l=>l.items.length);
  // 🤝外注仕入枠: 外注先ごとに回収行として一緒に確定（区分=外注・外注先ごとに別の回収ID。複数外注先対応 2026-07-18）
  const salonCount = lines.length;
  let outTotal = 0;
  for(const o of allocOutsOf(r)){
    const oi = r.items.map(i=>({pid:i.pid, name:i.name, size:i.size, qty:num((o.q||{})[i.pid])})).filter(x=>x.qty>0);
    if(!oi.length) continue;
    if(!o.sid){ toast('外注枠に数量がありますが、外注先が選ばれていない行があります', true); return; }
    outTotal += oi.reduce((a,x)=>a+x.qty,0);
    lines.push({ salonId:o.sid,
      salonName:(rows('salons').find(s=>String(s['サロンID']).trim()===o.sid)||{})['サロン名(ディーラー含む)']||'',
      items: oi, out:true });
  }
  const total = lines.reduce((a,l)=>a+l.items.reduce((b,x)=>b+x.qty,0),0);
  const stockTotal = (r.stock||[]).reduce((a,x)=>a+num(x.qty),0);
  if(!lines.length && !stockTotal){ toast('個数が1以上のサロンがありません', true); return; }
  // 余りが残っている間は確定できない（ボタン側でも塞いでいるが、下書き再開などの抜け道防止で二重ガード。2026-07-18）
  const shortLeft = r.items.reduce((a,i)=>{
    const asg = r.salonIds.reduce((x,s)=>x+num((r.m[s]||{})[i.pid]),0);
    const oq = allocOutsOf(r).reduce((x,o)=>x+num((o.q||{})[i.pid]),0);
    return a + Math.max(0, i.need-asg-oq);
  },0);
  if(shortLeft>0){ toast('余りが '+shortLeft+'点 残っています。全て割り振ってから確定してください', true); return; }
  // 🏭 仕入先（支払い集計用）: 卸行があるときは全行の解決が必須（スロット別指定 > ブランド既定。2026-07-18）
  const hasWholesale = lines.some(l=>!l.out);
  const supLabelOf = sid=>{ const row=rows('salons').find(s=>String(s['サロンID']).trim()===sid); return row?salonLabel(row):sid; };
  const names = {}; rows('salons').forEach(s=>names[String(s['サロンID']).trim()]=salonLabel(s));
  if(hasWholesale){
    const missing = lines.filter(l=>!l.out && !allocSupOf(r, l.slot));
    if(missing.length){ toast('🏭 仕入先を選んでください（どのディーラーから仕入れるか。未選択: '+missing.map(l=>slotName(names,l.slot)).join(' / ')+'）', true); return; }
  }
  // 行ごとに解決済みの仕入先を積む（2枠目=同じサロンでも別ディーラー、に対応。2026-07-18）
  lines.forEach(l=>{ if(!l.out) l.supplierId = allocSupOf(r, l.slot); });
  const splitUsed = lines.some(l=>!l.out && l.supplierId!==(r.supplier||''));
  const supText = !hasWholesale ? '' :
    splitUsed ? '\n仕入先（枠ごと）:\n' + lines.filter(l=>!l.out).map(l=>'　'+slotName(names,l.slot)+' ← '+supLabelOf(l.supplierId)).join('\n')
              : (r.supplier ? '\n仕入先: '+supLabelOf(r.supplier) : '');
  if(!confirm(brand+' の割り振りを確定します。\n対象受注: '+selIds.join(', ')+supText+'\nサロン '+salonCount+'枠・合計 '+total+'点'+(outTotal?'（うち🤝外注 '+outTotal+'点）':'')+(stockTotal?'＋📦在庫充当 '+stockTotal+'点（確定時に在庫から確保）':'')+' を「回収待ち」で回収・検品に登録します。\n\n⚠ 確定後は、この画面での振り分けの修正はできません（直す場合は回収・検品側で該当の回収を削除してやり直しになります）。よろしいですか？')) return;
  const res = await act('commitAllocation', {brand, orderIds:selIds, lines, supplierId:r.supplier||'', stock:r.stock||[]}, brand+' の回収データを作成しました', ['collectionLedger','orderLedger','stock','stockLog']);
  if(res){
    const warning=allocFormUpdateWarning(res);
    ALLOC.lastCommit={brand,ids:res.collectionIds||[],printable:true,warning};
    delete ALLOC.result[brand];
    apiPost('deleteAllocDraft', {brand}, ['allocDrafts']).then(()=>render()).catch(()=>{});   // 確定したブランドの下書きは自動削除（無ければ何もしない）
    if(warning) toast(warning,true);
    toast('回収ID: '+res.collectionIds.join(', ')+' を作成しました'); render();
  }
}

// ===== 画面: マスタ管理（admin） =====
// 列名に社名を含むため関数で組む（ログイン後にNMが入ってから評価される）
const MASTER_CONF_ = ()=>({
  '商品':   {sheet:'products',    id:'商品ID',  cols:['商品ID','商品名','容量','カテゴリー','JANコード','定価（税抜）','サロン価掛け率','サロン仕入価格（税抜）',NM.co+'掛け率',NM.co+'仕入価格（税抜）'], add:'addProduct', upd:'updateProduct',
             searchCols:['商品名','JANコード','商品ID'], searchHint:'商品名・JANで検索'},
  // 略称はシート運用専用（発注書シート名の元）なのでシステム画面には出さない（2026-07-16 ユーザー指定。スプシ側には残す）
  '卸先':   {sheet:'wholesalers', id:'卸先ID',  cols:['卸先ID','卸先名','担当者名','メーカー','郵便番号','住所','電話番号','メールアドレス','納品先名','納品先住所','納品先TEL'], add:'addWholesaler', upd:'updateWholesaler',
             searchCols:['卸先名','担当者名','卸先ID'], searchHint:'卸先名・担当者で検索'},
  'サロン': {sheet:'salons',      id:'サロンID', cols:['サロンID','種別','サロン名(ディーラー含む)','担当者名','住所','電話番号','メールアドレス','締め日','支払日','ストップ'], add:'addSalon', upd:'updateSalon',
             searchCols:['サロン名(ディーラー含む)','担当者名','サロンID'], searchHint:'サロン名・担当者で検索'}
});
function vMasters(){
  const tab = viewState.tab || '商品';
  const MASTER_CONF = MASTER_CONF_();
  const c = MASTER_CONF[tab];
  const q = viewState.q||'';
  const headers = (DB[c.sheet]&&DB[c.sheet].headers)||[];
  let cols = c.cols.filter(col=>headers.includes(col));
  let list = rows(c.sheet).filter(r=>String(r[c.id]||'').trim()!=='');
  // 商品タブ: カテゴリーで絞り込み（プルダウン。選択肢は実データから自動生成）
  let catSel = '';
  if(tab==='商品'){
    const cats = [...new Set(list.map(r=>String(r['カテゴリー']||'').trim()).filter(Boolean))].sort();
    const cur = viewState.cat||'';
    if(cur) list = list.filter(r=>String(r['カテゴリー']||'').trim()===cur);
    catSel = '<select onchange="viewState.cat=this.value;render()">' +
      '<option value="">カテゴリー: すべて</option>' +
      cats.map(ct=>'<option value="'+esc(ct)+'"'+(ct===cur?' selected':'')+'>'+esc(ct)+'</option>').join('') + '</select>';
  }
  // タブごとに意味のある列だけを検索対象にする（商品=商品名/JAN、サロン=サロン名 等）
  if(q) list = list.filter(r=>c.searchCols.some(col=>String(r[col]||'').includes(q)));

  // 卸先タブ: ブランド別掛け率列（ヘッダー例「ミル(40%)」= カッコ内が標準掛け率、セル = その卸先の個別掛け率）
  let note = '';
  if(tab==='卸先'){
    const rateCols = headers.filter(h=>/\([^)]*%\)/.test(h));   // 「〇〇(40%)」「モデ(%)」形式の列だけ
    if(rateCols.length){
      list = list.map(r=>{
        const merged = Object.assign({}, r);
        rateCols.forEach(h=>{
          const v = r[h];
          merged[h] = (v===''||v==null) ? '' : Math.round(num(v)*100)+'%';   // 0.59 → 59%
        });
        return merged;
      });
      // よく使う掛け率は卸先名の右隣に並べる
      const nameIdx = cols.indexOf('卸先名');
      cols = cols.slice(0, nameIdx+1).concat(rateCols).concat(cols.slice(nameIdx+1));
      note = '<p class="muted small">※ ブランド列はカッコ内が標準掛け率、値が入っている卸先だけ個別掛け率です（編集ボタンからも変更できます。小数で入力: 例 0.59）</p>';
    }
  }

  return '<h1>マスタ管理</h1><div class="sub">正本は業務スプシ。ここから追加するとIDが自動採番されます（IDの手書き換えは厳禁）</div>' + note +
  '<div class="tabs">'+Object.keys(MASTER_CONF).map(t=>'<button class="'+(t===tab?'on':'')+'" onclick="viewState={tab:\''+t+'\'};render()">'+t+'<span class="n">'+rows(MASTER_CONF[t].sheet).filter(r=>String(r[MASTER_CONF[t].id]||'').trim()!=='').length+'</span></button>').join('')+'</div>' +
  '<div class="row" style="margin-bottom:12px">' +
    '<input class="search" placeholder="'+esc(c.searchHint)+'" value="'+esc(q)+'"'+searchAttrs()+'>' + catSel +
    '<button class="btn" onclick="masterForm(\''+tab+'\')">＋ 新規追加</button>' +
    '<button class="btn right" onclick="exportTable(\''+tab+'マスタ\',\''+c.sheet+'\')">CSV出力</button></div>' +
  '<div id="mform"></div>' +
  '<div class="card tblwrap sticky"><table><tr>'+cols.map(h=>{
    // 表示だけ短縮（スプシの実ヘッダー名は変えない＝書き込みは正式名のまま）
    const disp = h==='サロン仕入価格（税抜）' ? 'サロン価（税抜）' : h===NM.co+'仕入価格（税抜）' ? NM.co+'仕入（税抜）' : h;
    const cls = /\([^)]*%\)/.test(h) ? 'vline num' : /(価格|定価|掛け率)/.test(h) ? 'num' : '';
    return '<th class="'+cls+'">'+esc(disp)+'</th>';
  }).join('')+'<th></th></tr>' +
  list.slice(0,300).map(r=>{
    const stopped = String(r['ストップ']||'').trim()!=='';   // 値が入っていれば仕入れストップ（グレーアウト・振り分け候補外）
    return '<tr'+(stopped?' style="background:color-mix(in srgb,var(--muted) 18%,transparent);opacity:.62"':'')+'>'+cols.map(h=>'<td class="small'+(/(価格|定価|掛け率)/.test(h)?' num':'')+(/\([^)]*%\)/.test(h)?' vline num':'')+'" title="'+esc(r[h])+'">'+fmtMasterCell(h, r[h])+'</td>').join('')+'<td><button class="btn sm" onclick=\'masterForm("'+tab+'","'+esc(String(r[c.id]))+'")\'>編集</button></td></tr>';
  }).join('') +
  '</table>'+(list.length>300?'<p class="muted small">300件まで表示（検索で絞ってください）</p>':'')+'</div>';
}
// マスタ表示用: 価格・定価は ¥1,560 形式、掛け率は％表記（値は 0.6 のまま・表示だけ 60%。0.1%単位で丸めて浮動小数の揺れを吸収）
function fmtMasterCell(h, v){
  if(v===''||v==null) return '';
  if(h==='ストップ' && String(v).trim()!=='') return '🚫 '+esc(v);
  if(/(価格|定価)/.test(h) && !isNaN(num(v))) return yen(num(v));
  // 卸先の「ミル(40%)」等ブランド列は値が元々％表記のため変換しない（掛け率列のみ 0.6→60% 変換）
  if(/掛け率/.test(h) && !isNaN(num(v)) && String(v).trim()!=='') return pctDisp(num(v));
  return esc(v);
}
// 掛け率の％表示（0.6→60%・0.419→41.9%）
function pctDisp(r){ return (Math.round(r*1000)/10)+'%'; }
function masterForm(tab, id){
  const conf = MASTER_CONF_()[tab];
  const headers = (DB[conf.sheet]&&DB[conf.sheet].headers)||[];
  const cur = id ? rows(conf.sheet).find(r=>String(r[conf.id]).trim()===id) : null;
  const fields = headers.filter(h=>h && h!==conf.id);
  document.getElementById('mform').innerHTML =
    '<div class="card"><b class="small">'+(id?id+' を編集':tab+'を新規追加')+'</b>' +
    '<div class="row" style="margin-top:8px">' +
    fields.map(h=>'<label class="small" style="min-width:200px;flex:1">'+esc(h)+'<br><input data-f="'+esc(h)+'" value="'+esc(cur?cur[h]:'')+'" style="width:100%"></label>').join('') +
    '</div><div class="row" style="margin-top:10px">' +
    '<button class="btn pri" onclick=\'masterSave("'+tab+'","'+(id||'')+'")\'>保存</button>' +
    '<button class="btn" onclick="document.getElementById(\'mform\').innerHTML=\'\'">閉じる</button></div></div>';
  document.getElementById('mform').scrollIntoView({behavior:'smooth'});
}
async function masterSave(tab, id){
  const conf = MASTER_CONF_()[tab];
  const payload = {};
  document.querySelectorAll('#mform input[data-f]').forEach(inp=>{ if(inp.value!=='') payload[inp.dataset.f]=inp.value; });
  if(id) payload[conf.id]=id;
  await act(id?conf.upd:conf.add, payload, id?'更新しました':'追加しました（ID自動採番）', [conf.sheet]);
  const f = document.getElementById('mform'); if(f) f.innerHTML='';
}
