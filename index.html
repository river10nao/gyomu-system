    '<label class="small">1サロン同一商品の上限（箱/個数の単位。空欄=無制限）<br><input type="number" value="'+esc(conf.cap||'')+'" onchange="allocConf(\'cap\',this.value)" placeholder="'+NM.boxBrand+'は 1"></label>' +
    '</div>' +
    '<div style="margin-top:10px"><b class="small">割り振り先サロン（'+salonSel.length+'軒選択中・毎回選ぶ）</b> ' +
    '<input class="search" placeholder="サロン名で絞る" value="'+esc(q)+'"'+searchAttrs('alloc')+'  style="max-width:220px">' +
    '<div style="margin-top:6px;max-height:170px;overflow:auto;display:flex;flex-wrap:wrap;gap:4px">' +
    salons.map(s=>{ const sid=String(s['サロンID']).trim(); const on=ALLOC.salons[sid];
      return '<label class="pill" style="cursor:pointer;background:'+(on?'color-mix(in srgb,var(--s1) 20%, transparent)':'var(--wash)')+'"><input type="checkbox" '+(on?'checked':'')+' onclick="allocToggleSalon(\''+sid+'\',this.checked)" style="width:14px;height:14px;vertical-align:-2px"> '+esc(salonLabel(s))+'</label>'; }).join('') +
    '</div></div>' +
    '<div class="row" style="margin-top:10px"><button class="btn pri" onclick="allocCalc()">🧮 割り振りを計算</button>' +
    '<span class="muted small">計算後も表の数字は自由に手直しできます（ディーラー確認後の増減はここで直してから確定）</span></div></div>';

  // ③ 結果マトリクス
  const r = ALLOC.result[brand];
  if(r){
    const names = {}; rows('salons').forEach(s=>names[String(s['サロンID']).trim()]=salonLabel(s));
    const assignedOf = pid=>r.salonIds.reduce((a,s)=>a+num((r.m[s]||{})[pid]),0);
    const spentOf = sid=>r.items.reduce((a,i)=>a+num((r.m[sid]||{})[i.pid])*i.price,0);
    html += '<div class="card tblwrap"><div class="row"><b class="small">③ '+esc(brand)+' 割り振り結果（対象受注: '+selIds.join(', ')+'）</b>' +
      '<button class="btn sm" onclick="allocPrint()">🖨 印刷用を開く（PDF保存）</button>' +
      '<button class="btn sm" onclick="allocSaveDraft()">💾 確認待ちで保存</button>' +
      '<button class="btn pri sm right" onclick="allocCommit()">✅ 確定して回収データを作成</button></div>' +
      '<table style="margin-top:8px"><tr><th>商品</th><th class="num">必要数</th>' +
      r.salonIds.map(s=>'<th class="num small">'+esc(names[s]||s)+'</th>').join('') +
      '<th class="num">割当計</th><th class="num">余り</th></tr>' +
      r.items.map(i=>{
        const asg = assignedOf(i.pid), left = i.need-asg;
        return '<tr><td class="small">'+esc(i.name)+(i.unit>1?' <span class="muted">［'+i.unit+'個/箱］</span>':'')+'</td><td class="num">'+i.need+'</td>' +
          r.salonIds.map(s=>{ const v=num((r.m[s]||{})[i.pid]); const bad = i.unit>1 && v%i.unit!==0;
            return '<td class="num"><input type="number" value="'+(v||'')+'" min="0" onchange="allocCell(\''+i.pid+'\',\''+s+'\',this.value)" style="width:64px;text-align:right'+(bad?';border-color:var(--crit)':'')+'"'+(bad?' title="箱の入数（'+i.unit+'）の倍数ではありません"':'')+'></td>'; }).join('') +
          '<td class="num">'+asg+'</td><td class="num"'+(left<0?' style="color:var(--crit)"':'')+'>'+left+'</td></tr>';
      }).join('') +
      '<tr style="background:var(--wash)"><td><b>合計金額 / 枠 '+yen(r.budget)+'</b></td><td></td>' +
      r.salonIds.map(s=>{ const sp=spentOf(s); const over=sp>r.budget;
        return '<td class="num small"'+(over?' style="color:var(--crit)"':'')+'><b>'+yen(sp)+'</b>'+(over?'<br>⚠枠超過':'')+'</td>'; }).join('') +
      '<td colspan="2"></td></tr></table>' +
      '<p class="muted small" style="margin-top:6px">余りが残った商品は確定後も受注に紐づいたままです。次回の振り分けで同じ受注を選べば続きを割り振れます。金額=サロン仕入価格（税抜）×個数。</p></div>';
  }
  return html;
}
function allocPrint(){
  // サロンごとの商品リスト形式（各サロンが何を何個か一目で分かる。検品時のチェック欄つき）
  const brand = ALLOC.brand, r = ALLOC.result[brand];
  if(!r){ toast('先に割り振りを計算してください', true); return; }
  const selIds = Object.keys(ALLOC.sel).filter(k=>ALLOC.sel[k]);
  const names = {}; rows('salons').forEach(s=>names[String(s['サロンID']).trim()]=salonLabel(s));
  const sections = r.salonIds.map(sid=>{
    const lines = r.items.map(i=>({i, qty:num((r.m[sid]||{})[i.pid])})).filter(x=>x.qty>0);
    if(!lines.length) return '';
    const totalQty = lines.reduce((a,x)=>a+x.qty,0);
    const totalYen = lines.reduce((a,x)=>a+x.qty*x.i.price,0);
    return '<div class="salon"><h2>'+esc(names[sid]||sid)+' <span class="sub">計 '+totalQty+'点 ／ ¥'+Math.round(totalYen).toLocaleString()+'（サロン価格・税抜）</span></h2>' +
      '<table><tr><th>商品</th><th class="num">個数</th><th class="num">金額</th><th class="chk">回収✓</th><th class="chk">検品✓</th></tr>' +
      lines.map(x=>'<tr><td>'+esc(x.i.name)+' '+esc(x.i.size||'')+(x.i.unit>1?'（'+x.i.unit+'個/箱）':'')+'</td><td class="num">'+x.qty+'</td><td class="num">¥'+Math.round(x.qty*x.i.price).toLocaleString()+'</td><td class="chk">□</td><td class="chk">□</td></tr>').join('') +
      '</table></div>';
  }).join('');
  const leftovers = r.items.map(i=>({i, left:i.need - r.salonIds.reduce((a,s)=>a+num((r.m[s]||{})[i.pid]),0)})).filter(x=>x.left>0);
  const w = window.open('', '_blank');
  w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>'+esc(brand)+' サロン振り分け</title>' +
    '<style>body{font-family:"Hiragino Sans",sans-serif;font-size:12px;margin:24px}h1{font-size:16px}h2{font-size:14px;margin:18px 0 6px;border-left:4px solid #333;padding-left:8px}h2 .sub{font-size:11px;font-weight:normal;color:#555}' +
    'table{border-collapse:collapse;width:100%}th,td{border:1px solid #999;padding:5px 8px;text-align:left}td.num,th.num{text-align:right}td.chk,th.chk{text-align:center;width:52px}th{background:#f2f2f2}' +
    '.salon{page-break-inside:avoid;margin-bottom:10px}@page{size:A4 portrait;margin:12mm}@media print{button{display:none}}</style></head><body>' +
    '<button onclick="print()" style="padding:6px 14px">🖨 印刷 / PDF保存</button>' +
    '<h1>'+esc(brand)+' サロン振り分け表（'+today()+'）</h1>' +
    '<p>対象受注: '+selIds.join(', ')+' ／ 1サロン枠: ¥'+Math.round(r.budget).toLocaleString()+(r.cap?' ／ 同一商品上限: '+r.cap:'')+'</p>' +
    sections +
    (leftovers.length ? '<div class="salon"><h2>配りきれなかった分（余り）</h2><table><tr><th>商品</th><th class="num">余り個数</th></tr>' +
      leftovers.map(x=>'<tr><td>'+esc(x.i.name)+' '+esc(x.i.size||'')+'</td><td class="num">'+x.left+'</td></tr>').join('') + '</table></div>' : '') +
    '</body></html>');
  w.document.close();
}
async function allocCommit(){
  const brand = ALLOC.brand, r = ALLOC.result[brand];
  if(!r){ toast('先に割り振りを計算してください', true); return; }
  const selIds = Object.keys(ALLOC.sel).filter(k=>ALLOC.sel[k]);
  const lines = r.salonIds.map(sid=>({ salonId:sid,
    salonName:(rows('salons').find(s=>String(s['サロンID']).trim()===sid)||{})['サロン名(ディーラー含む)']||'',
    items: r.items.map(i=>({pid:i.pid, name:i.name, size:i.size, qty:num((r.m[sid]||{})[i.pid])})).filter(x=>x.qty>0)
  })).filter(l=>l.items.length);
  const total = lines.reduce((a,l)=>a+l.items.reduce((b,x)=>b+x.qty,0),0);
  if(!lines.length){ toast('個数が1以上のサロンがありません', true); return; }
  if(!confirm(brand+' の割り振りを確定します。\n対象受注: '+selIds.join(', ')+'\nサロン '+lines.length+'軒・合計 '+total+'点 を「回収待ち」で回収・検品に登録します。よろしいですか？')) return;
  const res = await act('commitAllocation', {brand, orderIds:selIds, lines}, brand+' の回収データを作成しました', ['collectionLedger']);
  if(res){
    delete ALLOC.result[brand];
    apiPost('deleteAllocDraft', {brand}).then(()=>reload(['allocDrafts'])).catch(()=>{});   // 確定したブランドの下書きは自動削除（無ければ何もしない）
    toast('回収ID: '+res.collectionIds.join(', ')+' を作成しました'); render();
  }
}
// 振り分け下書き: 保存（1ブランド=1下書き・上書き）／再開／削除
async function allocSaveDraft(){
  const brand = ALLOC.brand;
  if(!ALLOC.result[brand]){ toast('先に割り振りを計算してください', true); return; }
  const selIds = Object.keys(ALLOC.sel).filter(k=>ALLOC.sel[k]);
  await act('saveAllocDraft', {brand, orders:selIds.join(', '), json: JSON.stringify(ALLOC)}, brand+' の振り分けを保存しました（リロードしても消えません）', ['allocDrafts']);
}
function allocResumeDraft(id){
  const d = rows('allocDrafts').find(x=>String(x['下書きID']).trim()===id);
  if(!d){ toast('下書きが見つかりません', true); return; }
  try{ ALLOC = JSON.parse(d.json); }catch(e){ toast('下書きの読み込みに失敗しました', true); return; }
  toast(d['ブランド']+' の振り分けを再開しました。数を直すか、そのまま確定してください');
  render();
}
async function allocDeleteDraft(id){
  if(!confirm('この下書きを削除しますか？（保存した振り分け内容が消えます）')) return;
  await act('deleteAllocDraft', {id}, '下書きを削除しました', ['allocDrafts']);
}

// ===== 画面: マスタ管理（admin） =====
// 列名に社名を含むため関数で組む（ログイン後にNMが入ってから評価される）
const MASTER_CONF_ = ()=>({
  '商品':   {sheet:'products',    id:'商品ID',  cols:['商品ID','商品名','容量','カテゴリー','JANコード','定価（税抜）','サロン価掛け率','サロン仕入価格（税抜）',NM.co+'掛け率',NM.co+'仕入価格（税抜）'], add:'addProduct', upd:'updateProduct',
             searchCols:['商品名','JANコード','商品ID'], searchHint:'商品名・JANで検索'},
  '卸先':   {sheet:'wholesalers', id:'卸先ID',  cols:['卸先ID','卸先名','担当者名','メーカー','郵便番号','住所','電話番号','メールアドレス','略称'], add:'addWholesaler', upd:'updateWholesaler',
             searchCols:['卸先名','担当者名','卸先ID'], searchHint:'卸先名・担当者で検索'},
  'サロン': {sheet:'salons',      id:'サロンID', cols:['サロンID','種別','サロン名(ディーラー含む)','担当者名','住所','電話番号','メールアドレス','締め日','支払日','ストップ'], add:'addSalon', upd:'updateSalon',
             searchCols:['サロン名(ディーラー含む)','担当者名','サロンID'], searchHint:'サロン名・担当者で検索'}
});
function vMasters(){
  if(role!=='admin') return '<p>権限がありません</p>';
  const tab = viewState.tab || '商品';
  const MASTER_CONF = MASTER_CONF_();
  const c = MASTER_CONF[tab];
  const q = viewState.q||'';
  const headers = (DB[c.sheet]&&DB[c.sheet].headers)||[];
  let cols = c.cols.filter(col=>headers.includes(col));
  let list = rows(c.sheet).filter(r=>String(r[c.id]||'').trim()!=='');
  // 商品タブ: カテゴリーで絞り込み（プルダウン。選択肢は実データから自動生成）
  let catSel = '';
  if(tab==='商品'){
    const cats = [...new Set(list.map(r=>String(r['カテゴリー']||'').trim()).filter(Boolean))].sort();
    const cur = viewState.cat||'';
    if(cur) list = list.filter(r=>String(r['カテゴリー']||'').trim()===cur);
    catSel = '<select onchange="viewState.cat=this.value;render()">' +
      '<option value="">カテゴリー: すべて</option>' +
      cats.map(ct=>'<option value="'+esc(ct)+'"'+(ct===cur?' selected':'')+'>'+esc(ct)+'</option>').join('') + '</select>';
  }
  // タブごとに意味のある列だけを検索対象にする（商品=商品名/JAN、サロン=サロン名 等）
  if(q) list = list.filter(r=>c.searchCols.some(col=>String(r[col]||'').includes(q)));

  // 卸先タブ: ブランド別掛け率列（ヘッダー例「ミル(40%)」= カッコ内が標準掛け率、セル = その卸先の個別掛け率）
  let note = '';
  if(tab==='卸先'){
    const rateCols = headers.filter(h=>/\([^)]*%\)/.test(h));   // 「〇〇(40%)」「モデ(%)」形式の列だけ
    if(rateCols.length){
      list = list.map(r=>{
        const merged = Object.assign({}, r);
        rateCols.forEach(h=>{
          const v = r[h];
          merged[h] = (v===''||v==null) ? '' : Math.round(num(v)*100)+'%';   // 0.59 → 59%
        });
        return merged;
      });
      // よく使う掛け率は卸先名の右隣に並べる
      const nameIdx = cols.indexOf('卸先名');
      cols = cols.slice(0, nameIdx+1).concat(rateCols).concat(cols.slice(nameIdx+1));
      note = '<p class="muted small">※ ブランド列はカッコ内が標準掛け率、値が入っている卸先だけ個別掛け率です（編集ボタンからも変更できます。小数で入力: 例 0.59）</p>';
    }
  }

  return '<h1>マスタ管理</h1><div class="sub">正本は業務スプシ。ここから追加するとIDが自動採番されます（IDの手書き換えは厳禁）</div>' + note +
  '<div class="tabs">'+Object.keys(MASTER_CONF).map(t=>'<button class="'+(t===tab?'on':'')+'" onclick="viewState={tab:\''+t+'\'};render()">'+t+'<span class="n">'+rows(MASTER_CONF[t].sheet).filter(r=>String(r[MASTER_CONF[t].id]||'').trim()!=='').length+'</span></button>').join('')+'</div>' +
  '<div class="row" style="margin-bottom:12px">' +
    '<input class="search" placeholder="'+esc(c.searchHint)+'" value="'+esc(q)+'"'+searchAttrs()+'>' + catSel +
    '<button class="btn" onclick="masterForm(\''+tab+'\')">＋ 新規追加</button>' +
    '<button class="btn right" onclick="exportTable(\''+tab+'マスタ\',\''+c.sheet+'\')">CSV出力</button></div>' +
  '<div id="mform"></div>' +
  '<div class="card tblwrap sticky"><table><tr>'+cols.map(h=>{
    // 表示だけ短縮（スプシの実ヘッダー名は変えない＝書き込みは正式名のまま）
    const disp = h==='サロン仕入価格（税抜）' ? 'サロン価（税抜）' : h===NM.co+'仕入価格（税抜）' ? NM.co+'仕入（税抜）' : h;
    const cls = /\([^)]*%\)/.test(h) ? 'vline num' : /(価格|定価|掛け率)/.test(h) ? 'num' : '';
    return '<th class="'+cls+'">'+esc(disp)+'</th>';
  }).join('')+'<th></th></tr>' +
  list.slice(0,300).map(r=>{
    const stopped = String(r['ストップ']||'').trim()!=='';   // 値が入っていれば仕入れストップ（グレーアウト・振り分け候補外）
    return '<tr'+(stopped?' style="background:color-mix(in srgb,var(--muted) 18%,transparent);opacity:.62"':'')+'>'+cols.map(h=>'<td class="small'+(/(価格|定価|掛け率)/.test(h)?' num':'')+(/\([^)]*%\)/.test(h)?' vline num':'')+'" title="'+esc(r[h])+'">'+fmtMasterCell(h, r[h])+'</td>').join('')+'<td><button class="btn sm" onclick=\'masterForm("'+tab+'","'+esc(String(r[c.id]))+'")\'>編集</button></td></tr>';
  }).join('') +
  '</table>'+(list.length>300?'<p class="muted small">300件まで表示（検索で絞ってください）</p>':'')+'</div>';
}
// マスタ表示用: 価格・定価は ¥1,560 形式、掛け率は％表記（値は 0.6 のまま・表示だけ 60%。0.1%単位で丸めて浮動小数の揺れを吸収）
function fmtMasterCell(h, v){
  if(v===''||v==null) return '';
  if(h==='ストップ' && String(v).trim()!=='') return '🚫 '+esc(v);
  if(/(価格|定価)/.test(h) && !isNaN(num(v))) return yen(num(v));
  // 卸先の「ミル(40%)」等ブランド列は値が元々％表記のため変換しない（掛け率列のみ 0.6→60% 変換）
  if(/掛け率/.test(h) && !isNaN(num(v)) && String(v).trim()!=='') return pctDisp(num(v));
  return esc(v);
}
// 掛け率の％表示（0.6→60%・0.419→41.9%）
function pctDisp(r){ return (Math.round(r*1000)/10)+'%'; }
function masterForm(tab, id){
  const conf = MASTER_CONF_()[tab];
  const headers = (DB[conf.sheet]&&DB[conf.sheet].headers)||[];
  const cur = id ? rows(conf.sheet).find(r=>String(r[conf.id]).trim()===id) : null;
  const fields = headers.filter(h=>h && h!==conf.id);
  document.getElementById('mform').innerHTML =
    '<div class="card"><b class="small">'+(id?id+' を編集':tab+'を新規追加')+'</b>' +
    '<div class="row" style="margin-top:8px">' +
    fields.map(h=>'<label class="small" style="min-width:200px;flex:1">'+esc(h)+'<br><input data-f="'+esc(h)+'" value="'+esc(cur?cur[h]:'')+'" style="width:100%"></label>').join('') +
    '</div><div class="row" style="margin-top:10px">' +
    '<button class="btn pri" onclick=\'masterSave("'+tab+'","'+(id||'')+'")\'>保存</button>' +
    '<button class="btn" onclick="document.getElementById(\'mform\').innerHTML=\'\'">閉じる</button></div></div>';
  document.getElementById('mform').scrollIntoView({behavior:'smooth'});
}
async function masterSave(tab, id){
  const conf = MASTER_CONF_()[tab];
  const payload = {};
  document.querySelectorAll('#mform input[data-f]').forEach(inp=>{ if(inp.value!=='') payload[inp.dataset.f]=inp.value; });
  if(id) payload[conf.id]=id;
  await act(id?conf.upd:conf.add, payload, id?'更新しました':'追加しました（ID自動採番）', [conf.sheet]);
  const f = document.getElementById('mform'); if(f) f.innerHTML='';
}
